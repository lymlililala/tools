    faq1q: What is a color harmony?
    faq1a: Color harmonies are combinations of colors that are visually pleasing based on their positions on the color wheel. Common types include complementary (opposite), analogous (adjacent), and triadic (evenly spaced).
    faq2q: What is the difference between tints and shades?
    faq2a: Tints are created by adding white to a color (making it lighter), while shades are created by adding black (making it darker). This tool generates both to give you a full range.
    faq3q: How do designers use a color palette generator?
    faq3a: 'Workflow: 1) Choose a brand primary color; 2) Generate a full tint/shade scale (50-900) for backgrounds, borders, and text; 3) Generate complementary or analogous colors for accents; 4) Generate grays for neutral elements; 5) Define semantic colors (primary, success, warning, error) mapped to specific scale values in your design system.'
    faq4q: How do I choose a harmonious color palette for a project?
    faq4a: "Common color theory approaches: complementary colors (opposite on the color wheel, high contrast), analogous colors (adjacent, harmonious), and triadic colors (equally spaced, vibrant balance). Practical advice: choose one primary (brand) color, one accent color, neutral grays, and a highlight color. Ensure contrast ratios meet WCAG AA standard (4.5:1) for accessibility, and account for color-blind users."
