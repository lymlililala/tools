    faq1q: 'Which algorithm should I use?'
    faq1a: 'AES (Advanced Encryption Standard) is the industry standard for symmetric encryption and is recommended for most use cases.'
    faq2q: 'Is my data safe?'
    faq2a: 'All encryption and decryption is performed locally in your browser. Your data and keys never leave your device.'
    faq3q: Which algorithm should I choose — AES, TripleDES, or RC4?
    faq3a: Choose AES — it is the current industry standard for symmetric encryption, used by governments and financial institutions. TripleDES is slower and being phased out. RC4 has serious security vulnerabilities and should not be used in any modern application. For production use, prefer AES-256-GCM mode and pair it with a proper key management solution.
    faq4q: Is key management the biggest challenge in AES-256 encryption?
    faq4a: "Yes. Key management is the most critical security challenge in symmetric encryption. AES-256 is extremely secure algorithmically, but a leaked key exposes all data. Best practices: never hardcode keys in source code; use a KMS (Key Management Service, e.g., AWS KMS, HashiCorp Vault); rotate keys regularly; use different keys for different data sets; securely destroy keys that are no longer needed."
