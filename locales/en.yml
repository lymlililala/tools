about:
  metaTitle: 'About MyUtl — Free Privacy-First Online Toolbox'
  metaDesc: 'Learn about MyUtl, a free collection of 90+ online developer tools that run entirely in your browser. No sign-up, no uploads — your data never leaves your device.'
  content: |
    # About MyUtl

    **MyUtl** is a free online toolbox that brings together 90+ handy utilities for developers and everyday tasks — JSON formatting, Base64 encoding, encryption, URL tools, QR code generation, hashing, and much more.

    Every tool runs **entirely in your browser**. There is no sign-up, nothing to install, and no uploads — the data you paste or generate never leaves your device.

    ## Privacy first

    We built MyUtl around a simple idea: your data is yours. All processing happens locally on your device, so you can work with sensitive content without it ever touching a server. Learn more in our [Privacy Policy](/privacy).

    ## Open source

    MyUtl is built on the open-source [it-tools](https://github.com/CorentinTh/it-tools) project, created by [Corentin Thomasset](https://corentin.tech) and licensed under the **GPL-3.0** license. We are grateful to the original author and the wider open-source community whose work makes MyUtl possible.

    ## Technologies

    MyUtl is made with Vue 3 and the Naive UI component library, and is hosted and continuously deployed on Vercel. A number of third-party open-source libraries power individual tools.

    ## Get in touch

    Found a bug, or need a tool that isn't here yet? We'd love to hear from you — visit our [Contact page](/contact) or email [contact{'@'}myutl.com](mailto:contact{'@'}myutl.com).

contact:
  metaTitle: 'Contact MyUtl — Support, Feedback & Requests'
  metaDesc: 'Get in touch with the MyUtl team. Report a bug, request a new tool, or ask a question — we typically reply within 1–2 business days.'
  content: |
    # Contact Us

    We'd love to hear from you. Whether you've found a bug, want to request a new tool, have a partnership idea, or just want to say hello — get in touch.

    **Email:** [contact{'@'}myutl.com](mailto:contact{'@'}myutl.com)

    We typically reply within **1–2 business days**.

    ## How we can help

    - **Bug reports** — Tell us the tool name, what you expected, and what actually happened. Including your browser helps us reproduce the issue.
    - **Feature requests** — Describe the tool you need and how you'd use it. Many of our tools started as user suggestions.
    - **Feedback** — Ideas on how to make MyUtl faster, clearer, or more useful are always welcome.
    - **Business & partnerships** — For collaboration or other inquiries, reach out at the same address.

    ## Before you write

    Many questions are already answered on our [About page](/about). For how we handle your data, see our [Privacy Policy](/privacy).

privacy:
  metaTitle: 'Privacy Policy — MyUtl'
  metaDesc: 'How MyUtl handles your data: our tools run locally in your browser, and we disclose the cookies and third-party advertising (Google) we use.'
  content: |
    # Privacy Policy

    _Last updated: June 14, 2026_

    MyUtl ("we", "us", or "our") respects your privacy. This policy explains how our tools work and what information may be collected when you visit [myutl.com](https://myutl.com).

    ## Local-first tools

    All of our tools run **entirely in your browser**. The text, files, and data you enter into a tool are processed on your own device and are **never transmitted to or stored on our servers**.

    ## Cookies and similar technologies

    This website uses cookies and similar technologies for the following purposes:

    - **Preferences** — items such as your theme choice and favorite tools are stored in your browser's local storage. They stay on your device and are never sent to us.
    - **Advertising and analytics** — set by the third-party services described below.

    ## Advertising

    We use third-party advertising companies, including **Google**, to serve ads when you visit MyUtl.

    - Google and its partners may use cookies (including the **DoubleClick / DART cookie**) to serve ads based on your prior visits to this and other websites.
    - Google's use of advertising cookies enables it and its partners to serve ads to you based on your visits to our site and/or other sites on the Internet.
    - You can opt out of personalized advertising by visiting [Google Ads Settings](https://www.google.com/settings/ads) or [www.aboutads.info/choices](https://www.aboutads.info/choices).
    - For more details on how Google uses data from our site, see [Google's partner sites policy](https://policies.google.com/technologies/partner-sites).

    ## Your choices

    Depending on where you live, you may have rights over your data, including the ability to opt out of personalized ads. Visitors in the EEA, the UK, and Switzerland are shown a consent prompt for ad and cookie use where required by law.

    ## Children's privacy

    MyUtl is not directed at children under 13, and we do not knowingly collect personal information from them.

    ## Changes to this policy

    We may update this policy from time to time. Any changes will be posted on this page with an updated revision date.

    ## Contact

    If you have any questions about this Privacy Policy, email us at [contact{'@'}myutl.com](mailto:contact{'@'}myutl.com).

