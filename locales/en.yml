    step2: 'Step 2: Review screen resolution, pixel ratio, OS, browser, and connection details.'
    step3: 'Step 3: Click any value to copy it.'
    faq1q: 'What information is shown?'
    faq1a: 'The tool shows screen resolution, viewport size, pixel ratio, color depth, browser name and version, operating system, language, and online/offline status.'
    faq2q: 'Is this information sent to a server?'
    faq2a: 'No. All information is read from your browser JavaScript APIs locally. Nothing is transmitted.'
    faq3q: Why do different websites detect different device info?
    faq3a: Sites use different detection methods. Screen resolution and UA are accurate, but device model is usually inferred from UA strings. Modern browsers add noise to fingerprinting APIs (like canvas) for privacy, causing minor variations between sites.
    faq4q: How do websites use device information to provide adaptive experiences?
    faq4a: Responsive design adjusts layouts based on viewport width; device pixel ratio (DPR) enables 1x/2x/3x images via srcset; UA detection can distinguish mobile vs. desktop features (e.g., touch support); connection speed info can be used to serve lower-quality images to save bandwidth. Modern best practice is feature detection rather than UA sniffing — more reliable and future-proof.
    title: Device Information & Browser Detector
    description: 'Detect detailed information about your current device and browser: screen resolution, device pixel ratio, viewport size, operating system, browser name and version, user agent string, touch support, and network connection type.'

  pdf-signature-checker:
    step1: 'Step 1: Drop or select a PDF file.'
    step2: 'Step 2: The tool scans the PDF for digital signatures.'
    step3: 'Step 3: Valid signatures show signer information and certificate details.'
    faq1q: 'What is a PDF digital signature?'
    faq1a: 'A PDF digital signature uses public key cryptography to verify the signer identity and that the document has not been altered since signing.'
    faq2q: 'Is my PDF uploaded to a server?'
    faq2a: 'No. The PDF is processed entirely in your browser. Your file never leaves your device.'
    faq3q: What is the difference between a digital signature and an electronic signature?
    faq3a: A digital signature uses PKI cryptography with a CA to verify signer identity — legally binding and tamper-detectable. An electronic signature is broader (scanned handwriting, online platforms). This tool checks PKI-based PDF digital signatures.
    faq4q: What is the difference between a digital signature and an electronic signature on a PDF?
    faq4a: "A digital signature uses a PKI certificate (e.g., X.509) to cryptographically sign the PDF, enabling verification of the signer's identity and document integrity — it has strong legal standing. An electronic signature is a broad term covering signature images, click-to-agree, etc., with no cryptographic guarantee. Many jurisdictions legally recognize digital signatures that meet specific criteria. PDF digital signature verification requires trusting the issuing CA's root certificate."
