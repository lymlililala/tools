    faq4a: "Most text diff tools use the Myers diff algorithm (O(ND) algorithm), which is also Git's default — it finds the shortest edit path (minimum number of changes). Git also supports patience (better for code refactoring, recognizes moved code blocks) and histogram (an improvement on patience). Online diff tools typically use diff_match_patch (Google) or jsdiff, both based on the same Myers algorithm and producing results consistent with git diff."
