    faq1q: 'What is bcrypt?'
    faq1a: 'Bcrypt is a password-hashing algorithm designed to be intentionally slow to resist brute-force attacks. It uses a salt to protect against rainbow table attacks.'
    faq2q: 'What is the cost factor?'
    faq2a: 'The cost factor controls how many hashing rounds are performed. Increasing it by 1 doubles the computation time.'
    faq3q: What cost factor should I use for bcrypt?
    faq3a: A cost factor of 10–12 is recommended. Higher values increase security but slow down hashing. The 2024 recommendation is at least 10 for production, and 12 for high-security scenarios. This tool defaults to 10. Test your target server to ensure hashing completes within an acceptable time (ideally under 300ms).
    faq4q: Can a bcrypt hash be cracked?
    faq4a: Bcrypt is designed to be extremely resistant to brute-force attacks. A high cost factor means each attempt takes a long time, even with GPU clusters. As long as the cost factor is high enough (>=10) and the password is sufficiently complex, bcrypt is practically uncrackable in real-world scenarios.
