    step2: 'Step 2: Select the type (website, article, product, etc.).'
    step3: 'Step 3: Copy the generated Open Graph and Twitter Card meta tags.'
    faq1q: 'What are Open Graph meta tags?'
    faq1a: 'Open Graph tags are HTML meta tags that control how your page appears when shared on social media - title, description, image, and more.'
    faq2q: 'Why is the og:image important?'
    faq2a: 'The og:image is the thumbnail shown when your page is shared on social media. Recommended size is 1200x630px.'
    faq3q: Which Open Graph tags are required?
    faq3a: 'Required: og:title, og:type (website or article), og:image (1200x630px recommended), og:url. Important optional: og:description, og:site_name. For articles add article:published_time and article:section. Missing these causes broken previews on social media.'
    faq4q: How do Open Graph tags affect social media sharing performance?
    faq4a: "Well-crafted OG tags can significantly boost share click-through rates: og:title (40-60 chars recommended); og:description (100-200 chars); og:image (1200x630px recommended — large images attract more attention); og:url (canonical URL). Twitter has its own Twitter Card tags (twitter:card=summary_large_image for large image display). Without these tags, shares show only the URL or a default thumbnail, drastically reducing click intent."
    title: Open Graph / OG Meta Tag Generator
    description: Generate Open Graph and Twitter Card meta tags for your website. Preview how your page will appear when shared on Facebook, Twitter, LinkedIn, and other social platforms. Includes og:title, og:image, og:description, and more.

  ipv6-ula-generator:
    step1: 'Step 1: Click Generate to create a random IPv6 ULA prefix.'
    step2: 'Step 2: The generated prefix, global ID, and full address range are displayed.'
    step3: 'Step 3: Copy the prefix to use in your local network configuration.'
    faq1q: 'What is an IPv6 ULA address?'
    faq1a: 'ULA (Unique Local Address) is an IPv6 address in the fc00::/7 range similar to private IPv4 ranges. Not routable on the global internet.'
    faq2q: 'How is a ULA global ID generated?'
    faq2a: 'Per RFC 4193 the 40-bit global ID is generated pseudo-randomly to minimize collision probability.'
    faq3q: What is the difference between IPv6 ULA and public IPv6?
    faq3a: ULA (fc00::/7 prefix) is like IPv4 private addresses — only routable within your local network. GUA (Global Unicast Address) is publicly routable. ULA provides stable internal addressing independent of ISP assignment, useful even without internet connectivity.
    faq4q: What is the difference between IPv6 ULA and Global Unicast Addresses (GUA)?
    faq4a: "ULA (Unique Local Addresses, fc00::/7) are similar to IPv4 private addresses — routed only within the local network and not advertised on the internet. GUA (Global Unicast Addresses, 2000::/3) are globally routable internet addresses. IPv6's abundance of addresses means internal networks can also use GUAs, but ULA is safer for purely internal devices (no internet reachability needed) and is well-suited for labs and development."
