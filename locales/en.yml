    faq1q: How do I convert Celsius to Fahrenheit?
    faq1a: 'Formula: °F = °C × 9/5 + 32. For example, 100°C = 212°F (boiling point of water).'
    faq2q: What is absolute zero?
    faq2a: 'Absolute zero is the lowest possible temperature: 0 Kelvin = −273.15°C = −459.67°F. At this temperature, particles have minimum thermal motion.'
    faq3q: What are common reference temperatures?
    faq3a: 'Key values: water freezes at 0C/32F, boils at 100C/212F, body temperature ~37C/98.6F, room temperature ~20-25C/68-77F. Formula: F = C x 9/5 + 32; C = (F - 32) x 5/9.'
    faq4q: What are the practical applications of Kelvin and Celsius in different fields?
    faq4a: Celsius (C) is used for everyday temperature, cooking, and weather; Fahrenheit (F) is mainly used in US daily life; Kelvin (K) is the SI standard unit used in scientific calculations (thermodynamics and physics formulas require non-negative temperatures — Kelvin starts at absolute zero); color temperature in photography uses K (5500K for daylight, 3200K for tungsten); in medicine, Fahrenheit is common in the US while other countries use Celsius.
