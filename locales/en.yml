  date-converter:
    step1: 'Step 1: Enter a date and time in the input field.'
    step2: 'Step 2: Choose the source timezone.'
    step3: 'Step 3: The date is displayed in multiple formats and timezones.'
    faq1q: 'What date formats are supported?'
    faq1a: 'The tool supports ISO 8601, Unix timestamp, RFC 2822, and common locale formats.'
    faq2q: 'What is a Unix timestamp?'
    faq2a: 'A Unix timestamp is the number of seconds elapsed since January 1 1970 00:00:00 UTC. It is timezone-independent.'
    faq3q: What is the Year 2038 problem?
    faq3a: The Year 2038 problem occurs because 32-bit signed integers can only store timestamps up to 2038-01-19 03:14:07 UTC (value 2,147,483,647). After that, 32-bit systems overflow to negative values. Modern systems use 64-bit integers for timestamps, which can represent dates billions of years into the future without this issue.
    faq4q: How do I handle date-time conversions across time zones?
    faq4a: "The key rule: always store time in UTC and only convert to local time for display. In JavaScript, use Intl.DateTimeFormat or the date-fns-tz library. Daylight Saving Time (DST) causes the same time zone to have different offsets at different times of year — handle this carefully. For databases, use TIMESTAMP WITH TIME ZONE (PostgreSQL) or UTC DATETIME (MySQL)."
    title: Date-time converter
    description: Convert dates and times between different formats and timezones. Supports ISO 8601, Unix timestamp, RFC 2822, and local date formats. Instantly shows equivalent representations for any date.

