    faq1q: What can a QR code contain?
    faq1a: 'QR codes can contain URLs, plain text, contact cards (vCard), WiFi credentials, phone numbers, email addresses, and more.'
    faq2q: What is the maximum data a QR code can store?
    faq2a: A standard QR code can store up to ~4,296 alphanumeric characters or ~7,089 numeric characters. Shorter content produces a simpler, more scannable code.
    faq3q: Can I add a logo to the QR code?
    faq3a: To add a logo, overlay it on the center using an image editor. Use error correction level H (30% damage tolerance) to ensure scannability. Keep the logo under 30% of the QR area. This tool generates PNG images that can be post-processed in Photoshop or Figma.
    faq4q: What types of data can a QR code store?
    faq4a: "QR codes can encode many formats: URLs (most common, links to a web page); vCard (contact information); Wi-Fi configuration (SSID + password, phone connects directly); plain text; phone numbers (tel:); email addresses (mailto:); geographic coordinates (geo:); calendar events (VEVENT); payment information (Alipay/WeChat Pay specific formats). Maximum capacity is approximately 4,296 alphanumeric characters; CJK characters significantly reduce capacity."

  wifi-qrcode-generator:
    step1: 'Step 1: Enter your WiFi network name (SSID).'
    step2: 'Step 2: Enter the WiFi password.'
    step3: 'Step 3: Select the security type (WPA/WPA2, WEP, or None).'
    step4: 'Step 4: Scan the generated QR code with your phone to connect instantly.'
    faq1q: 'What information is encoded in a WiFi QR code?'
    faq1a: 'The QR code encodes the SSID, password, and security type. When scanned compatible devices automatically connect.'
    faq2q: 'Is it safe to share a WiFi QR code?'
    faq2a: 'Only share with trusted people. The QR code contains your WiFi password and anyone who scans it can join your network.'
    faq3q: What WiFi security types does the WiFi QR code support?
    faq3a: 'The WIFI: format supports WPA/WPA2/WPA3 Personal (most common), WEP (obsolete and insecure), and open networks. WEP has serious security flaws — upgrade to WPA2 or WPA3. WPA3 provides the strongest protection for new setups.'
    faq4q: How does a phone work when scanning a Wi-Fi QR code?
    faq4a: "Wi-Fi QR codes use the standard format: WIFI:T:WPA;S:NetworkName;P:Password;; iOS 11+ and Android 9+ natively recognize this format in their camera apps and display a connection prompt. The password is transmitted in plaintext in the QR code (only the scanner can see it), so avoid displaying a Wi-Fi QR code with a password in public. Enterprise networks can use passwordless 802.1X configuration, but the QR code format does not support it."
    title: WiFi QR Code generator
    description: Create WiFi QR codes that let guests join your network instantly by scanning. Supports WPA2, WPA3, WEP, and open networks. Customize colors and download as PNG for printing or sharing.

