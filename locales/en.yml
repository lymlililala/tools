    step4: 'Step 4: Click Generate and copy the results.'
    faq1q: 'What is a MAC address used for?'
    faq1a: 'MAC addresses uniquely identify devices on a local network at the data-link layer (Layer 2).'
    faq2q: 'Can I generate multicast MAC addresses?'
    faq2a: 'The generator creates unicast addresses by default. A MAC address is multicast if the LSB of the first byte is 1.'
    faq3q: What is the difference between locally and globally administered MAC addresses?
    faq3a: 'Globally administered (UAA): unique OUI from IEEE, guarantees global uniqueness. Locally administered (LAA): second-least-significant bit of first byte set to 1, manually configured. LAA are used in VMs, containers, and network testing where global uniqueness is not required.'
    faq4q: What are the uses of random MAC addresses in network testing?
    faq4a: "Uses of random MAC addresses: network simulation (testing a DHCP server's ability to allocate a large number of addresses); switch MAC table stress testing; network isolation and virtualization environments (VMs need unique MACs); privacy protection (modern phones use randomized MACs when scanning for Wi-Fi); testing the security of MAC-based access controls. When generating, pay attention to the U/L bit to avoid conflicts with real devices."
