    faq1a: 'Base64 encoding converts binary file data into a text string using 64 printable ASCII characters. Used to embed files in HTML, CSS, JSON, or APIs.'
    faq2q: 'What is the size overhead of Base64?'
    faq2a: 'Base64 increases the file size by approximately 33%.'
    faq3q: What are common use cases for Base64 file encoding?
    faq3a: 'Common uses: embedding small images in HTML/CSS as data URIs, transmitting files in JSON APIs and email (MIME), embedding certificates in PEM config files, encoding binary assets in environment variables or database fields.'
    faq4q: How much does Base64 encoding increase file size?
    faq4a: "Base64 encoding increases the original data size by approximately 33% (3 bytes become 4 characters). For example, a 1 MB image becomes about 1.37 MB after encoding. When embedding in CSS or HTML, weigh the trade-off: fewer HTTP requests but larger page size. It is best to use Base64 only for small files (under 10 KB)."
