    step2: 'Step 2: Click Generate to create a new RSA key pair.'
    step3: 'Step 3: Copy the private key and public key (PEM format) separately.'
    faq1q: 'What is RSA?'
    faq1a: 'RSA (Rivest-Shamir-Adleman) is a widely used asymmetric encryption algorithm. A public key encrypts data; only the corresponding private key can decrypt it.'
    faq2q: 'What key size should I use?'
    faq2a: '2048-bit is the minimum recommended. 4096-bit provides stronger security. 1024-bit is considered insecure.'
    faq3q: What are RSA public and private keys used for?
    faq3a: The public key is used to encrypt data (only the private key can decrypt it) and to verify digital signatures. The private key is used to decrypt data and to create signatures. The public key can be freely shared; the private key must be kept secret. In SSH, the public key is placed on the server while the private key stays on your machine.
    faq4q: Should I choose RSA-2048 or RSA-4096?
    faq4a: "RSA-2048 is still considered secure — NIST projects it will not be broken before 2030 — and has better performance (signing/encryption is 4-8x faster than 4096). RSA-4096 offers a longer security margin, suitable for protecting highly sensitive data for 10+ years. Practical recommendation: 2048 is sufficient for TLS certificates and SSH keys (or switch to Ed25519, which is shorter, faster, and more secure); consider 4096 for code signing certificates or long-term document encryption."
