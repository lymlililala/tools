    faq1q: 'What is OTP / TOTP?'
    faq1a: 'OTP is a password valid for only one session. TOTP generates a new code every 30 seconds using a shared secret and the current time.'
    faq2q: 'What is the standard algorithm?'
    faq2a: 'TOTP is defined in RFC 6238 and uses HMAC-SHA1. Used by Google Authenticator and Authy.'
    faq3q: What is the difference between TOTP and HOTP?
    faq3a: TOTP (Time-based OTP) generates a code based on the current time, refreshing every 30 seconds — used by Google Authenticator. HOTP (HMAC-based OTP) uses an incrementing counter instead of time, suitable for hardware tokens and offline scenarios where clock sync is not guaranteed.
    faq4q: What is the difference between TOTP and HOTP? Which should I use?
    faq4a: TOTP (time-based) is an extension of HOTP (counter-based), using the current timestamp instead of a counter. TOTP refreshes every 30 seconds — even if an OTP is intercepted it expires quickly — and is the standard used by Google Authenticator, Authy, and other apps. HOTP is based on an incrementing counter and does not require time synchronization, making it suitable for offline hardware tokens. Modern 2FA almost universally uses TOTP (RFC 6238).
    title: OTP code generator
    description: Generate and validate time-based OTP (TOTP) and HMAC-based OTP (HOTP) for multi-factor authentication. Supports custom secrets and step intervals.

  url-encoder:
    title: Encode/decode URL-formatted strings
    description: Encode text to URL-encoded format (percent-encoding) or decode it back. Supports full URL and URI component modes, ideal for API development and web debugging.
    step1: 'Step 1: Select "Encode" or "Decode" mode.'
    step2: 'Step 2: Paste your URL or text into the input box.'
    step3: 'Step 3: The encoded/decoded result appears instantly.'
    faq1q: What is URL encoding?
    faq1a: URL encoding (percent-encoding) converts characters that are not allowed in URLs (like spaces, Chinese characters, or symbols) into a %XX format. For example, a space becomes %20.
    faq2q: When do I need to URL-encode a string?
    faq2a: When passing user input as query parameters, constructing URLs programmatically, or handling form data submissions.
    faq3q: What is the difference between URL encoding and Base64?
    faq3a: URL encoding (percent-encoding) converts special characters to %XX format for safe transmission in URLs. Base64 encodes binary data as ASCII text for transmission in text-based protocols. Use URL encoding for query parameters and form data; use Base64 for encoding binary content like files or images.
    faq4q: What is the difference between URL percent-encoding and Base64?
    faq4a: URL encoding (%XX) is specifically for escaping unsafe characters in URLs, converting bytes to % followed by hex digits to keep the URL syntactically valid (e.g., space -> %20, Chinese characters -> %E4%B8%AD). Base64 encodes arbitrary binary data to 64 printable characters for transport over text protocols, increasing size by ~33%. URL encoding is for URL parameters; Base64 is used for data URIs, API authentication, and email attachments.
