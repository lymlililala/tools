  crontab-generator:
    step1: 'Step 1: Use the visual editor to set minute, hour, day, month, and weekday fields.'
    step2: 'Step 2: Or type a cron expression directly into the input box.'
    step3: 'Step 3: The human-readable description and next scheduled times are shown automatically.'
    faq1q: 'What is a cron expression?'
    faq1a: 'A cron expression is a string of 5 fields (minute hour day month weekday) that defines a recurring schedule for Unix/Linux tasks.'
    faq2q: 'What does star slash 5 mean in cron?'
    faq2a: 'It means every 5 units. In the minute field it runs at 0, 5, 10, 15... minutes past each hour.'
    title: Crontab generator
    description: Validate and generate crontab and get the human-readable description of the cron schedule.

  http-status-codes:
    step1: 'Step 1: Browse the list of all HTTP status codes organized by category.'
    step2: 'Step 2: Use the search box to quickly find a specific code or description.'
    step3: 'Step 3: Click a code to copy it to your clipboard.'
    faq1q: 'What is an HTTP status code?'
    faq1a: 'HTTP status codes are 3-digit numbers returned by a server indicating whether the request was successful, redirected, or resulted in an error.'
    faq2q: 'What is the difference between 401 and 403?'
    faq2a: '401 Unauthorized means authentication is required but not provided. 403 Forbidden means the server refuses to authorize the request.'
    title: HTTP status codes
    description: The list of all HTTP status codes, their name, and their meaning.

  sql-prettify:
    step1: 'Step 1: Paste your SQL query into the input editor.'
    step2: 'Step 2: Select the SQL dialect (MySQL, PostgreSQL, etc.) from the dropdown.'
    step3: 'Step 3: The formatted query appears in the output panel instantly.'
    step4: 'Step 4: Click Copy to copy the formatted SQL.'
    faq1q: 'Why format SQL queries?'
    faq1a: 'Formatted SQL is easier to read, debug, and maintain. Consistent indentation helps spot errors faster.'
    faq2q: 'What SQL dialects are supported?'
    faq2a: 'The tool supports MySQL, PostgreSQL, SQLite, MariaDB, BigQuery, Spark, TSQL and more.'
    title: SQL prettify and format
    description: Format and prettify your SQL queries online (it supports various SQL dialects).

  benchmark-builder:
    step1: 'Step 1: Add benchmark cases by clicking Add case.'
    step2: 'Step 2: Enter JavaScript code for each case.'
    step3: 'Step 3: Click Run to execute all cases multiple times.'
    step4: 'Step 4: Compare ops/sec results to identify the fastest implementation.'
    faq1q: 'What does ops/sec mean?'
    faq1a: 'Ops/sec (operations per second) measures how many times a code block can execute in one second. Higher is faster.'
    faq2q: 'Is this benchmark accurate?'
    faq2a: 'The benchmark runs in your browser JavaScript engine. Results vary by device. Use it for relative comparisons.'
    title: Benchmark builder
    description: Easily compare execution time of tasks with this very simple online benchmark builder.

  git-memo:
    step1: 'Step 1: Browse the Git cheatsheet organized by category.'
    step2: 'Step 2: Search for a specific command using the search box.'
    step3: 'Step 3: Click any command to copy it to your clipboard.'
    faq1q: 'What is Git?'
    faq1a: 'Git is a distributed version control system for tracking changes in source code allowing developers to collaborate and maintain project history.'
    faq2q: 'What is the difference between git pull and git fetch?'
    faq2a: 'git fetch downloads remote changes but does not merge them. git pull equals git fetch plus git merge.'
    title: Git cheatsheet
    description: Git is a decentralized version management software. With this cheatsheet, you will have quick access to the most common git commands.

  slugify-string:
    step1: 'Step 1: Enter the text you want to convert into a slug.'
    step2: 'Step 2: The slug updates in real-time as you type.'
    step3: 'Step 3: Click Copy to copy the result.'
    faq1q: 'What is a slug?'
    faq1a: 'A slug is a URL-friendly string typically lowercase with hyphens instead of spaces, used in URLs.'
    faq2q: 'Does it support non-English characters?'
    faq2a: 'Yes. The tool converts accented and special characters to their ASCII equivalents.'
    title: Slugify string
    description: Make a string url, filename and id safe.

  encryption:
    step1: 'Step 1: Select Encrypt or Decrypt mode.'
    step2: 'Step 2: Choose the encryption algorithm (AES, TripleDES, Rabbit, RC4).'
    step3: 'Step 3: Enter the text and your secret key.'
    step4: 'Step 4: The encrypted or decrypted result appears instantly.'
    faq1q: 'Which algorithm should I use?'
    faq1a: 'AES (Advanced Encryption Standard) is the industry standard for symmetric encryption and is recommended for most use cases.'
    faq2q: 'Is my data safe?'
    faq2a: 'All encryption and decryption is performed locally in your browser. Your data and keys never leave your device.'
    title: Encrypt / decrypt text
    description: Encrypt clear text and decrypt ciphertext using crypto algorithms like AES, TripleDES, Rabbit or RC4.
