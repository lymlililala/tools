    faq1q: 'What is HMAC?'
    faq1a: 'HMAC (Hash-based Message Authentication Code) combines a cryptographic hash function with a secret key to verify data integrity and authenticity.'
    faq2q: 'What is the difference between HMAC and a regular hash?'
    faq2a: 'A regular hash only verifies data integrity. HMAC additionally requires a shared secret key.'
    faq3q: How is HMAC used in API authentication?
    faq3a: In API request signing, the client computes an HMAC of the request parameters plus a timestamp using a shared secret key, then includes it in the request header. The server recomputes the HMAC to verify the request has not been tampered with and originated from a legitimate client. This pattern is used by AWS Signature V4 and many webhook security implementations.
