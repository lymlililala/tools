    faq1q: 'Why format SQL queries?'
    faq1a: 'Formatted SQL is easier to read, debug, and maintain. Consistent indentation helps spot errors faster.'
    faq2q: 'What SQL dialects are supported?'
    faq2a: 'The tool supports MySQL, PostgreSQL, SQLite, MariaDB, BigQuery, Spark, TSQL and more.'
    faq3q: Does SQL formatting change the query's semantics or execution result?
    faq3a: No. SQL formatting only adjusts whitespace (newlines, indentation, alignment) and does not change the query's meaning or execution result. The formatted SQL is semantically identical to the original. Formatting makes queries easier to review, understand, and spot potential logical errors like missing WHERE clauses.
    title: SQL Formatter & Beautifier
