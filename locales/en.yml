    faq1a: 'Unicode is a universal character encoding standard assigning a unique code point to every character in every language.'
    faq2q: 'What is the difference between Unicode and UTF-8?'
    faq2a: 'Unicode assigns code points (e.g. U+0041 for A). UTF-8 is an encoding that represents those code points as 1-4 bytes.'
