    By accessing or using **MyUtl** (the "Service") at [myutl.com](https://myutl.com), you agree to these Terms of Service. If you do not agree, please do not use the Service.

    ## Use of the Service

    MyUtl provides a collection of free online utilities for personal and commercial use. The tools run in your browser and are offered at no cost.

    ## Acceptable use

    You agree not to misuse the Service. In particular, you will not:

    - attempt to disrupt, overload, or interfere with the Service or its infrastructure;
    - use automated means to abuse the Service or scrape it at a scale that degrades it for others;
    - use the Service for any unlawful purpose or in violation of any applicable laws.

    ## No warranty

    The Service is provided **"as is"** and **"as available"**, without warranties of any kind, whether express or implied. While we strive for accuracy, we do not guarantee that the tools are error-free or that their output is suitable for any particular purpose. Always verify critical results independently.

    ## Limitation of liability

    To the fullest extent permitted by law, MyUtl and its contributors shall not be liable for any direct, indirect, incidental, or consequential damages arising from your use of, or inability to use, the Service.

    ## Intellectual property

    MyUtl is built on the open-source [it-tools](https://github.com/CorentinTh/it-tools) project, licensed under the **GPL-3.0** license. The original work remains the property of its respective authors.

    ## Changes to these terms

    We may revise these terms from time to time. Continued use of the Service after changes take effect constitutes acceptance of the revised terms.

    ## Contact

    Questions about these terms? Email us at [contact{'@'}myutl.com](mailto:contact{'@'}myutl.com).

