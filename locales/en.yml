    step2: 'Step 2: Enter your height and weight.'
    step3: 'Step 3: Your BMI and weight classification are calculated instantly.'
    faq1q: What is BMI and is it accurate?
    faq1a: BMI (Body Mass Index) is a simple ratio of weight to height squared. It is a useful screening tool but does not measure body fat directly — it can misclassify muscular or elderly individuals.
    faq2q: What BMI range is considered healthy?
    faq2a: 'WHO standard: 18.5–24.9 is normal. Chinese national standard (NHC): 18.5–23.9 is normal weight; 24–27.9 is overweight; ≥28 is obese.'
    faq3q: Does this calculator send my data anywhere?
    faq3a: No. All calculations run entirely in your browser. No health data is collected or transmitted.

