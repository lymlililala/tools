    step2: 'Step 2: The current OTP code is displayed with a countdown timer.'
    step3: 'Step 3: Copy the 6-digit code to authenticate.'
    faq1q: 'What is OTP / TOTP?'
    faq1a: 'OTP is a password valid for only one session. TOTP generates a new code every 30 seconds using a shared secret and the current time.'
    faq2q: 'What is the standard algorithm?'
    faq2a: 'TOTP is defined in RFC 6238 and uses HMAC-SHA1. Used by Google Authenticator and Authy.'
