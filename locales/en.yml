    step2: 'Step 2: Set the base font size, parent font size, and viewport dimensions if needed.'
    step3: 'Step 3: All converted values appear instantly. Click any result to use it as the new input.'
    faq1q: What is the difference between rem and em?
    faq1a: rem is relative to the root element font size (usually 16px on most browsers). em is relative to the current element's parent font size, which can compound/cascade.
    faq2q: When should I use rem vs px?
    faq2a: Use rem for font sizes and spacing so your layout scales with user's browser font settings (better accessibility). Use px for fine-grained control, borders, or fixed elements.

  unix-timestamp:
    title: Unix Timestamp Converter
    description: Convert Unix timestamps to human-readable dates and vice versa. Shows current timestamp, ISO 8601, UTC, and local time formats.
    current: Current Time
    tsToDate: Timestamp → Date
    dateToTs: Date → Timestamp
    timestamp: Timestamp
    inMs: In milliseconds
    useNow: Use Now
    dateString: Date String
    step1: 'Step 1: To convert a timestamp to a date, paste the Unix timestamp in the input field.'
    step2: 'Step 2: Toggle "In milliseconds" if your timestamp is in ms (13 digits) rather than seconds (10 digits).'
    step3: 'Step 3: To convert a date to a timestamp, enter a date string in the bottom section.'
    faq1q: What is a Unix timestamp?
    faq1a: A Unix timestamp counts the number of seconds (or milliseconds) elapsed since January 1, 1970 00:00:00 UTC (the Unix Epoch). It is timezone-independent and widely used in programming.
    faq2q: How do I check if my timestamp is in seconds or milliseconds?
    faq2a: 'A 10-digit number is seconds (e.g. 1704067200). A 13-digit number is milliseconds (e.g. 1704067200000). Current Unix time is ~1.7 billion seconds.'

