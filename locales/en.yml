    title: Hash Text Generator (MD5/SHA)
    description: 'Hash a text string using the function you need : MD5, SHA1, SHA256, SHA224, SHA512, SHA384, SHA3 or RIPEMD160'
    step1: 'Step 1: Type or paste your text into the input field.'
    step2: 'Step 2: Select the hash algorithm (MD5, SHA-256, etc.).'
    step3: 'Step 3: The hash output appears instantly. Click to copy.'
    faq1q: What is a hash function?
    faq1a: A hash function takes any input and produces a fixed-length output (digest). It is one-way — you cannot reverse a hash to get the original input. It is used in passwords, file integrity checks, and digital signatures.
    faq2q: Which hash algorithm should I use?
    faq2a: For security-sensitive use cases, use SHA-256 or SHA-512. MD5 and SHA-1 are considered cryptographically broken and should only be used for non-security purposes like checksums.
    faq3q: What is the difference between MD5 and SHA256?
    faq3a: MD5 has known collision vulnerabilities and should not be used for security purposes — it is only suitable for non-security tasks like checksums. SHA256 is the current secure choice for digital signatures and certificates. For password storage, use bcrypt, scrypt, or Argon2 instead of any SHA algorithm.

