    step1: 'Step 1: Check the permission boxes for owner, group, and others.'
    step2: 'Step 2: The numeric chmod value (e.g. 755) and symbolic notation update automatically.'
    step3: 'Step 3: Copy the chmod command for use in your terminal.'
    faq1q: 'What is chmod?'
    faq1a: 'chmod (change mode) is a Unix/Linux command that modifies file and directory permissions.'
    faq2q: 'What does chmod 755 mean?'
    faq2a: '755 means owner has read+write+execute (7), group and others have read+execute (5). Commonly used for web server directories.'
    faq3q: What is the difference between numeric and symbolic chmod notation?
    faq3a: Numeric chmod (e.g. 755) adds read (4), write (2), and execute (1) together for each of owner, group, and others. Symbolic chmod (e.g. chmod u+x) is more readable and lets you add or remove specific permissions without affecting others. Both are equivalent; numeric notation is more common in scripts and documentation.
    faq4q: How can I safely change file permissions without breaking a system?
    faq4a: Follow the principle of least privilege — grant only necessary permissions. Avoid chmod 777 (read/write/execute for everyone), which is a serious security risk. For web servers, use 644 for files and 755 for directories. Confirm current permissions with ls -la before changing. Be especially careful with system files; incorrect permissions can prevent services from starting or create security vulnerabilities.
