    faq1q: 'What is an IBAN?'
    faq1a: 'IBAN (International Bank Account Number) is an internationally agreed standard for identifying bank accounts.'
    faq2q: 'How long is an IBAN?'
    faq2a: 'IBAN length varies by country from 15 (Norway) to 34 characters. It always starts with a 2-letter country code and 2 check digits.'
    faq3q: How does IBAN validation work?
    faq3a: 'IBAN uses MOD-97: move the first 4 chars to the end, replace letters with numbers (A=10...Z=35), compute modulo 97. If remainder equals 1, the IBAN is valid. The tool also checks country-specific format and length per ISO 13616.'
    faq4q: What is the difference between IBAN validation and a SWIFT/BIC code?
    faq4a: An IBAN (International Bank Account Number) identifies a specific bank account and is used to designate the recipient account in international transfers. A SWIFT/BIC code (8-11 characters) identifies the bank institution itself and routes the transfer to the correct bank. International wire transfers typically require both an IBAN (account) and a BIC (bank). Within the Eurozone, SEPA transfers only require an IBAN.
