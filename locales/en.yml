  regex-memo:
    step1: 'Step 1: Browse the regex cheat sheet.'
    step2: 'Step 2: Click any row to copy the expression.'
    step3: 'Step 3: Use the table of contents on the right to navigate sections.'
    faq1q: 'What is a regular expression?'
    faq1a: 'A regular expression (regex) is a pattern used to match character combinations in strings, widely used for search, replace, and validation.'
    faq2q: 'How do I test a regex?'
    faq2a: 'Use the Regex Tester tool on this site to test and debug regular expressions in real-time.'
    faq3q: What is the difference between greedy and lazy quantifier matching?
    faq3a: 'Greedy (default) matches as much as possible: .* matches to the end of the string. Lazy (add ? after quantifier: .*?) matches as little as possible, stopping at the first match. For example: /<.*>/ greedily matches the whole line; /<.*?>/ lazily matches just the first complete tag.'
    faq4q: What is the difference between greedy and non-greedy matching in regex?
    faq4a: "Greedy quantifiers (* + ?) match as many characters as possible; non-greedy/lazy quantifiers (*? +? ??) match as few as possible. Example: for the string '<a>foo</a><b>bar</b>', <.*> greedy-matches the entire string, while <.*?> matches only the first '<a>'. This is critical when extracting HTML tag content — always use non-greedy to avoid matching from the first opening tag to the last closing tag."
    title: Regex cheat sheet
    description: A comprehensive regex cheat sheet with common patterns for email, URL, phone, date, IP address, and more. Copy-ready examples with explanations for JavaScript, Python, and PCRE.
    toc: Contents
    copied: Copied to clipboard
    copyExpr: Copy expression
    regexTesterLink: Regex Tester (this tool)

  xml-to-json:
    title: XML to JSON Converter Converter
    description: Convert XML data to JSON format, preserving hierarchy. Perfect for frontend processing and API integration.
    step1: 'Step 1: Paste your XML text into the left input box.'
    step2: 'Step 2: The converted JSON result is shown in real-time on the right.'
    step3: 'Step 3: Click the copy button to copy the JSON output.'
    faq1q: What is the difference between XML and JSON?
    faq1a: XML uses tag-based structure, suitable for documents and configs. JSON uses key-value pairs, is more lightweight, and is the standard format for modern Web APIs.
    faq2q: Does conversion support XML attributes?
    faq2a: "Yes. XML element attributes are preserved as special keys (e.g. {'@'}attributes) in the JSON result."
    faq3q: How are XML namespaces handled when converting to JSON?
    faq3a: XML namespace prefixes (like <ns:tag>) are typically preserved as part of the key name in JSON (e.g. ns:tag). The namespace URI declaration attributes (xmlns:ns=...) are handled as regular attributes. For complex namespace-heavy XML, review the output carefully as the mapping can vary between conversion implementations.
    faq4q: How do I handle the mapping between XML attributes and elements when converting to JSON?
    faq4a: "XML has both attributes and elements as data carriers, while JSON only has key-value pairs. Common conversion strategies: map attributes to special JSON keys (e.g., {'@'}attr or a nested _attributes object); map text content to a #text key; handle arrays carefully (single vs. multiple child elements should both be converted to arrays for consistency). Different libraries (xml2js, fast-xml-parser) use different strategies — choose conversion options based on your use case."
