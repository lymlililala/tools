  safelink-decoder:
    title: Outlook SafeLink Decoder
    description: Decode Microsoft Outlook SafeLink protected URLs and restore the original destination link. Supports batch decoding for enterprise email users.
    step1: 'Step 1: Copy the SafeLink URL from an Outlook email (starts with "safelinks.protection.outlook.com").'
    step2: 'Step 2: Paste it into the input box.'
    step3: 'Step 3: The decoded original URL is shown instantly. Click to visit or copy.'
    faq1q: What is an Outlook SafeLink?
    faq1a: SafeLink is a Microsoft Defender for Office 365 feature that rewrites email links to proxy URLs to protect against malicious websites.
    faq2q: Is the decoded link safe to visit?
    faq2a: This tool only decodes the URL and does not perform security validation. Always verify the destination before visiting.
    faq3q: What are Microsoft Safe Links?
    faq3a: Microsoft Defender for Office 365 replaces URLs in emails with wrapped Safe Links (e.g. urldefense.com or safelinks.protection.outlook.com) to scan for malicious destinations. When you need the original URL (for sharing or debugging), this tool decodes and extracts it. Always verify the decoded URL before visiting.
    faq4q: Why do email systems wrap links in SafeLink encoding?
    faq4a: SafeLink wrapping is a feature of email security gateways (e.g., Microsoft Defender for Office 365, Proofpoint) that replaces all URLs in emails with proxied safety-check URLs. When clicked, the gateway first checks whether the destination is a known malicious site, phishing link, or newly registered suspicious domain, then redirects only if it passes. The downside is that the original URL is hidden. This tool restores the original address.
