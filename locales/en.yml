  email-normalizer:
    title: Email Address Normalizer
    description: Batch normalize and deduplicate email addresses with support for Gmail + aliases, dot-ignoring rules, and major provider-specific formats for clean mailing lists.
    step1: 'Step 1: Paste or upload your email list (one per line).'
    step2: 'Step 2: The tool normalizes addresses, removing aliases and extra dots.'
    step3: 'Step 3: Copy or download the normalized email list.'
    faq1q: What is email normalization?
    faq1a: Email normalization removes aliases (like Gmail + tags), unifies casing, and removes dots that some providers ignore, to get the "real" address.
    faq2q: Which email providers are supported?
    faq2a: Gmail, Outlook, Yahoo, and other major providers are supported. Normalization rules vary by provider.
    faq3q: What is email normalization useful for?
    faq3a: "Prevents duplicate accounts (user+1{'@'}gmail.com and user{'@'}gmail.com are the same inbox), deduplicates marketing lists, merges CRM records, and enables lenient login matching — especially important with Google Sign-In where users may register with Gmail alias variants."
    faq4q: Why is email address normalization important for systems?
    faq4a: "Without normalization, the same user may create multiple accounts (e.g., User{'@'}Gmail.com and user+tag{'@'}gmail.com reach the same inbox), causing duplicate data and poor user experience. Normalization steps: convert to lowercase, strip Gmail dots and plus-address suffixes, and trim whitespace. Normalizing during registration and login prevents duplicate accounts and unifies user data."
