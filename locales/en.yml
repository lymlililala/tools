    step2: 'Step 2: The formatted and validated YAML appears on the right.'
    step3: 'Step 3: Copy or download the formatted YAML.'
    faq1q: 'What is YAML?'
    faq1a: "YAML (YAML Ain't Markup Language) is a human-friendly data serialization language, commonly used in config files like Docker Compose and Kubernetes."
    faq2q: 'What are the indentation rules for YAML?'
    faq2a: 'YAML uses spaces (not tabs) for indentation. Sibling nodes must use the same indentation level.'
    faq3q: What do the YAML --- and ... markers mean?
    faq3a: --- is a document start marker allowing multiple independent YAML documents in one file. ... is an optional document end marker. For single-document files, --- can usually be omitted, but it is commonly used in Kubernetes, GitHub Actions, and Ansible to separate multiple configuration documents.
    faq4q: In which scenarios do YAML and JSON each have an advantage?
    faq4a: "YAML advantages: supports comments (essential for config files); indentation syntax is closer to natural language; supports multi-line strings; supports anchors and aliases to reduce repetition; more human-readable overall. JSON advantages: strict syntax with simple parser implementation; native browser support (JSON.parse); de facto standard for APIs and data exchange; no implicit type coercion pitfalls. Use YAML for config files; use JSON for data transport."
    title: YAML Viewer & Formatter
    description: Validate, format, and view YAML files online with syntax highlighting and error detection. Instantly checks for syntax errors in Kubernetes configs, Docker Compose, GitHub Actions, and other YAML configuration files.
