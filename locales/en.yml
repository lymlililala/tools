    step2: 'Step 2: Select the hash algorithm (MD5, SHA-256, etc.).'
    step3: 'Step 3: The hash output appears instantly. Click to copy.'
    faq1q: What is a hash function?
    faq1a: A hash function takes any input and produces a fixed-length output (digest). It is one-way — you cannot reverse a hash to get the original input. It is used in passwords, file integrity checks, and digital signatures.
    faq2q: Which hash algorithm should I use?
    faq2a: For security-sensitive use cases, use SHA-256 or SHA-512. MD5 and SHA-1 are considered cryptographically broken and should only be used for non-security purposes like checksums.
    faq3q: What is the difference between MD5 and SHA256?
    faq3a: MD5 has known collision vulnerabilities and should not be used for security purposes — it is only suitable for non-security tasks like checksums. SHA256 is the current secure choice for digital signatures and certificates. For password storage, use bcrypt, scrypt, or Argon2 instead of any SHA algorithm.
    faq4q: Why should MD5 or SHA not be used to store passwords?
    faq4a: "MD5 and SHA algorithms are designed to be fast, which is exactly the wrong property for password storage. GPUs can compute billions of hashes per second, and combined with precomputed rainbow tables, simple passwords can be cracked in seconds. For password storage, use purpose-built slow hash algorithms: bcrypt (most widely used), scrypt (memory-hard), or Argon2id (recommended — winner of the Password Hashing Competition)."

  json-to-toml:
    step1: 'Step 1: Paste your JSON content into the left editor.'
    step2: 'Step 2: The TOML equivalent appears in real-time.'
    step3: 'Step 3: Copy or download the TOML output.'
    faq1q: 'What JSON structures are not supported in TOML?'
    faq1a: 'TOML does not support null values or arrays of mixed types.'
    faq2q: 'Why convert JSON to TOML?'
    faq2a: 'TOML is more human-readable for configuration files. Some tools like Cargo and Hugo use TOML exclusively.'
    faq3q: What should I know when converting JSON to TOML?
    faq3a: TOML does not support null values, mixed-type arrays are invalid, and TOML has native date/time types. Integer keys need special handling. Review output for type mismatches before using in production.
    faq4q: How can I use JSON-to-TOML conversion to migrate config in a Rust project?
    faq4a: "The Rust ecosystem (Cargo.toml, Tauri, Bevy) uses TOML extensively. Migration steps: use this tool to convert existing JSON config to TOML; review the output, paying attention to TOML-native date-time format (RFC 3339) and multi-line strings (triple quotes); deserialize in Rust using the serde + toml crate. TOML is better than JSON for hand-written config and supports comments natively."
