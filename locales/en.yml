    step2: 'Step 2: Or type a cron expression directly into the input box.'
    step3: 'Step 3: The human-readable description and next scheduled times are shown automatically.'
    faq1q: 'What is a cron expression?'
    faq1a: 'A cron expression is a string of 5 fields (minute hour day month weekday) that defines a recurring schedule for Unix/Linux tasks.'
    faq2q: 'What does star slash 5 mean in cron?'
    faq2a: 'It means every 5 units. In the minute field it runs at 0, 5, 10, 15... minutes past each hour.'
    faq3q: What do the 5 crontab fields represent?
    faq3a: 'The 5 crontab fields are: minute (0–59), hour (0–23), day of month (1–31), month (1–12), and day of week (0–7, where 0 and 7 both mean Sunday). For example, 0 9 * * 1-5 runs at 9:00 AM Monday through Friday. Use * for any value, */n for step intervals, and comma-separated values for multiple choices.'
    faq4q: How do I debug a cron job that is not running?
    faq4a: "Common causes: path issues (cron has fewer environment variables — use absolute paths), insufficient permissions, script syntax errors, and missing error logging. Debugging steps: append >> /tmp/cron.log 2>&1 to capture output; verify the rule with crontab -l; check /var/log/syslog or journalctl -u cron; confirm the cron service is running (systemctl status cron)."
