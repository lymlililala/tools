    step3: 'Step 3: The formatted result appears instantly. Use the comparison table to see the same number across multiple locales.'
    faq1q: What is number formatting?
    faq1a: Number formatting adapts how numbers are displayed based on locale and style — for example, 1234.56 can become "1,234.56" (US), "1 234,56" (France), or "￥1,234.56" (China with currency).
    faq2q: What is the difference between compact and scientific notation?
    faq2a: Scientific notation always shows a coefficient and exponent (e.g. 1.23E3). Compact notation uses locale-aware abbreviations (e.g. "1.2K", "1.2万") which are more readable for large numbers.

