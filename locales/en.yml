    faq1q: 'What is a MAC address?'
    faq1a: 'A MAC address is a unique 48-bit hardware identifier assigned to a network interface card, written as six pairs of hex digits.'
    faq2q: 'What are the first 3 bytes of a MAC address?'
    faq2a: 'The first 3 bytes (OUI) are assigned by the IEEE to manufacturers. The last 3 bytes are assigned by the manufacturer.'
    faq3q: Can MAC addresses be changed?
    faq3a: 'Yes. Linux: ip link set dev eth0 address XX:XX:XX:XX:XX:XX; macOS: sudo ifconfig en0 ether XX:XX:XX:XX:XX:XX; Windows: Device Manager > Network Adapter > Advanced. Changes typically revert after reboot.'
    faq4q: How are the first three bytes (OUI) of a MAC address assigned?
    faq4a: "The OUI (Organizationally Unique Identifier) is assigned by the IEEE to hardware manufacturers to identify device brands. For example, DC:A6:32 belongs to the Raspberry Pi Foundation. After purchasing an OUI, a company assigns the last three bytes (device-unique portion) freely. Identifying OUIs in a network is useful for asset management and security auditing (detecting unauthorized device brands)."
