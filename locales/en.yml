    faq1q: What is URL encoding?
    faq1a: URL encoding (percent-encoding) converts characters that are not allowed in URLs (like spaces, Chinese characters, or symbols) into a %XX format. For example, a space becomes %20.
    faq2q: When do I need to URL-encode a string?
