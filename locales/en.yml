  yaml-to-toml:
    step1: 'Step 1: Paste your YAML content into the left editor.'
    step2: 'Step 2: The TOML equivalent is generated in real-time.'
    step3: 'Step 3: Copy or download the TOML output.'
    faq1q: 'When should I use TOML over YAML?'
    faq1a: 'TOML is preferred for simple configuration files where clarity is critical. It has stricter syntax than YAML.'
    faq2q: 'Does YAML support anchors and aliases?'
    faq2a: 'Yes. YAML supports anchors (&) and aliases (*) for reusing content. TOML does not have a direct equivalent.'
    faq3q: What should I watch out for when converting YAML to TOML?
    faq3a: TOML does not support null values, requires same-type arrays, and lacks YAML's multi-document format. Deep nesting becomes verbose in TOML's table syntax. Review output carefully for type mismatches and null value handling.
    faq4q: Which YAML features are not supported in TOML?
    faq4a: "YAML-to-TOML incompatibilities: YAML anchors and aliases (&anchor, *alias) do not exist in TOML and are expanded on conversion; YAML allows null values, TOML does not (they are dropped); YAML has special types (binary, timestamped) handled differently; YAML supports multi-document streams (--- separator), TOML does not. Carefully review the output after conversion to ensure correctness."
    title: YAML to TOML
    description: Convert YAML to TOML format online. Paste your YAML and get a valid TOML configuration file instantly. Supports all YAML features including nested keys and arrays.
