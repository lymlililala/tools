    faq3a: The capacity depends on content type and error correction level. At level L (low), a QR code can hold up to 7,089 numeric characters, 4,296 alphanumeric characters, or 2,953 bytes of binary data. For URLs, keep the content short — shorter URLs generate simpler, more scannable QR codes that work better when printed small.
