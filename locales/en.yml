    faq1q: 'How is China income tax calculated?'
    faq1a: 'China uses a progressive tax rate with 7 brackets (3%-45%). Tax = (Gross - Social Insurance - 5000 deduction - Special deductions) x Rate - Quick deduction.'
    faq2q: 'What is included in social insurance?'
    faq2a: 'Five insurances: pension, medical, unemployment, work injury, maternity. One fund: housing provident fund. Rates vary by city.'
