    faq1q: 'What are registered vs dynamic ports?'
    faq1a: 'Ports 0-1023 are well-known system ports. Ports 1024-49151 are registered ports. Ports 49152-65535 are dynamic ephemeral ports.'
    faq2q: 'Why do I need a random port?'
    faq2a: 'Random ports are used when starting local dev servers or containers to avoid conflicts with already-running processes.'
    faq3q: Which port numbers should I avoid?
    faq3a: Ports 0-1023 require admin privileges (80 HTTP, 443 HTTPS, 22 SSH, 3306 MySQL). Ports 1024-49151 have conventions (8080, 5432 PostgreSQL, 6379 Redis). Ports 49152-65535 are safe for development services. Check for conflicts with lsof -i :PORT on macOS/Linux.
    faq4q: How are port numbers categorized? Which range should I use for development?
    faq4a: "Ports are divided into three categories: Well-Known Ports (0-1023) — assigned by IANA to system services (HTTP:80, HTTPS:443, SSH:22), requires root/admin to bind; Registered Ports (1024-49151) — registered but usable at user level (MySQL:3306, PostgreSQL:5432); Dynamic/Private Ports (49152-65535) — completely free to use, ideal for development and testing. For development, ports 3000-9999 are popular, easy to remember, and rarely conflict."
