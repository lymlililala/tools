    faq1q: 'What is an HTTP status code?'
    faq1a: 'HTTP status codes are 3-digit numbers returned by a server indicating whether the request was successful, redirected, or resulted in an error.'
    faq2q: 'What is the difference between 401 and 403?'
    faq2a: '401 Unauthorized means authentication is required but not provided. 403 Forbidden means the server refuses to authorize the request.'
    faq3q: What do the HTTP status code categories mean?
    faq3a: '1xx: informational; 2xx: success (200 OK, 201 Created, 204 No Content); 3xx: redirection (301 Permanent, 302 Temporary, 304 Not Modified); 4xx: client error (400 Bad Request, 401 Unauthorized, 403 Forbidden, 404 Not Found); 5xx: server error (500 Internal, 502 Bad Gateway, 503 Unavailable).'
    faq4q: How should 3xx redirects and 4xx client errors be used correctly?
    faq4a: 301 Permanent Redirect (transfers SEO weight, e.g., domain migration); 302 Temporary Redirect (e.g., login redirect); 304 Not Modified (cache unchanged, saves bandwidth); 400 Bad Request (malformed syntax); 401 Unauthorized (authentication required); 403 Forbidden (authenticated but no permission); 404 Not Found; 422 Unprocessable Entity (validation failed, common in REST APIs); 429 Too Many Requests; 500 Internal Server Error.
