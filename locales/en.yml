    faq1q: 'What is base conversion?'
    faq1a: 'Base conversion translates a number from one numeral system to another. Binary (2), octal (8), decimal (10), and hexadecimal (16) are common.'
    faq2q: 'How do I convert hex to binary?'
    faq2a: 'Each hex digit corresponds to exactly 4 binary digits. For example F(hex) = 1111(binary).'
    faq3q: When do developers use different number bases?
    faq3a: 'Binary (bin): bit operations and low-level programming; Octal (oct): Unix file permissions (chmod); Decimal (dec): everyday numbers; Hexadecimal (hex): memory addresses, color values (#RRGGBB), byte data; Base64: binary data text encoding. Understanding base conversion is fundamental to computer science.'
    faq4q: What are the practical uses of base conversion in computing?
    faq4a: "Base conversion is widely used in computer science: hexadecimal represents color values (#FF5733), memory addresses, and raw byte data; binary is used for bitwise operations and permission masks; octal was historically used for Unix file permissions; Base64 is used for URL-safe data encoding. Understanding base conversion is fundamental to low-level programming."
