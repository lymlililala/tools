    faq1q: 'What is Git?'
    faq1a: 'Git is a distributed version control system for tracking changes in source code allowing developers to collaborate and maintain project history.'
    faq2q: 'What is the difference between git pull and git fetch?'
    faq2a: 'git fetch downloads remote changes but does not merge them. git pull equals git fetch plus git merge.'
    faq3q: What is the difference between git merge and git rebase?
    faq3a: git merge creates a merge commit preserving full history. git rebase replays commits for a linear history but rewrites hashes. Use merge for team collaboration; use rebase to clean local feature branches. Never rebase already-pushed shared commits.
    faq4q: What are the most common mistakes in a Git workflow?
    faq4a: "Common mistakes: committing directly to main/master (use branches instead); unclear commit messages (e.g., 'fix' or 'update'); committing passwords or API keys to the repo; pushing force to shared branches, destroying others' history; not resolving conflicts properly before merging. Recommendations: follow Conventional Commits, use .gitignore and pre-commit hooks for automated checks, and enable branch protection rules."
