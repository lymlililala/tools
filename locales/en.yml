  password-strength-analyser:
    step1: 'Step 1: Type or paste your password into the input field.'
    step2: 'Step 2: The strength meter updates in real-time as you type.'
    step3: 'Step 3: Review the score, crack-time estimate, and improvement suggestions.'
    faq1q: 'What makes a password strong?'
    faq1a: 'A strong password is long (12+ characters), uses a mix of uppercase, lowercase, numbers and symbols, and avoids common words.'
    faq2q: 'Is my password sent to a server?'
    faq2a: 'No. All analysis is done entirely in your browser. Your password never leaves your device.'
    title: Password strength analyser
    description: Discover the strength of your password with this client-side-only password strength analyser and crack time estimation tool.

  chronometer:
    step1: 'Step 1: Click Start to begin the timer.'
    step2: 'Step 2: Click Lap to record split times.'
    step3: 'Step 3: Click Stop to pause and Reset to clear.'
    faq1q: 'What is a chronometer?'
    faq1a: 'A chronometer is a precise timekeeping device used to measure elapsed time commonly used for sports benchmarks and timing events.'
    faq2q: 'Does closing the tab stop the timer?'
    faq2a: 'Yes, closing or refreshing the tab will reset the timer since it runs in the browser JavaScript context.'
    title: Chronometer
    description: Monitor the duration of a thing. Basically a chronometer with simple chronometer features.

  token-generator:
    step1: 'Step 1: Choose character types - uppercase, lowercase, numbers, and/or symbols.'
    step2: 'Step 2: Drag the slider to set the desired token length (1-512 characters).'
    step3: 'Step 3: The token is instantly generated and displayed in the output box.'
    step4: 'Step 4: Click Copy to copy the token to your clipboard.'
    step5: 'Step 5: Click Refresh to regenerate a new random token at any time.'
    faq1q: 'What is a random token used for?'
    faq1a: 'Random tokens are used as API keys, session tokens, CSRF tokens, password reset links, and any scenario requiring a unique unpredictable string.'
    faq2q: 'How secure is the generated token?'
    faq2a: 'The token uses the browser built-in cryptographic random number generator making it cryptographically secure.'
    title: Token generator
    description: Generate random string with the chars you want, uppercase or lowercase letters, numbers and/or symbols.

    uppercase: Uppercase (ABC...)
    lowercase: Lowercase (abc...)
    numbers: Numbers (123...)
    symbols: Symbols (!-;...)
    length: Length
    tokenPlaceholder: 'The token...'
    copied: Token copied to the clipboard
    copiedFeedback: 'Copied!'
    button:
      copy: Copy
      refresh: Refresh
  percentage-calculator:
    step1: 'Step 1: Select the type of percentage calculation you need.'
    step2: 'Step 2: Enter the required values in the input fields.'
    step3: 'Step 3: The result updates instantly.'
    faq1q: 'How do I calculate percentage change?'
    faq1a: 'Percentage change = ((New Value - Old Value) / Old Value) x 100. Positive means increase, negative means decrease.'
    faq2q: 'How do I find X percent of Y?'
    faq2a: 'Multiply Y by (X / 100). For example 20% of 150 = 150 x 0.20 = 30.'
    title: Percentage calculator
    description: Easily calculate percentages from a value to another value, or from a percentage to a value.

  svg-placeholder-generator:
    step1: 'Step 1: Set the desired width and height for the placeholder image.'
    step2: 'Step 2: Choose background and text colors.'
    step3: 'Step 3: Optionally customize the label text.'
    step4: 'Step 4: Copy the SVG code or data URL for use in your project.'
    faq1q: 'What is an SVG placeholder?'
    faq1a: 'An SVG placeholder is a lightweight vector image used during development to reserve space for real images before they are loaded.'
    faq2q: 'Can I use SVG placeholders in production?'
    faq2a: 'SVG placeholders are primarily for development but can be used in production for fallback or skeleton screens.'
    title: SVG placeholder generator
    description: Generate svg images to use as a placeholder in your applications.

  json-to-csv:
    step1: 'Step 1: Paste your JSON array into the input field.'
    step2: 'Step 2: The tool auto-detects column headers from the JSON keys.'
    step3: 'Step 3: Review the CSV output and click Copy or Download.'
    faq1q: 'What JSON structure is supported?'
    faq1a: 'The tool supports a JSON array of objects.'
    faq2q: 'What if my JSON objects have different keys?'
    faq2a: 'The tool merges all unique keys as column headers. Missing fields are left empty in the CSV output.'
    title: JSON to CSV
    description: Convert JSON to CSV with automatic header detection.

  camera-recorder:
    step1: 'Step 1: Click Allow when the browser requests camera and microphone permissions.'
    step2: 'Step 2: Use the camera preview to frame your shot.'
    step3: 'Step 3: Click Photo to take a snapshot or Record to start video.'
    step4: 'Step 4: Stop recording and download the result.'
    faq1q: 'Is my video uploaded to a server?'
    faq1a: 'No. Everything is processed locally in your browser. No data is uploaded.'
    faq2q: 'What formats are supported?'
    faq2a: 'Photos are saved as PNG. Videos are saved in WebM format supported by most modern browsers.'
    title: Camera recorder
    description: Take a picture or record a video from your webcam or camera.

  keycode-info:
    step1: 'Step 1: Click anywhere on the page to focus the keyboard listener.'
    step2: 'Step 2: Press any key on your keyboard.'
    step3: 'Step 3: The key name, keyCode, code, location, and modifiers are displayed instantly.'
    step4: 'Step 4: Click the copy icon next to any field to copy that value.'
    faq1q: 'What is a keyCode?'
    faq1a: 'The keyCode property is a legacy integer representing the key pressed. Modern code should use event.key or event.code instead.'
    faq2q: 'What is the difference between key and code?'
    faq2a: 'key represents the printed character. code represents the physical key position. Use key and code in modern JavaScript.'
    title: Keycode info
    description: Find the javascript keycode, code, location and modifiers of any pressed key.

  emoji-picker:
    step1: 'Step 1: Browse or search for an emoji by name or keyword.'
    step2: 'Step 2: Click an emoji to copy it to your clipboard.'
    step3: 'Step 3: The unicode code point and shortcode are also displayed.'
    faq1q: 'How do I search for a specific emoji?'
    faq1a: 'Use the search box and type keywords like heart, fire, or smile. The list filters in real-time.'
    faq2q: 'Can I use emojis in code or URLs?'
    faq2a: 'Yes. Each emoji has a unicode code point usable in HTML entities or JSON. URLs require percent-encoding.'
    title: Emoji picker
    description: Copy and paste emojis easily and get the unicode and code points value of each emoji.

  color-converter:
    step1: 'Step 1: Use the color picker or type a color value in any format.'
    step2: 'Step 2: All other formats (HEX, RGB, HSL, CMYK etc.) update automatically.'
    step3: 'Step 3: Check the WCAG contrast score to ensure accessibility.'
    step4: 'Step 4: Click any field to copy the value to your clipboard.'
    faq1q: 'What is the difference between HEX RGB and HSL?'
    faq1a: 'HEX is a 6-digit hexadecimal color code. RGB defines color by Red Green Blue channels (0-255). HSL defines Hue Saturation and Lightness as percentages.'
    faq2q: 'What is WCAG contrast ratio?'
    faq2a: 'The WCAG contrast ratio measures readability of text on a background. A ratio of 4.5:1 meets AA standard; 7:1 meets AAA.'
    title: Color converter
    description: Convert color between the different formats (hex, rgb, hsl and css name)

  bcrypt:
    step1: 'Step 1: Enter the text you want to hash.'
    step2: 'Step 2: Adjust the cost factor (rounds) - higher values are slower but more secure.'
    step3: 'Step 3: The bcrypt hash is generated and displayed.'
    step4: 'Step 4: To verify, paste a hash in the verification section and enter the original text.'
    faq1q: 'What is bcrypt?'
    faq1a: 'Bcrypt is a password-hashing algorithm designed to be intentionally slow to resist brute-force attacks. It uses a salt to protect against rainbow table attacks.'
    faq2q: 'What is the cost factor?'
    faq2a: 'The cost factor controls how many hashing rounds are performed. Increasing it by 1 doubles the computation time.'
    title: Bcrypt
    description: Hash and compare text string using bcrypt. Bcrypt is a password-hashing function based on the Blowfish cipher.
