    faq1a: 'YAML prettify re-formats YAML with consistent indentation and spacing making it easier to read.'
    faq2q: 'Will prettifying change my YAML values?'
    faq2a: 'No. Prettifying only changes whitespace and formatting. The data values and structure remain identical.'
    faq3q: Why does YAML fail to parse after formatting?
    faq3a: YAML requires spaces (not tabs) and consistent sibling indentation. This tool uses 2-space indentation. If formatting produces errors, check the original for tab characters, inconsistent indentation, or unquoted values containing colons followed by a space.
    faq4q: What common pitfalls should I watch for when formatting YAML?
    faq4a: "Common YAML pitfalls: indentation must be consistent (mixing tabs and spaces causes errors); special values yes/no/true/false/null undergo automatic type coercion (e.g., the Norwegian country abbreviation NO is parsed as false — quote it to prevent this); a colon must be followed by a space; use | for literal multi-line strings or > for folded; date format strings (2023-01-01) are automatically parsed as date objects. Always validate YAML syntax before formatting."
