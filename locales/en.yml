  token-generator:
    step1: 'Step 1: Choose character types - uppercase, lowercase, numbers, and/or symbols.'
    step2: 'Step 2: Drag the slider to set the desired token length (1-512 characters).'
    step3: 'Step 3: The token is instantly generated and displayed in the output box.'
    step4: 'Step 4: Click Copy to copy the token to your clipboard.'
    step5: 'Step 5: Click Refresh to regenerate a new random token at any time.'
    faq1q: 'What is a random token used for?'
    faq1a: 'Random tokens are used as API keys, session tokens, CSRF tokens, password reset links, and any scenario requiring a unique unpredictable string.'
    faq2q: 'How secure is the generated token?'
    faq2a: 'The token uses the browser built-in cryptographic random number generator making it cryptographically secure.'
    faq3q: Can I use the generated tokens in production?
    faq3a: Yes. This tool uses crypto.getRandomValues() to generate cryptographically secure random strings with sufficient entropy, suitable for production use as API keys, session tokens, and CSRF tokens. All generation happens locally in your browser and is never sent to a server.
    faq4q: What security considerations apply when generating API tokens?
    faq4a: "Secure token generation requirements: use a cryptographically secure random number generator (crypto.getRandomValues or os.urandom) — never Math.random(); sufficient length (at least 128 bits) to prevent brute-force enumeration; store only the hash (e.g., SHA-256) of the token, never the plaintext — so a leaked database still keeps tokens safe; set expiration times; show the token only once after generation (like GitHub PATs); implement rate limiting and anomaly detection."
    title: Token generator
    description: Generate random string with the chars you want, uppercase or lowercase letters, numbers and/or symbols.

