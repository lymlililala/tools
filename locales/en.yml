    faq3q: Which characters must always be escaped in HTML?
    faq3a: 'In content: < becomes &lt;, > becomes &gt;, & becomes &amp;. In attribute values: double quote becomes &quot;, single quote becomes &#39;. Proper escaping is the foundation of XSS prevention.'
    faq4q: When is HTML entity encoding required in HTML?
