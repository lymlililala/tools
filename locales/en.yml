    faq1q: 'What is the difference between HEX RGB and HSL?'
    faq1a: 'HEX is a 6-digit hexadecimal color code. RGB defines color by Red Green Blue channels (0-255). HSL defines Hue Saturation and Lightness as percentages.'
    faq2q: 'What is WCAG contrast ratio?'
    faq2a: 'The WCAG contrast ratio measures readability of text on a background. A ratio of 4.5:1 meets AA standard; 7:1 meets AAA.'
    faq3q: What are the differences between HEX, RGB, and HSL color formats?
    faq3a: HEX (e.g. #FF5733) is the most common format for web design — compact and easy to copy. RGB is useful for dynamic color calculations in JavaScript. HSL describes colors by hue, saturation, and lightness, making it more intuitive for creating color palettes and adjusting brightness or saturation programmatically.
    faq4q: What advantages does HSL have over RGB?
    faq4a: HSL (Hue, Saturation, Lightness) is more intuitive for humans. Adjusting brightness only changes the L value without affecting the hue, making it easy to generate color themes (e.g., different lightness variants of the same hue). In CSS, hsl() makes color adjustments easier to understand and maintain, especially for dynamic gradients, theme switching, and responsive color schemes.
