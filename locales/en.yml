    faq1q: 'What is an SVG placeholder?'
    faq1a: 'An SVG placeholder is a lightweight vector image used during development to reserve space for real images before they are loaded.'
    faq2q: 'Can I use SVG placeholders in production?'
    faq2a: 'SVG placeholders are primarily for development but can be used in production for fallback or skeleton screens.'
    faq3q: What is the difference between SVG placeholders and CSS skeleton screens?
    faq3a: An SVG placeholder is a real image element showing a colored box with optional text, used as fallback when images fail to load. A CSS skeleton screen uses animated gray gradients to simulate loading content — a more modern UX pattern.
    faq4q: What advantages do SVG placeholders have over PNG/JPEG placeholders?
    faq4a: "SVG placeholder advantages: extremely small size (typically under 1 KB vs. dozens of KB for PNG); vector format displays crisp at any size without multiple resolution variants; can be embedded directly as a data URI in HTML/CSS, reducing HTTP requests; colors, text, and dimensions are customizable without regenerating the file; combined with img width/height attributes, prevents layout shift (CLS), improving Core Web Vitals."
    title: SVG placeholder generator
    description: Generate customizable SVG placeholder images with custom dimensions, text, colors, and font sizes. Perfect for mockups, wireframes, and development prototypes. Download as SVG or copy the data URI directly.

  json-to-csv:
    step1: 'Step 1: Paste your JSON array into the input field.'
    step2: 'Step 2: The tool auto-detects column headers from the JSON keys.'
    step3: 'Step 3: Review the CSV output and click Copy or Download.'
    faq1q: 'What JSON structure is supported?'
    faq1a: 'The tool supports a JSON array of objects.'
    faq2q: 'What if my JSON objects have different keys?'
    faq2a: 'The tool merges all unique keys as column headers. Missing fields are left empty in the CSV output.'
    faq3q: How does the tool handle nested objects when converting JSON to CSV?
    faq3a: The tool automatically flattens nested objects using dot notation as column headers — for example, address.city becomes its own column. Nested arrays are serialized as strings within their cell. This approach preserves all data, though complex deeply nested structures may require manual post-processing for specific use cases.
    faq4q: How do I handle nested objects and arrays when converting JSON to CSV?
    faq4a: "CSV is a flat 2D structure with no native support for nesting. Common strategies: flattening (expand user.address.city into a column named user_address_city); serialization (convert nested objects to JSON strings in a cell — poor readability); normalization (split into multiple CSVs linked by IDs). Choose based on downstream use: flattening for data analysis, normalization for database import."
    title: JSON to CSV Converter
    description: Convert JSON arrays to CSV format online with automatic column header detection. Paste your JSON data and download a ready-to-use CSV file for Excel, Google Sheets, or databases.
