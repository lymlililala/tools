    faq1a: 'A slug is a URL-friendly string typically lowercase with hyphens instead of spaces, used in URLs.'
    faq2q: 'Does it support non-English characters?'
    faq2a: 'Yes. The tool converts accented and special characters to their ASCII equivalents.'
    faq3q: What are best practices for URL slugs?
    faq3a: 'Good slugs: all lowercase, hyphen-separated (not underscores), no special characters, concise and keyword-rich (under 60 characters). Remove stop words. Example: /blog/seo-best-practices is better than /blog/SEO_Best_Practices_2024.'
    faq4q: What best practices should I follow when generating URL slugs?
    faq4a: "URL slug best practices: all lowercase; use hyphens (-) to separate words, not underscores (Google treats underscores as word-joiners, less SEO-friendly); remove special characters and punctuation; romanize or drop non-ASCII characters (e.g., Chinese); keep it short (3-5 keywords) and meaningful; omit stop words (a, the, is). CMS systems like WordPress and Ghost follow this convention by default."
