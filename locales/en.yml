    faq2q: 'Is obfuscation the same as encryption?'
    faq2a: 'No. Obfuscation is a visual technique - the original string is not recoverable. Encryption produces a reversible ciphertext.'
    faq3q: When is string obfuscation useful?
    faq3a: 'Common uses: logging (hiding API keys and passwords), screenshots and demos (masking sensitive tokens), UI display (showing partial card numbers like **** 1234), error reports (protecting user privacy), and technical documentation (showing example configs without exposing real credentials).'
    faq4q: Does string obfuscation truly protect sensitive information in source code?
    faq4a: "String obfuscation only increases the difficulty of reverse engineering — it does not truly protect sensitive data. Obfuscated code can still be decompiled and statically analyzed, just taking more time. Real protection: store sensitive config (API keys, DB passwords) in environment variables or a KMS, never in the codebase; use .gitignore and secret scanning tools (e.g., GitHub Secret Scanning) to prevent accidental commits; rotate keys regularly so leaks expire quickly."
