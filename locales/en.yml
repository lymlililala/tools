    step3: 'Step 3: Click any swatch to copy its hex value to your clipboard.'
    faq1q: What is a color harmony?
    faq1a: Color harmonies are combinations of colors that are visually pleasing based on their positions on the color wheel. Common types include complementary (opposite), analogous (adjacent), and triadic (evenly spaced).
    faq2q: What is the difference between tints and shades?
    faq2a: Tints are created by adding white to a color (making it lighter), while shades are created by adding black (making it darker). This tool generates both to give you a full range.

