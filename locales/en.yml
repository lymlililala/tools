    faq2a: 'Yes. The diff viewer recursively compares nested objects and arrays.'
    faq3q: How does JSON diff handle array element ordering?
    faq3a: Arrays are treated as ordered sequences compared index by index. Reordered elements appear as deleted-then-added. If your arrays are unordered sets (e.g. list of tags), sort both before comparing to avoid false positives in the diff.
    faq4q: How is a JSON diff tool used in a CI/CD pipeline?
    faq4a: "Uses of JSON comparison in CI/CD: API compatibility testing (comparing new vs. old API response structures); configuration file review (highlighting config changes in PRs); snapshot testing (storing expected output and automatically detecting unexpected changes); database schema change review. Command-line tools like jq or jsondiff (Python) are recommended for automated JSON comparison in pipelines."
