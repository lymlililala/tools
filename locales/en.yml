    faq1a: Number formatting adapts how numbers are displayed based on locale and style — for example, 1234.56 can become "1,234.56" (US), "1 234,56" (France), or "￥1,234.56" (China with currency).
    faq2q: What is the difference between compact and scientific notation?
    faq2a: Scientific notation always shows a coefficient and exponent (e.g. 1.23E3). Compact notation uses locale-aware abbreviations (e.g. "1.2K", "1.2万") which are more readable for large numbers.
    faq3q: Why do number formats differ between countries?
    faq3a: "Different countries use different decimal and thousands separators: US/UK use comma for thousands (1,000.00); Germany/France use period for thousands (1.000,00); India uses different grouping (1,00,000.00). International software must use locale-aware number formatting based on the user's region."
    faq4q: What international number format differences should I be aware of?
    faq4a: "Number formats vary significantly by country: thousands separator — US/China use a comma (1,000), Europe uses a period (1.000) or space (1 000); decimal point — US/China use a period (3.14), Europe uses a comma (3,14); currency symbol position varies. When developing internationalized applications, use the Intl.NumberFormat API rather than hardcoding formats."
