    faq2a: 'ETA = (Total Items - Completed) divided by (Completed / Time Elapsed). Assumes a constant processing rate.'
    faq3q: Why is ETA often inaccurate in practice?
    faq3a: ETA assumes a constant rate, but real tasks vary — downloads fluctuate with bandwidth, builds may slow near the end. For better accuracy use a sliding window for recent throughput instead of overall average, and add buffer time for uncertainty.
    faq4q: How can I make task completion time estimates more accurate?
    faq4a: "Techniques for better ETA accuracy: base estimates on historical rates, not optimistic guesses; break large tasks into milestones and refine estimates iteratively; track actual vs. predicted times to correct systematic biases; use three-point estimation (optimistic, most likely, pessimistic) and take a weighted average; account for task dependencies and resource contention. Software teams often use planning poker for collective estimation."
    title: ETA Arrival Time Calculator
    description: An ETA (Estimated Time of Arrival) calculator to determine the approximate end time of a task, for example, the end time and duration of a file download.

  roman-numeral-converter:
    step1: 'Step 1: Enter an Arabic number (1-3999) or a Roman numeral in the input field.'
    step2: 'Step 2: The conversion result updates automatically.'
    step3: 'Step 3: Click Copy to copy the result.'
    faq1q: 'What are Roman numerals?'
    faq1a: 'Roman numerals are a numeral system from ancient Rome using letters: I (1), V (5), X (10), L (50), C (100), D (500), M (1000).'
    faq2q: 'Why is 4 written as IV and not IIII?'
    faq2a: 'Roman numerals use subtractive notation. A smaller numeral before a larger one means subtraction. IV = 5 - 1 = 4.'
    faq3q: Can Roman numerals represent zero or negative numbers?
    faq3a: No. The Roman system has no zero or negatives. Zero was introduced by Indian mathematicians and spread through Arabic mathematics. Roman numerals are now used decoratively on clock faces, book chapters, movie sequels, and Super Bowl editions.
    faq4q: What are the modern practical uses of Roman numerals?
    faq4a: "Modern uses of Roman numerals: clock faces (classic design); movie copyright years; ordinal numbers for sports events like the Super Bowl (Super Bowl LVIII); monarch and pope ordinals (Queen Elizabeth II); book preface page numbers (i, ii, iii); building inscriptions and monuments; outline and legal document section numbering (I, II, III)."
    title: Roman numeral converter
    description: Convert between Roman numerals and Arabic numbers instantly. Supports numbers from 1 to 3,999. Useful for clock faces, book chapters, movie sequels, copyright years, and historical dates.

  hmac-generator:
    step1: 'Step 1: Enter the message you want to authenticate.'
    step2: 'Step 2: Enter your secret key.'
    step3: 'Step 3: Select the hash algorithm (SHA-256, SHA-512, etc.).'
    step4: 'Step 4: Copy the generated HMAC value.'
    faq1q: 'What is HMAC?'
    faq1a: 'HMAC (Hash-based Message Authentication Code) combines a cryptographic hash function with a secret key to verify data integrity and authenticity.'
    faq2q: 'What is the difference between HMAC and a regular hash?'
    faq2a: 'A regular hash only verifies data integrity. HMAC additionally requires a shared secret key.'
    faq3q: How is HMAC used in API authentication?
    faq3a: In API request signing, the client computes an HMAC of the request parameters plus a timestamp using a shared secret key, then includes it in the request header. The server recomputes the HMAC to verify the request has not been tampered with and originated from a legitimate client. This pattern is used by AWS Signature V4 and many webhook security implementations.
    faq4q: How does HMAC work for API request signing?
    faq4a: "API signing flow: the server and client share a secret key; the client signs the request content (URL + timestamp + body) with HMAC and includes the signature in the request header; the server recomputes HMAC with the same key and compares it to the header — a match means authentication passes. The timestamp prevents replay attacks (usually with a 5-minute window). AWS, Stripe, and GitHub Webhooks all use this approach."
