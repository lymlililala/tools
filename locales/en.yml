    faq1a: 'TOML is a configuration file format often used in Rust (Cargo.toml) and Hugo projects.'
    faq2q: 'What happens to TOML comments during conversion?'
    faq2a: 'JSON does not support comments so all TOML comments are lost during conversion.'
    faq3q: What are the advantages of TOML over JSON?
    faq3a: 'TOML is designed specifically for configuration files: it supports comments (#), has native date and time types, and uses a syntax that many find more readable than JSON for structured config. JSON is better for data interchange. TOML is widely used in the Rust ecosystem (Cargo.toml) and static site generators like Hugo.'
    faq4q: How do I handle date-time types after converting TOML to JSON?
    faq4a: "TOML has native date-time support (RFC 3339 format), while JSON has no date type — only strings and numbers. When converting, TOML date-times are typically serialized to JSON strings (preserving ISO 8601 format). When consuming the result, manually parse the strings into Date objects in your code (e.g., new Date('2006-01-02T15:04:05Z')). Document date field formats in your API spec to prevent downstream misinterpretation."
