  keycode-info:
    step1: 'Step 1: Click anywhere on the page to focus the keyboard listener.'
    step2: 'Step 2: Press any key on your keyboard.'
    step3: 'Step 3: The key name, keyCode, code, location, and modifiers are displayed instantly.'
    step4: 'Step 4: Click the copy icon next to any field to copy that value.'
    faq1q: 'What is a keyCode?'
    faq1a: 'The keyCode property is a legacy integer representing the key pressed. Modern code should use event.key or event.code instead.'
    faq2q: 'What is the difference between key and code?'
    faq2a: 'key represents the printed character. code represents the physical key position. Use key and code in modern JavaScript.'
    faq3q: How should I listen for keyboard events in JavaScript?
    faq3a: Use event.key to get the logical value of the key pressed (e.g. 'a', 'Enter', 'ArrowUp'), and event.code for the physical key position (e.g. 'KeyA', 'ShiftLeft'). Avoid the deprecated keyCode property. For cross-platform shortcuts use event.code; for text input handling use event.key.
    faq4q: What is the difference between keyCode, which, and key in KeyboardEvent?
    faq4a: "keyCode and which are deprecated — they return numbers (e.g., Enter=13) and are inconsistent for non-letter keys across keyboard layouts. key is the modern standard, returning meaningful strings (e.g., 'Enter', 'ArrowUp', 'a') independent of keyboard layout — use this. The code property returns the physical key position (e.g., 'KeyA') regardless of input language. New code should use event.key or event.code."
    title: Keycode info
    description: Identify JavaScript keyboard event properties for any key press. Shows keyCode, key, code, location, and modifier states (Shift, Ctrl, Alt, Meta). Essential for building keyboard shortcuts and accessibility features.

  emoji-picker:
    step1: 'Step 1: Browse or search for an emoji by name or keyword.'
    step2: 'Step 2: Click an emoji to copy it to your clipboard.'
    step3: 'Step 3: The unicode code point and shortcode are also displayed.'
    faq1q: 'How do I search for a specific emoji?'
    faq1a: 'Use the search box and type keywords like heart, fire, or smile. The list filters in real-time.'
    faq2q: 'Can I use emojis in code or URLs?'
    faq2a: 'Yes. Each emoji has a unicode code point usable in HTML entities or JSON. URLs require percent-encoding.'
    faq3q: Do emojis look the same on all devices?
    faq3a: No. Emoji appearance depends on the OS and font. The same Unicode code point looks completely different on Apple, Google, Microsoft, and Samsung platforms — in fact, some emojis convey different emotional meanings across platforms. Consider this when using emojis in cross-platform communication.
    faq4q: Why do emojis look different across devices and systems?
    faq4a: Each OS (iOS, Android, Windows, macOS) has its own emoji font (Apple Color Emoji, Noto Color Emoji, etc.), so the same Unicode code point looks visually different on each platform. New emojis may show as empty boxes (tofu) on older systems. When creating cross-platform content, be aware of visual differences and potential differences in perceived meaning.
    title: Emoji Picker & Copy Tool
    description: Browse, search, and copy emojis with a single click. Displays the Unicode code point, HTML entity, and CSS content value for each emoji. Filter by category or search by name across 3,000+ emoji characters.
    searchPlaceholder: "Search emoji (e.g. 'smile')… or press ⌘K"
    clearSearch: Clear search
