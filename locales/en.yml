    faq1a: Base64 is a binary-to-text encoding scheme that represents binary data in an ASCII string. It is commonly used to embed images in HTML/CSS, encode email attachments, and pass binary data in URLs or JSON.
    faq2q: Is Base64 the same as encryption?
    faq2a: No. Base64 is encoding, not encryption. It is easily reversible and provides no security. Anyone can decode a Base64 string without a key.
    faq3q: What are common use cases for Base64 encoding?
    faq3a: Base64 is commonly used to embed images in HTML/CSS as data URIs, encode binary data in JSON APIs and email attachments (MIME), encode the header and payload in JWT tokens (Base64url variant), and include certificate files (PEM format) in text-based configuration files.

