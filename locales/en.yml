    faq1q: 'What is E.164 format?'
    faq1a: 'E.164 is the international telephone numbering standard. Numbers start with + followed by country code and subscriber number.'
    faq2q: 'What information can be derived from a phone number?'
    faq2a: 'You can determine the country, region, carrier (sometimes), and type (mobile, landline, toll-free, etc.).'
    faq3q: What is E.164 format and why should systems use it?
    faq3a: 'E.164: starts with +, followed by country code and number, no spaces or hyphens, max 15 digits (e.g. +14155551234). Storing in E.164 avoids parsing ambiguity, enables international compatibility, and is directly compatible with APIs like Twilio and AWS SNS.'
    faq4q: How should international phone numbers be stored and handled in a system?
    faq4a: "Best practices: always store in E.164 format (+1234567890) including the country code, no spaces or dashes — this enables consistent global processing; format for display using libphonenumber according to the user's country; validate using libphonenumber (Google's open-source library with implementations in every major language) rather than writing your own regex; store as VARCHAR(20) in databases, not INT (leading zeros may be lost)."
