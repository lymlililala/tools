    faq1q: 'What is CIDR aggregation?'
    faq1a: 'CIDR aggregation finds the smallest set of network prefixes that exactly covers a given IP range.'
    faq2q: 'Why might one IP range result in multiple CIDR blocks?'
    faq2a: 'IP ranges that do not align on power-of-2 boundaries require multiple CIDR blocks to represent exactly.'
    faq3q: Why do multiple CIDRs sometimes represent one IP range?
    faq3a: CIDR blocks must be power-of-2 in size and aligned to corresponding boundaries. An arbitrary start-to-end IP range (e.g. 10.0.0.5 to 10.0.0.20) cannot be expressed as a single CIDR — it decomposes into multiple non-overlapping blocks. This tool performs that decomposition automatically for firewall rules.
    faq4q: What are the practical uses of IP range expansion in network configuration?
    faq4a: "Practical uses of IP range expansion: firewall rules (allow only specific IP ranges); VPN routing tables (specify which traffic goes through the VPN tunnel); Nginx/Apache allow/deny directives; cloud security group rules (AWS Security Groups, Alibaba Cloud); CDN whitelists; database access control. CIDR is the most concise notation — a single IP range may map to multiple CIDR blocks."
