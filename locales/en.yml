    title: CSS Unit Converter
    description: Convert between CSS units - px, rem, em, vw, vh, pt, and percent. Configure root font size, parent font size, and viewport dimensions.
    input: Input Value
    value: Value
    unit: Unit
    baseSettings: Base Settings
    rootFontSize: Root Font Size
    parentFontSize: Parent Font Size
    viewportWidth: Viewport Width
    viewportHeight: Viewport Height
