    faq2q: 'Are YAML comments preserved in JSON?'
    faq2a: 'No. JSON does not support comments so all YAML comments are discarded during conversion.'
    faq3q: What are the main differences between YAML and JSON?
    faq3a: YAML uses indentation for nesting, supports comments (#), multiline strings, and anchors/aliases. JSON uses braces and brackets, has a stricter syntax, and is faster to parse. YAML 1.2 is a superset of JSON. YAML is preferred for human-maintained config files; JSON is preferred for API data exchange.
    faq4q: How are YAML anchors and aliases handled in JSON?
    faq4a: "YAML supports anchors (&anchor) and aliases (*alias) for reusing configuration fragments — a feature JSON lacks. When converting to JSON, aliases are expanded (inlined), generating fully repeated data. This means the resulting JSON is more verbose than the YAML and loses the original maintainability advantage. If JSON also needs to support reuse, handle it at the application layer (e.g., JSON Schema's $ref)."
