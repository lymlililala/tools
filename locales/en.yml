    step2: 'Step 2: Enter the number of UUIDs to generate.'
    step3: 'Step 3: Click "Generate" and copy the result.'
    faq1q: What is a UUID?
    faq1a: A UUID (Universally Unique Identifier) is a 128-bit identifier used to uniquely identify information in distributed systems. There are approximately 5.3 × 10²² possible UUIDs in version 4.
    faq2q: What is the difference between UUID v1 and v4?
    faq2a: UUID v1 is time-based and includes the machine's MAC address, making it predictable but sequential. UUID v4 is randomly generated and is the most common choice for general use.
    faq3q: What is the difference between UUID v4 and UUID v7?
    faq3a: UUID v4 is completely random with no ordering, making it ideal for most use cases. UUID v7 (newer RFC 9562) is time-ordered, embedding a millisecond timestamp prefix for database-friendly sorting. If you need sortable unique IDs with time ordering for database primary keys, consider UUID v7 or ULID as modern alternatives to v4.
