    faq1a: 'HTTP Basic Auth sends credentials as Base64-encoded username:password in an Authorization header with every request.'
    faq2q: 'Is Basic Auth secure?'
    faq2a: 'Basic Auth alone is NOT secure because credentials are only Base64-encoded. Always use it over HTTPS.'
    faq3q: What is the difference between Basic Auth and Bearer Token authentication?
    faq3a: Basic Auth sends username:password as Base64 in every request — requires HTTPS, simple but exposes credentials. Bearer Token sends a short-lived JWT or opaque token — does not expose passwords, supports expiration and scopes, better suited for modern API design and single sign-on scenarios.
    faq4q: Is Basic Auth secure? When should it be used?
    faq4a: Basic Auth encodes credentials in Base64 and sends them in the request header — it provides no encryption on its own. It must be combined with HTTPS to be reasonably secure. It is suitable for internal APIs, development environments, or low-security scenarios. For production user-facing services, prefer OAuth2, JWT, or API keys.
