    step4: 'Step 4: Select repayment type: Equal Payment or Equal Principal.'
    step5: 'Step 5: Optionally enable the Combined Provident Fund Loan for split financing.'
    faq1q: What is the difference between Equal Payment and Equal Principal?
    faq1a: Equal Payment (等额还款) keeps your monthly payment fixed throughout the loan. Equal Principal (等额本金) pays the same principal each month, so your payment decreases over time — you pay less total interest but higher initial payments.
    faq2q: What is the minimum down payment in China?
    faq2a: For first-time homebuyers in most Chinese cities, the minimum down payment is 20%. Some cities and loan types may require 30% or more.
    faq3q: How is the monthly payment calculated?
    faq3a: 'For Equal Payment: M = P × r × (1+r)^n / ((1+r)^n - 1), where P is loan principal, r is monthly interest rate (annual rate / 12), and n is total months.'

