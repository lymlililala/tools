  xml-to-json:
    title: XML to JSON Converter Converter
    description: Convert XML data to JSON format, preserving hierarchy. Perfect for frontend processing and API integration.
    step1: 'Step 1: Paste your XML text into the left input box.'
    step2: 'Step 2: The converted JSON result is shown in real-time on the right.'
    step3: 'Step 3: Click the copy button to copy the JSON output.'
    faq1q: What is the difference between XML and JSON?
    faq1a: XML uses tag-based structure, suitable for documents and configs. JSON uses key-value pairs, is more lightweight, and is the standard format for modern Web APIs.
    faq2q: Does conversion support XML attributes?
    faq2a: Yes. XML element attributes are preserved as special keys (e.g. @attributes) in the JSON result.
    faq3q: How are XML namespaces handled when converting to JSON?
    faq3a: XML namespace prefixes (like <ns:tag>) are typically preserved as part of the key name in JSON (e.g. ns:tag). The namespace URI declaration attributes (xmlns:ns=...) are handled as regular attributes. For complex namespace-heavy XML, review the output carefully as the mapping can vary between conversion implementations.

  json-to-xml:
    title: JSON to XML Converter Converter
    description: Convert JSON data to standard XML format, ideal for legacy system integration and data exchange.
    step1: 'Step 1: Paste your JSON text into the left input box.'
    step2: 'Step 2: The converted XML result is shown in real-time on the right.'
    step3: 'Step 3: Click copy or download to save the XML output.'
    faq1q: When do I need to convert JSON to XML?
    faq1a: Common scenarios include integrating with legacy XML-based systems (e.g. SOAP), generating config files, or exchanging data across platforms.
    faq2q: How are JSON arrays converted to XML?
    faq2a: Each element in a JSON array becomes a repeated XML tag with the same name, preserving order and hierarchy.

  markdown-to-html:
    title: Markdown to HTML Converter
    description: Convert Markdown text to HTML in real-time with live preview and PDF export. Great for blog content creation.
    step1: 'Step 1: Type or paste your Markdown content into the left editor.'
    step2: 'Step 2: The right panel renders it as HTML in real-time.'
    step3: 'Step 3: Copy the generated HTML code, or use the print function to export as PDF.'
    faq1q: What Markdown syntax is supported?
    faq1a: Standard Markdown syntax is supported, including headings, bold, italic, links, images, code blocks, blockquotes, and ordered/unordered lists.
    faq2q: How do I export to PDF?
    faq2a: Click the "Print" button and select "Save as PDF" in the browser print dialog.
    faq3q: Why does the converted HTML look unstyled when pasted into a webpage?
    faq3a: The converted HTML uses standard semantic tags (h1–h6, p, ul, code, etc.) with no inline styles. To display it correctly, you need to link a CSS stylesheet that targets those tags — for example a GitHub Markdown CSS or a custom reset. Copy both the HTML and a stylesheet for a complete, styled result.

  safelink-decoder:
    title: Outlook SafeLink Decoder
    description: Decode Microsoft Outlook SafeLink protected URLs and restore the original destination link.
    step1: 'Step 1: Copy the SafeLink URL from an Outlook email (starts with "safelinks.protection.outlook.com").'
    step2: 'Step 2: Paste it into the input box.'
    step3: 'Step 3: The decoded original URL is shown instantly. Click to visit or copy.'
    faq1q: What is an Outlook SafeLink?
    faq1a: SafeLink is a Microsoft Defender for Office 365 feature that rewrites email links to proxy URLs to protect against malicious websites.
    faq2q: Is the decoded link safe to visit?
    faq2a: This tool only decodes the URL and does not perform security validation. Always verify the destination before visiting.

