    faq4q: What is the difference between marginal and effective tax rates?
    faq4a: The marginal tax rate is the rate applied to the last dollar of income (e.g., 30%), while the effective tax rate is total tax divided by total income — usually much lower than the marginal rate. For example, a taxpayer in the 30% bracket may have an effective rate of only 15-20%. Focus on the effective rate for tax planning; use the marginal rate to evaluate the after-tax value of additional income.
