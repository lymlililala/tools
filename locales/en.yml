    faq1q: 'What is a BIP39 mnemonic?'
    faq1a: 'BIP39 defines a standard for generating human-readable mnemonic phrases from random entropy used to back up cryptocurrency wallets.'
    faq2q: 'How many possible 12-word phrases are there?'
    faq2a: 'There are 2048 to the power of 12 possible phrases making brute-force attacks computationally infeasible.'
    faq3q: What should I do if I lose my BIP39 mnemonic phrase?
    faq3a: Losing your mnemonic means permanent, irreversible loss of wallet access. Store it offline in multiple secure physical locations (paper, metal plates), never digitally. Any service claiming to recover lost mnemonics is a scam.
    faq4q: How should I safely store a BIP39 mnemonic phrase?
    faq4a: "Your mnemonic phrase is the sole backup for recovering your cryptocurrency wallet. Store it offline: write it on paper and keep it in a fireproof, waterproof safe. Avoid screenshots or cloud storage. Consider a metal backup plate for fire resistance. Never enter your phrase on untrusted websites or share it with anyone. Keep copies in multiple physical locations."
