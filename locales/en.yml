  chronometer:
    step1: 'Step 1: Click Start to begin the timer.'
    step2: 'Step 2: Click Lap to record split times.'
    step3: 'Step 3: Click Stop to pause and Reset to clear.'
    faq1q: 'What is a chronometer?'
    faq1a: 'A chronometer is a precise timekeeping device used to measure elapsed time commonly used for sports benchmarks and timing events.'
    faq2q: 'Does closing the tab stop the timer?'
    faq2a: 'Yes, closing or refreshing the tab will reset the timer since it runs in the browser JavaScript context.'
    faq3q: What is the difference between a stopwatch and a countdown timer?
    faq3a: A stopwatch counts up from zero recording elapsed time. A countdown timer counts down to zero. This tool is a stopwatch with lap recording, useful for sports training, presentations, and meeting timing.
    faq4q: How does a timer achieve precise timing in JavaScript?
    faq4a: "JavaScript's performance.now() provides sub-millisecond precision and is unaffected by system clock adjustments, making it more accurate than Date.now(). Timers typically use setInterval or requestAnimationFrame to update the display. For long-running timers, requestAnimationFrame is more energy-efficient, syncs with the screen refresh rate, and avoids excessive computation in background tabs."
    title: Online Stopwatch & Timer
    description: Online stopwatch with millisecond precision, lap/split recording, and fastest/slowest lap stats. Ideal for training, presentations, and any timing scenario.
