    faq1q: What Markdown syntax is supported?
    faq1a: Standard Markdown syntax is supported, including headings, bold, italic, links, images, code blocks, blockquotes, and ordered/unordered lists.
    faq2q: How do I export to PDF?
    faq2a: Click the "Print" button and select "Save as PDF" in the browser print dialog.
    faq3q: Why does the converted HTML look unstyled when pasted into a webpage?
    faq3a: The converted HTML uses standard semantic tags (h1–h6, p, ul, code, etc.) with no inline styles. To display it correctly, you need to link a CSS stylesheet that targets those tags — for example a GitHub Markdown CSS or a custom reset. Copy both the HTML and a stylesheet for a complete, styled result.
    faq4q: How do I prevent XSS attacks when converting Markdown to HTML?
    faq4a: "Markdown supports embedded raw HTML, which means malicious users may inject script tags or on* event attributes. Defenses: sanitize converted HTML server-side using DOMPurify or bleach (Python), allowing only whitelisted tags; or disable the Markdown engine's raw HTML support; use CSP (Content Security Policy) as a last line of defense."
