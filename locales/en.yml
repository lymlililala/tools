  random-port-generator:
    step1: 'Step 1: Set the quantity of port numbers to generate.'
    step2: 'Step 2: Choose whether to exclude well-known ports (0-1023).'
    step3: 'Step 3: Click Generate to get a new set of random ports.'
    step4: 'Step 4: Click Copy to copy the results.'
    faq1q: 'What are registered vs dynamic ports?'
    faq1a: 'Ports 0-1023 are well-known system ports. Ports 1024-49151 are registered ports. Ports 49152-65535 are dynamic ephemeral ports.'
    faq2q: 'Why do I need a random port?'
    faq2a: 'Random ports are used when starting local dev servers or containers to avoid conflicts with already-running processes.'
    title: Random port generator
    description: Generate random port numbers outside of the range of "known" ports (0-1023).
    countLabel: Count
    includeWellKnown: Include well-known ports (0–1023)
    dynamicOnly: Dynamic ports only (49152–65535)
    currentRange: Current range
    rangeAll: Full range
    rangeDynamic: Dynamic ports
    rangeNonWell: Non-well-known
    regenerate: Regenerate
    copy: Copy
    copyAll: Copy all
    copied: Copied!
    clickToCopy: Click to copy

  yaml-prettify:
    step1: 'Step 1: Paste your YAML content into the left editor.'
    step2: 'Step 2: The formatted and validated YAML appears on the right.'
    step3: 'Step 3: Copy or download the formatted YAML.'
    faq1q: 'What does YAML prettify do?'
    faq1a: 'YAML prettify re-formats YAML with consistent indentation and spacing making it easier to read.'
    faq2q: 'Will prettifying change my YAML values?'
    faq2a: 'No. Prettifying only changes whitespace and formatting. The data values and structure remain identical.'
    title: YAML prettify and format
    description: Prettify your YAML string into a friendly, human-readable format.

  eta-calculator:
    step1: 'Step 1: Enter the total number of items to process.'
    step2: 'Step 2: Enter how many have been completed so far.'
    step3: 'Step 3: Enter the time elapsed.'
    step4: 'Step 4: The ETA and remaining time are calculated automatically.'
    faq1q: 'What does ETA stand for?'
    faq1a: 'ETA stands for Estimated Time of Arrival or Completion. It predicts when a task will finish based on current progress rate.'
    faq2q: 'How is the ETA calculated?'
    faq2a: 'ETA = (Total Items - Completed) divided by (Completed / Time Elapsed). Assumes a constant processing rate.'
    title: ETA calculator
    description: An ETA (Estimated Time of Arrival) calculator to determine the approximate end time of a task, for example, the end time and duration of a file download.

  roman-numeral-converter:
    step1: 'Step 1: Enter an Arabic number (1-3999) or a Roman numeral in the input field.'
    step2: 'Step 2: The conversion result updates automatically.'
    step3: 'Step 3: Click Copy to copy the result.'
    faq1q: 'What are Roman numerals?'
    faq1a: 'Roman numerals are a numeral system from ancient Rome using letters: I (1), V (5), X (10), L (50), C (100), D (500), M (1000).'
    faq2q: 'Why is 4 written as IV and not IIII?'
    faq2a: 'Roman numerals use subtractive notation. A smaller numeral before a larger one means subtraction. IV = 5 - 1 = 4.'
    title: Roman numeral converter
    description: Convert Roman numerals to numbers and convert numbers to Roman numerals.

  hmac-generator:
    step1: 'Step 1: Enter the message you want to authenticate.'
    step2: 'Step 2: Enter your secret key.'
    step3: 'Step 3: Select the hash algorithm (SHA-256, SHA-512, etc.).'
    step4: 'Step 4: Copy the generated HMAC value.'
    faq1q: 'What is HMAC?'
    faq1a: 'HMAC (Hash-based Message Authentication Code) combines a cryptographic hash function with a secret key to verify data integrity and authenticity.'
    faq2q: 'What is the difference between HMAC and a regular hash?'
    faq2a: 'A regular hash only verifies data integrity. HMAC additionally requires a shared secret key.'
    title: Hmac generator
    description: Computes a hash-based message authentication code (HMAC) using a secret key and your favorite hashing function.

  bip39-generator:
    step1: 'Step 1: Choose the number of words for your mnemonic phrase (12, 15, 18, 21, or 24).'
    step2: 'Step 2: Click Generate to create a random BIP39 mnemonic.'
    step3: 'Step 3: Optionally enter an existing mnemonic to derive the seed.'
    step4: 'Step 4: Copy the mnemonic phrase and store it securely.'
    faq1q: 'What is a BIP39 mnemonic?'
    faq1a: 'BIP39 defines a standard for generating human-readable mnemonic phrases from random entropy used to back up cryptocurrency wallets.'
    faq2q: 'How many possible 12-word phrases are there?'
    faq2a: 'There are 2048 to the power of 12 possible phrases making brute-force attacks computationally infeasible.'
    title: BIP39 passphrase generator
    description: Generate a BIP39 passphrase from an existing or random mnemonic, or get the mnemonic from the passphrase.

  base64-file-converter:
    step1: 'Step 1: Drop or select a file using the file picker.'
    step2: 'Step 2: The file is converted to Base64 instantly in your browser.'
    step3: 'Step 3: Copy the Base64 string or the data URL.'
    faq1q: 'What is Base64 file encoding?'
    faq1a: 'Base64 encoding converts binary file data into a text string using 64 printable ASCII characters. Used to embed files in HTML, CSS, JSON, or APIs.'
    faq2q: 'What is the size overhead of Base64?'
    faq2a: 'Base64 increases the file size by approximately 33%.'
    title: Base64 file converter
    description: Convert a string, file, or image into its base64 representation.

  list-converter:
    step1: 'Step 1: Paste your list data into the input box.'
    step2: 'Step 2: Choose the input separator (newline, comma, semicolon, etc.).'
    step3: 'Step 3: Choose the output format (JSON array, comma-separated, etc.).'
    step4: 'Step 4: Copy the converted result.'
    faq1q: 'What list formats are supported?'
    faq1a: 'Input can be newline, comma, pipe, or tab separated. Output supports JSON array, CSV, and other formats.'
    faq2q: 'Can I remove duplicates?'
    faq2a: 'Yes. The tool includes options to deduplicate, sort, trim whitespace, and reverse the list.'
    title: List converter
    description: This tool can process column-based data and apply various changes (transpose, add prefix and suffix, reverse list, sort list, lowercase values, truncate values) to each row.

  base64-string-converter:
    title: Base64 string encoder/decoder
    description: Simply encode and decode strings into their base64 representation.
    step1: 'Step 1: Select "Encode" or "Decode" mode.'
    step2: 'Step 2: Paste your input text into the input box.'
    step3: 'Step 3: The result appears instantly. Click to copy.'
    faq1q: What is Base64?
    faq1a: Base64 is a binary-to-text encoding scheme that represents binary data in an ASCII string. It is commonly used to embed images in HTML/CSS, encode email attachments, and pass binary data in URLs or JSON.
    faq2q: Is Base64 the same as encryption?
    faq2a: No. Base64 is encoding, not encryption. It is easily reversible and provides no security. Anyone can decode a Base64 string without a key.

  toml-to-yaml:
    step1: 'Step 1: Paste your TOML content into the left editor.'
    step2: 'Step 2: The YAML equivalent is generated in real-time.'
    step3: 'Step 3: Copy or download the YAML output.'
    faq1q: 'What is TOML?'
    faq1a: 'TOML is a configuration file format commonly used in Rust projects (Cargo.toml) and Hugo.'
    faq2q: 'What is YAML?'
    faq2a: 'YAML is a human-readable data serialization format widely used for Docker Compose, Kubernetes, and GitHub Actions.'
    title: TOML to YAML
    description: Parse and convert TOML to YAML.

  math-evaluator:
    step1: 'Step 1: Type a mathematical expression in the input field.'
    step2: 'Step 2: The result is calculated in real-time.'
    step3: 'Step 3: Use functions like sin(), cos(), sqrt(), log(), etc.'
    faq1q: 'What functions are available?'
    faq1a: 'Supported functions include trigonometry (sin, cos, tan), logarithms (log, log2, log10), powers (sqrt, pow, exp), and constants (pi, e).'
    faq2q: 'Does it support complex expressions?'
    faq2a: 'Yes. The evaluator supports nested functions, units, matrices, and complex numbers.'
    title: Math evaluator
    description: A calculator for evaluating mathematical expressions. You can use functions like sqrt, cos, sin, abs, etc.

  json-to-yaml-converter:
    step1: 'Step 1: Paste your JSON into the left editor.'
    step2: 'Step 2: The YAML conversion is shown in real-time.'
    step3: 'Step 3: Copy or download the YAML result.'
    faq1q: 'Why convert JSON to YAML?'
    faq1a: 'YAML is more human-readable than JSON and supports comments. It is preferred for Kubernetes, Docker Compose, and Ansible configs.'
    faq2q: 'Is JSON a subset of YAML?'
    faq2a: 'Yes. YAML 1.2 is a superset of JSON meaning all valid JSON is valid YAML.'
    title: JSON to YAML converter
    description: Simply convert JSON to YAML with this online live converter.

  url-parser:
    step1: 'Step 1: Paste a URL into the input field.'
    step2: 'Step 2: The URL is parsed into its components: protocol, host, path, query params, hash.'
    step3: 'Step 3: Click any field to copy that component.'
    faq1q: 'What URL components are shown?'
    faq1a: 'The tool extracts: protocol, username, password, hostname, port, pathname, search query string, individual query parameters, and hash fragment.'
    faq2q: 'What if a URL has no query parameters?'
    faq2a: 'The query parameters section is hidden automatically when no params are present.'
    title: URL parser
    description: Parse a URL into its separate constituent parts (protocol, origin, params, port, username-password, ...)

  iban-validator-and-parser:
    step1: 'Step 1: Enter or paste the IBAN number.'
    step2: 'Step 2: The tool instantly validates the format and checksum.'
    step3: 'Step 3: Valid IBANs are parsed to show country, bank code, and account number.'
    faq1q: 'What is an IBAN?'
    faq1a: 'IBAN (International Bank Account Number) is an internationally agreed standard for identifying bank accounts.'
    faq2q: 'How long is an IBAN?'
    faq2a: 'IBAN length varies by country from 15 (Norway) to 34 characters. It always starts with a 2-letter country code and 2 check digits.'
    title: IBAN validator and parser
    description: Validate and parse IBAN numbers. Check if an IBAN is valid and get the country, BBAN, if it is a QR-IBAN and the IBAN friendly format.
    placeholder: Enter an IBAN to check for validity...
    validate: Validate
    clear: Clear
    validExamples: Valid IBAN examples
    resultTitle: Validation result
    resultEmpty: Enter an IBAN above to see the result here
    resultValid: IBAN is valid
    resultInvalid: IBAN is invalid
    labelIsValid: Is valid?
    labelIsQR: Is QR-IBAN?
    labelErrors: Errors
    labelCountryCode: Country code
    labelBBAN: BBAN
    labelFriendly: IBAN friendly format
    errNoIBAN: No IBAN provided
    errNoCountry: Unknown country code
    errWrongBBANLen: Wrong BBAN length
    errWrongBBANFmt: Wrong BBAN format
    errChecksumNaN: Checksum is not a number
    errWrongChecksum: Wrong IBAN checksum
    errWrongBranchChecksum: Wrong account bank branch checksum
    errQRNotAllowed: QR-IBAN not allowed in this context
    yes: Yes
    no: No

  user-agent-parser:
    step1: 'Step 1: Your current browser User-Agent string is pre-filled automatically.'
    step2: 'Step 2: Or paste any User-Agent string to analyze it.'
    step3: 'Step 3: The browser, engine, OS, device, and CPU architecture are extracted.'
    faq1q: 'What is a User-Agent string?'
    faq1a: 'A User-Agent string is sent by browsers with every HTTP request to identify the browser, operating system, and device type to the server.'
    faq2q: 'Why do User-Agent strings look so complex?'
    faq2a: 'For historical compatibility reasons modern browsers include multiple older browser identifiers.'
    title: User-agent parser
    description: Detect and parse Browser, Engine, OS, CPU, and Device type/model from an user-agent string.

  numeronym-generator:
    step1: 'Step 1: Enter a word or phrase.'
    step2: 'Step 2: The numeronym is generated instantly.'
    step3: 'Step 3: Copy the result.'
    faq1q: 'What is a numeronym?'
    faq1a: 'A numeronym uses a number to represent omitted letters. i18n stands for internationalization. Common examples: a11y (accessibility), k8s (Kubernetes).'
    faq2q: 'Who invented numeronyms?'
    faq2a: 'The term i18n is attributed to DEC in the 1970s and has been popularized in software development.'
    title: Numeronym generator
    description: A numeronym is a word where a number is used to form an abbreviation. For example, "i18n" is a numeronym of "internationalization" where 18 stands for the number of letters between the first i and the last n in the word.

  case-converter:
    step1: 'Step 1: Enter or paste your text into the input field.'
    step2: 'Step 2: Select the target case format (camelCase, PascalCase, snake_case, etc.).'
    step3: 'Step 3: The converted text appears instantly. Click Copy to copy it.'
    faq1q: 'What case formats are supported?'
    faq1a: 'Supported formats include camelCase, PascalCase, snake_case, SCREAMING_SNAKE_CASE, kebab-case, Title Case, UPPER CASE, lower case, and dot.case.'
    faq2q: 'What is the difference between camelCase and PascalCase?'
    faq2a: 'camelCase starts with a lowercase letter (e.g. myVariable). PascalCase starts with an uppercase letter (e.g. MyClass).'
    title: Case converter
    description: Transform the case of a string and choose between different formats

  html-entities:
    step1: 'Step 1: Enter HTML text with special characters or enter entities to decode.'
    step2: 'Step 2: Choose Encode or Decode mode.'
    step3: 'Step 3: The result updates in real-time. Click Copy to copy.'
    faq1q: 'What are HTML entities?'
    faq1a: 'HTML entities are special codes to display reserved characters in HTML. For example &lt; renders as < and &amp; renders as &.'
    faq2q: 'Why do I need to escape HTML?'
    faq2a: 'Escaping HTML prevents XSS attacks when displaying user-generated content.'
    title: Escape HTML entities
    description: Escape or unescape HTML entities (replace characters like <,>, &, " and \' with their HTML version)

  json-prettify:
    title: JSON prettify and format
    description: Prettify your JSON string into a friendly, human-readable format.
    step1: 'Step 1: Paste your raw JSON text into the left input box.'
    step2: 'Step 2: Adjust indent size and sort keys options as needed.'
    step3: 'Step 3: The formatted result appears on the right. Click the copy button to copy it.'
    faq1q: What is JSON Prettify?
    faq1a: JSON Prettify (also known as JSON formatter or JSON beautifier) takes minified or unformatted JSON and re-formats it with proper indentation and line breaks, making it easy to read and debug.
    faq2q: What is the difference between JSON prettify and JSON minify?
    faq2a: JSON Prettify adds whitespace and indentation to make JSON human-readable. JSON Minify removes all unnecessary whitespace to reduce file size — useful for APIs and storage.
    faq3q: Does it support JSON5 (comments, trailing commas)?
    faq3a: 'Yes. This tool uses JSON5 for parsing, so it accepts comments and trailing commas in addition to standard JSON.'

  docker-run-to-docker-compose-converter:
    step1: 'Step 1: Paste your docker run command into the input field.'
    step2: 'Step 2: The equivalent Docker Compose YAML is generated instantly.'
    step3: 'Step 3: Copy or download the docker-compose.yml.'
    faq1q: 'Why use Docker Compose instead of docker run?'
    faq1a: 'Docker Compose makes it easier to manage multi-container applications and version-control your configuration.'
    faq2q: 'Does it support all docker run flags?'
    faq2a: 'The tool supports common flags like -p (ports), -v (volumes), -e (env vars), --name, and --network.'
    title: Docker run to Docker compose converter
    description: Transforms "docker run" commands into docker-compose files!

  mac-address-lookup:
    step1: 'Step 1: Enter a MAC address (e.g. AA:BB:CC:DD:EE:FF).'
    step2: 'Step 2: The tool looks up the OUI to identify the manufacturer.'
    step3: 'Step 3: The vendor name and country are displayed.'
    faq1q: 'What is a MAC address?'
    faq1a: 'A MAC address is a unique 48-bit hardware identifier assigned to a network interface card, written as six pairs of hex digits.'
    faq2q: 'What are the first 3 bytes of a MAC address?'
    faq2a: 'The first 3 bytes (OUI) are assigned by the IEEE to manufacturers. The last 3 bytes are assigned by the manufacturer.'
    title: MAC address lookup
    description: Find the vendor and manufacturer of a device by its MAC address.

  mime-types:
    step1: 'Step 1: Enter a file extension (e.g. .pdf) or a MIME type (e.g. application/pdf).'
    step2: 'Step 2: The matching MIME type or extension is found instantly.'
    step3: 'Step 3: Click to copy the result.'
    faq1q: 'What is a MIME type?'
    faq1a: 'MIME type is a standard identifier for the format of a file consisting of a type and subtype such as text/html, application/json, or image/png.'
    faq2q: 'Why are MIME types important for web development?'
    faq2a: 'Servers use MIME types to tell browsers how to handle files. An incorrect MIME type can cause files to be downloaded instead of displayed.'
    title: MIME types
    description: Convert MIME types to file extensions and vice-versa.

  toml-to-json:
    step1: 'Step 1: Paste your TOML content into the left editor.'
    step2: 'Step 2: The JSON equivalent is generated in real-time.'
    step3: 'Step 3: Copy or download the JSON output.'
    faq1q: 'What is TOML?'
    faq1a: 'TOML is a configuration file format often used in Rust (Cargo.toml) and Hugo projects.'
    faq2q: 'What happens to TOML comments during conversion?'
    faq2a: 'JSON does not support comments so all TOML comments are lost during conversion.'
    title: TOML to JSON
    description: Parse and convert TOML to JSON.

  lorem-ipsum-generator:
    step1: 'Step 1: Select the output type: paragraphs, sentences, or words.'
    step2: 'Step 2: Set the quantity using the slider or input.'
    step3: 'Step 3: Click Copy to copy the generated text.'
    faq1q: 'What is Lorem Ipsum?'
    faq1a: 'Lorem Ipsum is placeholder text derived from Cicero writings (45 BC) used as dummy text in typesetting since the 1500s.'
    faq2q: 'Why use Lorem Ipsum instead of real text?'
    faq2a: 'Lorem Ipsum avoids distraction from layout design. Readable text causes viewers to focus on content rather than visual design.'
    title: Lorem ipsum generator
    description: Lorem ipsum is a placeholder text commonly used to demonstrate the visual form of a document or a typeface without relying on meaningful content

  qrcode-generator:
    title: QR Code generator
    description: Generate and download a QR code for a URL (or just plain text), and customize the background and foreground colors.
    step1: 'Step 1: Enter the URL or text you want to encode in the QR code.'
    step2: 'Step 2: Customize foreground/background colors if desired.'
    step3: 'Step 3: Download the QR code image (PNG).'
    faq1q: What can a QR code contain?
    faq1a: 'QR codes can contain URLs, plain text, contact cards (vCard), WiFi credentials, phone numbers, email addresses, and more.'
    faq2q: What is the maximum data a QR code can store?
    faq2a: A standard QR code can store up to ~4,296 alphanumeric characters or ~7,089 numeric characters. Shorter content produces a simpler, more scannable code.

  wifi-qrcode-generator:
    step1: 'Step 1: Enter your WiFi network name (SSID).'
    step2: 'Step 2: Enter the WiFi password.'
    step3: 'Step 3: Select the security type (WPA/WPA2, WEP, or None).'
    step4: 'Step 4: Scan the generated QR code with your phone to connect instantly.'
    faq1q: 'What information is encoded in a WiFi QR code?'
    faq1a: 'The QR code encodes the SSID, password, and security type. When scanned compatible devices automatically connect.'
    faq2q: 'Is it safe to share a WiFi QR code?'
    faq2a: 'Only share with trusted people. The QR code contains your WiFi password and anyone who scans it can join your network.'
    title: WiFi QR Code generator
    description: Generate and download QR codes for quick connections to WiFi networks.

  xml-formatter:
    step1: 'Step 1: Paste your XML content into the input editor.'
    step2: 'Step 2: The formatted and indented XML appears on the right.'
    step3: 'Step 3: Copy or download the formatted XML.'
    faq1q: 'What is XML?'
    faq1a: 'XML (Extensible Markup Language) is a flexible markup language for storing and transporting structured data.'
    faq2q: 'What is the difference between XML and JSON?'
    faq2a: 'XML uses tags and attributes and supports comments. JSON uses key-value pairs and is lighter-weight and more common in modern APIs.'
    title: XML formatter
    description: Prettify your XML string into a friendly, human-readable format.

  temperature-converter:
    title: Temperature converter
    description: Degrees temperature conversions for Kelvin, Celsius, Fahrenheit, Rankine, Delisle, Newton, Réaumur, and Rømer.
    step1: 'Step 1: Enter a temperature value in any unit.'
    step2: 'Step 2: Converted values for all other units appear instantly.'
    faq1q: How do I convert Celsius to Fahrenheit?
    faq1a: 'Formula: °F = °C × 9/5 + 32. For example, 100°C = 212°F (boiling point of water).'
    faq2q: What is absolute zero?
    faq2a: 'Absolute zero is the lowest possible temperature: 0 Kelvin = −273.15°C = −459.67°F. At this temperature, particles have minimum thermal motion.'

  chmod-calculator:
    step1: 'Step 1: Check the permission boxes for owner, group, and others.'
    step2: 'Step 2: The numeric chmod value (e.g. 755) and symbolic notation update automatically.'
    step3: 'Step 3: Copy the chmod command for use in your terminal.'
    faq1q: 'What is chmod?'
    faq1a: 'chmod (change mode) is a Unix/Linux command that modifies file and directory permissions.'
    faq2q: 'What does chmod 755 mean?'
    faq2a: '755 means owner has read+write+execute (7), group and others have read+execute (5). Commonly used for web server directories.'
    title: Chmod calculator
    description: Compute your chmod permissions and commands with this online chmod calculator.

  rsa-key-pair-generator:
    step1: 'Step 1: Select the key size (1024, 2048, or 4096 bits).'
    step2: 'Step 2: Click Generate to create a new RSA key pair.'
    step3: 'Step 3: Copy the private key and public key (PEM format) separately.'
    faq1q: 'What is RSA?'
    faq1a: 'RSA (Rivest-Shamir-Adleman) is a widely used asymmetric encryption algorithm. A public key encrypts data; only the corresponding private key can decrypt it.'
    faq2q: 'What key size should I use?'
    faq2a: '2048-bit is the minimum recommended. 4096-bit provides stronger security. 1024-bit is considered insecure.'
    title: RSA key pair generator
    description: Generate a new random RSA private and public pem certificate key pair.

  html-wysiwyg-editor:
    step1: 'Step 1: Type or paste content into the WYSIWYG editor.'
    step2: 'Step 2: Use the toolbar to apply formatting (bold, italic, links, lists, etc.).'
    step3: 'Step 3: Switch to Source view to see the generated HTML code.'
    step4: 'Step 4: Copy the HTML source for use in your project.'
    faq1q: 'What does WYSIWYG mean?'
    faq1a: 'WYSIWYG stands for What You See Is What You Get. The editor displays content as it will appear in a browser.'
    faq2q: 'Is the generated HTML clean?'
    faq2a: 'The editor generates semantic HTML5 and avoids inline styles where possible.'
    title: HTML WYSIWYG editor
    description: Online, feature-rich WYSIWYG HTML editor which generates the source code of the content immediately.

  yaml-to-toml:
    step1: 'Step 1: Paste your YAML content into the left editor.'
    step2: 'Step 2: The TOML equivalent is generated in real-time.'
    step3: 'Step 3: Copy or download the TOML output.'
    faq1q: 'When should I use TOML over YAML?'
    faq1a: 'TOML is preferred for simple configuration files where clarity is critical. It has stricter syntax than YAML.'
    faq2q: 'Does YAML support anchors and aliases?'
    faq2a: 'Yes. YAML supports anchors (&) and aliases (*) for reusing content. TOML does not have a direct equivalent.'
    title: YAML to TOML
    description: Parse and convert YAML to TOML.

  mac-address-generator:
    step1: 'Step 1: Enter the quantity of MAC addresses to generate.'
    step2: 'Step 2: Optionally enter a prefix (OUI) to generate addresses for a specific vendor.'
    step3: 'Step 3: Select the separator (colon, hyphen, or none).'
    step4: 'Step 4: Click Generate and copy the results.'
    faq1q: 'What is a MAC address used for?'
    faq1a: 'MAC addresses uniquely identify devices on a local network at the data-link layer (Layer 2).'
    faq2q: 'Can I generate multicast MAC addresses?'
    faq2a: 'The generator creates unicast addresses by default. A MAC address is multicast if the LSB of the first byte is 1.'
    title: MAC address generator
    description: Enter the quantity and prefix. MAC addresses will be generated in your chosen case (uppercase or lowercase)

  json-diff:
    step1: 'Step 1: Paste the first JSON object into the left panel.'
    step2: 'Step 2: Paste the second JSON object into the right panel.'
    step3: 'Step 3: Added fields in green, removed in red, changed values in yellow.'
    faq1q: 'What is JSON diffing used for?'
    faq1a: 'JSON diffing compares API responses, config file versions, or database snapshots to identify what changed.'
    faq2q: 'Does it support nested JSON?'
    faq2a: 'Yes. The diff viewer recursively compares nested objects and arrays.'
    title: JSON diff
    description: Compare two JSON objects and get the differences between them.

  jwt-parser:
    step1: 'Step 1: Paste your JWT token into the input field.'
    step2: 'Step 2: The Header, Payload, and Signature are decoded and color-coded.'
    step3: 'Step 3: Standard claims like exp and iat show human-readable dates.'
    faq1q: 'What is a JWT?'
    faq1a: 'JWT (JSON Web Token) is an open standard (RFC 7519) for securely transmitting information as a JSON object. Commonly used for authentication.'
    faq2q: 'Is a JWT token encrypted?'
    faq2a: 'A standard JWT (JWS) is signed but NOT encrypted. The payload can be decoded by anyone. Use JWE for confidentiality.'
    title: JWT parser
    description: Parse and decode your JSON Web Token (jwt) and display its content.

  date-converter:
    step1: 'Step 1: Enter a date and time in the input field.'
    step2: 'Step 2: Choose the source timezone.'
    step3: 'Step 3: The date is displayed in multiple formats and timezones.'
    faq1q: 'What date formats are supported?'
    faq1a: 'The tool supports ISO 8601, Unix timestamp, RFC 2822, and common locale formats.'
    faq2q: 'What is a Unix timestamp?'
    faq2a: 'A Unix timestamp is the number of seconds elapsed since January 1 1970 00:00:00 UTC. It is timezone-independent.'
    title: Date-time converter
    description: Convert date and time into the various different formats

  phone-parser-and-formatter:
    step1: 'Step 1: Enter a phone number in any format.'
    step2: 'Step 2: Select the country code if needed.'
    step3: 'Step 3: The parsed result shows country, type, and formatted versions.'
    faq1q: 'What is E.164 format?'
    faq1a: 'E.164 is the international telephone numbering standard. Numbers start with + followed by country code and subscriber number.'
    faq2q: 'What information can be derived from a phone number?'
    faq2a: 'You can determine the country, region, carrier (sometimes), and type (mobile, landline, toll-free, etc.).'
    title: Phone parser and formatter
    description: Parse, validate and format phone numbers. Get information about the phone number, like the country code, type, etc.
    defaultCountryCode: Default country code
    phoneNumber: Phone number
    phonePlaceholder: Enter a phone number
    invalidPhone: Only digits and valid phone symbols are allowed (+ - ( ) space)
    resultTitle: Parse result
    resultEmpty: Enter a phone number to see the parsed result here
    resultInvalid: Invalid phone number format, please check and try again
    unknown: Unknown
    labelCountryCode: Country code (ISO)
    labelCountryName: Country / Region
    labelCallingCode: Calling code
    labelIsValid: Is valid?
    labelIsPossible: Is possible?
    labelType: Type
    labelIntl: International format
    labelNational: National format
    labelE164: E.164 format
    labelRFC3966: RFC3966 format
    typeMAMobile: Mobile
    typeFixed: Fixed line
    typeFixedOrMobile: Fixed line or mobile
    typePersonal: Personal number
    typePremium: Premium rate
    typeShared: Shared cost
    typeTollFree: Toll free
    typeUAN: Universal access number
    typeVoicemail: Voicemail
    typeVoIP: VoIP
    typePager: Pager
    yes: Yes
    no: No

  ipv4-subnet-calculator:
    step1: 'Step 1: Enter an IPv4 address with CIDR notation (e.g. 192.168.1.0/24).'
    step2: 'Step 2: The network address, broadcast address, usable host range, and mask are calculated.'
    step3: 'Step 3: Copy any field for use in your network configuration.'
    faq1q: 'What is CIDR notation?'
    faq1a: 'CIDR notation represents a network as IP address + prefix length. /24 means 255.255.255.0 netmask giving 254 usable hosts.'
    faq2q: 'How many hosts does /24 support?'
    faq2a: 'A /24 subnet has 256 addresses. Subtract 2 for network and broadcast addresses leaving 254 usable hosts.'
    title: IPv4 subnet calculator
    description: Parse your IPv4 CIDR blocks and get all the info you need about your subnet.

  og-meta-generator:
    step1: 'Step 1: Enter your page title, description, URL, and image.'
    step2: 'Step 2: Select the type (website, article, product, etc.).'
    step3: 'Step 3: Copy the generated Open Graph and Twitter Card meta tags.'
    faq1q: 'What are Open Graph meta tags?'
    faq1a: 'Open Graph tags are HTML meta tags that control how your page appears when shared on social media - title, description, image, and more.'
    faq2q: 'Why is the og:image important?'
    faq2a: 'The og:image is the thumbnail shown when your page is shared on social media. Recommended size is 1200x630px.'
    title: Open graph meta generator
    description: Generate open-graph and socials HTML meta tags for your website.

  ipv6-ula-generator:
    step1: 'Step 1: Click Generate to create a random IPv6 ULA prefix.'
    step2: 'Step 2: The generated prefix, global ID, and full address range are displayed.'
    step3: 'Step 3: Copy the prefix to use in your local network configuration.'
    faq1q: 'What is an IPv6 ULA address?'
    faq1a: 'ULA (Unique Local Address) is an IPv6 address in the fc00::/7 range similar to private IPv4 ranges. Not routable on the global internet.'
    faq2q: 'How is a ULA global ID generated?'
    faq2a: 'Per RFC 4193 the 40-bit global ID is generated pseudo-randomly to minimize collision probability.'
    title: IPv6 ULA generator
    description: Generate your own local, non-routable IP addresses for your network according to RFC4193.

  hash-text:
    title: Hash text
    description: 'Hash a text string using the function you need : MD5, SHA1, SHA256, SHA224, SHA512, SHA384, SHA3 or RIPEMD160'
    step1: 'Step 1: Type or paste your text into the input field.'
    step2: 'Step 2: Select the hash algorithm (MD5, SHA-256, etc.).'
    step3: 'Step 3: The hash output appears instantly. Click to copy.'
    faq1q: What is a hash function?
    faq1a: A hash function takes any input and produces a fixed-length output (digest). It is one-way — you cannot reverse a hash to get the original input. It is used in passwords, file integrity checks, and digital signatures.
    faq2q: Which hash algorithm should I use?
    faq2a: For security-sensitive use cases, use SHA-256 or SHA-512. MD5 and SHA-1 are considered cryptographically broken and should only be used for non-security purposes like checksums.

  json-to-toml:
    step1: 'Step 1: Paste your JSON content into the left editor.'
    step2: 'Step 2: The TOML equivalent appears in real-time.'
    step3: 'Step 3: Copy or download the TOML output.'
    faq1q: 'What JSON structures are not supported in TOML?'
    faq1a: 'TOML does not support null values or arrays of mixed types.'
    faq2q: 'Why convert JSON to TOML?'
    faq2a: 'TOML is more human-readable for configuration files. Some tools like Cargo and Hugo use TOML exclusively.'
    title: JSON to TOML
    description: Parse and convert JSON to TOML.

  device-information:
    step1: 'Step 1: Open the tool - your device information is detected automatically.'
    step2: 'Step 2: Review screen resolution, pixel ratio, OS, browser, and connection details.'
    step3: 'Step 3: Click any value to copy it.'
    faq1q: 'What information is shown?'
    faq1a: 'The tool shows screen resolution, viewport size, pixel ratio, color depth, browser name and version, operating system, language, and online/offline status.'
    faq2q: 'Is this information sent to a server?'
    faq2a: 'No. All information is read from your browser JavaScript APIs locally. Nothing is transmitted.'
    title: Device information
    description: Get information about your current device (screen size, pixel-ratio, user agent, ...)

  pdf-signature-checker:
    step1: 'Step 1: Drop or select a PDF file.'
    step2: 'Step 2: The tool scans the PDF for digital signatures.'
    step3: 'Step 3: Valid signatures show signer information and certificate details.'
    faq1q: 'What is a PDF digital signature?'
    faq1a: 'A PDF digital signature uses public key cryptography to verify the signer identity and that the document has not been altered since signing.'
    faq2q: 'Is my PDF uploaded to a server?'
    faq2a: 'No. The PDF is processed entirely in your browser. Your file never leaves your device.'
    title: PDF signature checker
    description: Verify the signatures of a PDF file. A signed PDF file contains one or more signatures that may be used to determine whether the contents of the file have been altered since the file was signed.

  json-minify:
    step1: 'Step 1: Paste your JSON into the left editor.'
    step2: 'Step 2: The minified JSON appears on the right in real-time.'
    step3: 'Step 3: Click Copy to copy the minified JSON.'
    faq1q: 'Why minify JSON?'
    faq1a: 'Minified JSON removes all whitespace reducing file size. Useful for API payloads and production config files.'
    faq2q: 'Does minifying change the JSON data?'
    faq2a: 'No. Minifying only removes insignificant whitespace. The data values and structure remain identical.'
    title: JSON minify
    description: Minify and compress your JSON by removing unnecessary whitespace.

  ulid-generator:
    step1: 'Step 1: Click Generate to create a new ULID.'
    step2: 'Step 2: Generate multiple ULIDs using the count input.'
    step3: 'Step 3: Click Copy to copy the ULID(s).'
    faq1q: 'What is a ULID?'
    faq1a: 'A ULID (Universally Unique Lexicographically Sortable Identifier) is a 128-bit identifier that encodes a timestamp and random component.'
    faq2q: 'What is the advantage of ULID over UUID?'
    faq2a: 'ULIDs are sortable by creation time unlike UUID v4, URL-safe, and more compact (26 chars vs 36 for UUID).'
    title: ULID generator
    description: Generate random Universally Unique Lexicographically Sortable Identifier (ULID).

  string-obfuscator:
    step1: 'Step 1: Enter the string you want to obfuscate (e.g. API key, IBAN, token).'
    step2: 'Step 2: Set how many characters to keep visible at the start and end.'
    step3: 'Step 3: The obfuscated string is shown - safe to share in screenshots or logs.'
    faq1q: 'What is string obfuscation?'
    faq1a: 'String obfuscation replaces middle characters with asterisks making secrets partially visible but unrecoverable.'
    faq2q: 'Is obfuscation the same as encryption?'
    faq2a: 'No. Obfuscation is a visual technique - the original string is not recoverable. Encryption produces a reversible ciphertext.'
    title: String obfuscator
    description: Obfuscate a string (like a secret, an IBAN, or a token) to make it shareable and identifiable without revealing its content.

  base-converter:
    step1: 'Step 1: Enter a number in any base (binary, octal, decimal, hexadecimal, or custom).'
    step2: 'Step 2: The equivalent values in all other bases appear instantly.'
    step3: 'Step 3: Click any result to copy it.'
    faq1q: 'What is base conversion?'
    faq1a: 'Base conversion translates a number from one numeral system to another. Binary (2), octal (8), decimal (10), and hexadecimal (16) are common.'
    faq2q: 'How do I convert hex to binary?'
    faq2a: 'Each hex digit corresponds to exactly 4 binary digits. For example F(hex) = 1111(binary).'
    title: Integer base converter
    description: Convert a number between different bases (decimal, hexadecimal, binary, octal, base64, ...)

  yaml-to-json-converter:
    step1: 'Step 1: Paste your YAML content into the left editor.'
    step2: 'Step 2: The JSON equivalent is generated in real-time.'
    step3: 'Step 3: Copy or download the JSON output.'
    faq1q: 'Why convert YAML to JSON?'
    faq1a: 'JSON is more widely supported as an API data format. Converting YAML config to JSON makes it portable.'
    faq2q: 'Are YAML comments preserved in JSON?'
    faq2a: 'No. JSON does not support comments so all YAML comments are discarded during conversion.'
    title: YAML to JSON converter
    description: Simply convert YAML to JSON with this online live converter.

  uuid-generator:
    title: UUIDs generator
    description: A Universally Unique Identifier (UUID) is a 128-bit number used to identify information in computer systems. The number of possible UUIDs is 16^32, which is 2^128 or about 3.4x10^38 (which is a lot!).
    step1: 'Step 1: Select the UUID version (v1, v4, etc.).'
    step2: 'Step 2: Enter the number of UUIDs to generate.'
    step3: 'Step 3: Click "Generate" and copy the result.'
    faq1q: What is a UUID?
    faq1a: A UUID (Universally Unique Identifier) is a 128-bit identifier used to uniquely identify information in distributed systems. There are approximately 5.3 × 10²² possible UUIDs in version 4.
    faq2q: What is the difference between UUID v1 and v4?
    faq2a: UUID v1 is time-based and includes the machine's MAC address, making it predictable but sequential. UUID v4 is randomly generated and is the most common choice for general use.
    versionLabel: UUID version
    quantity: Quantity
    quantityPlaceholder: UUID quantity
    v3HashInfo: UUID v3 uses MD5 hashing
    v5HashInfo: UUID v5 uses SHA-1 hashing
    namespaceNameInfo: same Namespace + Name always produces the same UUID
    namespace: Namespace
    nameLabel: Name
    namePlaceholder: 'Name (e.g. example.com)'
    outputPlaceholder: UUIDs will appear here…
    copy: Copy
    copied: Copied!
    refresh: Refresh

  ipv4-address-converter:
    step1: 'Step 1: Enter an IPv4 address in dotted-decimal format (e.g. 192.168.1.1).'
    step2: 'Step 2: The address is converted to decimal, binary, hexadecimal, and IPv6 mapped format.'
    step3: 'Step 3: Click any result field to copy it.'
    faq1q: 'What is an IPv4 address?'
    faq1a: 'An IPv4 address is a 32-bit number written as four decimal octets separated by dots uniquely identifying a device on a network.'
    faq2q: 'What is an IPv4-mapped IPv6 address?'
    faq2a: 'An IPv4-mapped IPv6 address represents an IPv4 in IPv6 format: ::ffff:x.x.x.x. Used in dual-stack systems.'
    title: IPv4 address converter
    description: Convert an IP address into decimal, binary, hexadecimal, or even an IPv6 representation of it.

  text-statistics:
    step1: 'Step 1: Type or paste your text into the input field.'
    step2: 'Step 2: Statistics update in real-time.'
    step3: 'Step 3: Review word count, character count, sentence count, reading time, and more.'
    faq1q: 'How is reading time calculated?'
    faq1a: 'Reading time is estimated at 200-250 words per minute (average adult reading speed).'
    faq2q: 'What counts as a word?'
    faq2a: 'Words are sequences of characters separated by whitespace. Punctuation attached to a word is counted as part of the word.'
    title: Text statistics
    description: Get information about a text, the number of characters, the number of words, its size in bytes, ...

  text-to-nato-alphabet:
    step1: 'Step 1: Enter the text you want to spell out.'
    step2: 'Step 2: Each letter is replaced with its NATO phonetic equivalent.'
    step3: 'Step 3: Copy the result for verbal communication.'
    faq1q: 'What is the NATO phonetic alphabet?'
    faq1a: 'The NATO phonetic alphabet assigns a word to each letter (Alpha, Bravo, Charlie...) to avoid confusion in voice communication.'
    faq2q: 'Why not just say the letter?'
    faq2a: 'Many letters sound similar over phone or radio (B/D/E/G/P/T, M/N, etc.). Using phonetic words reduces errors.'
    title: Text to NATO alphabet
    description: Transform text into the NATO phonetic alphabet for oral transmission.

  basic-auth-generator:
    step1: 'Step 1: Enter your username and password.'
    step2: 'Step 2: The Base64-encoded Basic Auth header value is generated instantly.'
    step3: 'Step 3: Copy the full Authorization header value.'
    faq1q: 'What is HTTP Basic Authentication?'
    faq1a: 'HTTP Basic Auth sends credentials as Base64-encoded username:password in an Authorization header with every request.'
    faq2q: 'Is Basic Auth secure?'
    faq2a: 'Basic Auth alone is NOT secure because credentials are only Base64-encoded. Always use it over HTTPS.'
    title: Basic auth generator
    description: Generate a base64 basic auth header from a username and password.

  text-to-unicode:
    step1: 'Step 1: Enter text to convert to Unicode code points or enter code points to decode.'
    step2: 'Step 2: Choose Encode or Decode mode.'
    step3: 'Step 3: Copy the result.'
    faq1q: 'What is Unicode?'
    faq1a: 'Unicode is a universal character encoding standard assigning a unique code point to every character in every language.'
    faq2q: 'What is the difference between Unicode and UTF-8?'
    faq2a: 'Unicode assigns code points (e.g. U+0041 for A). UTF-8 is an encoding that represents those code points as 1-4 bytes.'
    title: Text to Unicode
    description: Parse and convert text to unicode and vice-versa

  ipv4-range-expander:
    step1: 'Step 1: Enter the start and end IPv4 addresses of the range.'
    step2: 'Step 2: The tool calculates the minimal set of CIDR blocks that cover the range.'
    step3: 'Step 3: Copy the CIDR list for use in firewall rules or routing tables.'
    faq1q: 'What is CIDR aggregation?'
    faq1a: 'CIDR aggregation finds the smallest set of network prefixes that exactly covers a given IP range.'
    faq2q: 'Why might one IP range result in multiple CIDR blocks?'
    faq2a: 'IP ranges that do not align on power-of-2 boundaries require multiple CIDR blocks to represent exactly.'
    title: IPv4 range expander
    description: Given a start and an end IPv4 address, this tool calculates a valid IPv4 subnet along with its CIDR notation.

  text-diff:
    step1: 'Step 1: Paste the original text in the left panel.'
    step2: 'Step 2: Paste the modified text in the right panel.'
    step3: 'Step 3: Added text is highlighted in green, removed text in red.'
    faq1q: 'What diff algorithm is used?'
    faq1a: 'The tool uses a standard diff algorithm comparing texts line-by-line and character-by-character.'
    faq2q: 'Can I diff code files?'
    faq2a: 'Yes. The tool works with any text content including code, prose, JSON, and YAML.'
    title: Text diff
    description: Compare two texts and see the differences between them.

  otp-generator:
    step1: 'Step 1: Enter your TOTP secret key from your authenticator app.'
    step2: 'Step 2: The current OTP code is displayed with a countdown timer.'
    step3: 'Step 3: Copy the 6-digit code to authenticate.'
    faq1q: 'What is OTP / TOTP?'
    faq1a: 'OTP is a password valid for only one session. TOTP generates a new code every 30 seconds using a shared secret and the current time.'
    faq2q: 'What is the standard algorithm?'
    faq2a: 'TOTP is defined in RFC 6238 and uses HMAC-SHA1. Used by Google Authenticator and Authy.'
    title: OTP code generator
    description: Generate and validate time-based OTP (one time password) for multi-factor authentication.

  url-encoder:
    title: Encode/decode URL-formatted strings
    description: Encode text to URL-encoded format (also known as "percent-encoded"), or decode from it.
    step1: 'Step 1: Select "Encode" or "Decode" mode.'
    step2: 'Step 2: Paste your URL or text into the input box.'
    step3: 'Step 3: The encoded/decoded result appears instantly.'
    faq1q: What is URL encoding?
    faq1a: URL encoding (percent-encoding) converts characters that are not allowed in URLs (like spaces, Chinese characters, or symbols) into a %XX format. For example, a space becomes %20.
    faq2q: When do I need to URL-encode a string?
    faq2a: When passing user input as query parameters, constructing URLs programmatically, or handling form data submissions.

  text-to-binary:
    step1: 'Step 1: Enter text to convert to binary or enter binary to decode back to text.'
    step2: 'Step 2: Choose Text to Binary or Binary to Text mode.'
    step3: 'Step 3: Copy the result.'
    faq1q: 'How is text converted to binary?'
    faq1a: 'Each character is converted to its ASCII/Unicode code point then represented as 8-bit binary. For example A = 65 = 01000001.'
    faq2q: 'What encoding is used?'
    faq2a: 'The tool uses UTF-8 encoding which is the standard for the web.'
    title: Text to ASCII binary
    description: Convert text to its ASCII binary representation and vice-versa.

