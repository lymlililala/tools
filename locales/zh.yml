    faq1q: '什么是 Lorem Ipsum？'
    faq1a: 'Lorem Ipsum 是源自古罗马著作的占位文本，自 16 世纪以来一直用作排版行业的示意文字。'
    faq2q: '为什么使用 Lorem Ipsum 而非真实文本？'
    faq2a: 'Lorem Ipsum 避免设计评审时被内容分散注意力，作为中性填充文本使用。'
    faq3q: Lorem Ipsum 文字是什么意思？它来自哪里？
    faq3a: Lorem Ipsum 来源于西塞罗公元前 45 年的著作《善恶之终》（De Finibus Bonorum et Malorum）的拉丁文片段，经过打乱后不再有意义。约从 16 世纪印刷术兴起后，它作为标准的排版占位文本沿用至今，几乎成为平面设计和网页设计的行业标准。
    faq4q: Lorem Ipsum 文本的来源是什么？
    faq4a: Lorem Ipsum 源自西塞罗（Cicero）于公元前 45 年所著《善恶之极》（De Finibus Bonorum et Malorum），是经过改动的拉丁文段落。最常见的开头 Lorem ipsum dolor sit amet 取自第 1.10.32 节。1960 年代排版软件开始使用它作为占位文本，此后沿用至今。现代设计师有时用真实内容替代，避免忽视真实排版问题。
