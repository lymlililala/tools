  http-status-codes:
    step1: '步骤 1：浏览按类别组织的 HTTP 状态码列表。'
    step2: '步骤 2：使用搜索框快速查找特定状态码或描述。'
    step3: '步骤 3：点击状态码即可复制。'
    faq1q: '什么是 HTTP 状态码？'
    faq1a: 'HTTP 状态码是服务器对客户端请求响应中返回的 3 位数字，指示请求是成功、重定向还是发生错误。'
    faq2q: '401 和 403 有什么区别？'
    faq2a: '401 未授权表示需要身份验证但未提供。403 禁止访问表示服务器拒绝授权，即使凭据有效也不行。'
    faq3q: 2xx、3xx、4xx、5xx 状态码各代表什么类别？
    faq3a: HTTP 状态码按首位数字分类：1xx（信息性）表示请求已收到，继续处理；2xx（成功）表示请求已成功处理，如 200 OK；3xx（重定向）表示需要进一步操作，如 301 永久重定向；4xx（客户端错误）表示请求有问题，如 404 未找到；5xx（服务器错误）表示服务器处理失败，如 500 内部错误。
    faq4q: 3xx 重定向和 4xx 客户端错误应该如何区分使用？
    faq4a: 301 永久重定向（SEO 权重转移，如域名迁移）；302 临时重定向（如登录跳转）；304 未修改（缓存未变化，节省带宽）；400 请求格式错误；401 未认证（需要登录）；403 已认证但无权限；404 资源不存在；422 参数验证失败（RESTful API 常用）；429 请求频率超限；500 服务器内部错误。
    title: HTTP 状态码速查表
    description: 完整的 HTTP 状态码参考手册，涵盖 1xx/2xx/3xx/4xx/5xx 所有状态码的名称、含义和用途说明，附带常用错误码的实际应用场景和排查建议，适合 Web 开发和 API 设计。
