    faq2q: '如果 JSON 对象的键不一致怎么办？'
    faq2a: '工具会将所有对象中的唯一键合并为列标题。缺失字段在 CSV 输出中留空。'
    faq3q: JSON 数组中有嵌套对象时如何转 CSV？
    faq3a: 本工具会自动将嵌套对象扁平化，使用点号（.）连接字段路径作为列标题，例如 address.city 会成为单独一列。嵌套的数组会被序列化为字符串放入单元格中，保证转换完整性。
    faq4q: JSON 转 CSV 时如何处理嵌套对象和数组？
    faq4a: CSV 是二维扁平结构，不原生支持嵌套。常见处理策略：扁平化（将 user.address.city 展开为列名 user_address_city）；序列化（将嵌套对象转为 JSON 字符串放入单元格，可读性差）；规范化（拆分为多个 CSV 文件，用 ID 关联）。选择策略取决于下游使用：数据分析用扁平化，数据库导入用规范化。
