  toml-to-json:
    step1: '步骤 1：将 TOML 内容粘贴到左侧编辑器。'
    step2: '步骤 2：实时生成等效的 JSON。'
    step3: '步骤 3：复制或下载 JSON 输出。'
    faq1q: '什么是 TOML？'
    faq1a: 'TOML 是一种配置文件格式，常用于 Rust（Cargo.toml）和 Hugo 项目。'
    faq2q: '转换时 TOML 注释会怎样？'
    faq2a: 'JSON 不支持注释，因此所有 TOML 注释在转换为 JSON 时都会丢失。'
    faq3q: TOML 和 JSON 相比有什么优势？
    faq3a: TOML 是专为配置文件设计的格式，支持注释（# 开头），日期时间类型原生支持，多行字符串更易读。JSON 没有注释支持，更适合数据交换。TOML 在 Rust 生态（Cargo.toml）和 Hugo 等项目中广泛使用。
    faq4q: TOML 转 JSON 后如何处理日期时间类型？
    faq4a: TOML 原生支持日期时间（RFC 3339 格式），而 JSON 没有日期类型，只有字符串和数字。转换时 TOML 的日期时间通常转为 JSON 字符串（保持 ISO 8601 格式）。使用转换结果时，需在代码中手动将字符串解析为 Date 对象。建议在 API 文档中注明日期字段的格式约定，避免下游系统误解。
