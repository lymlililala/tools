    step4: '步骤 4：复制助记词并安全保存——它控制您的钱包访问权限。'
    faq1q: '什么是 BIP39 助记词？'
    faq1a: 'BIP39 是比特币改进提案标准，定义了从随机熵生成人类可读助记短语的方法，用于备份加密货币钱包。'
    faq2q: '12 个单词的短语有多少种可能？'
    faq2a: '共有 2048 的 12 次方种可能，使暴力破解在计算上不可行。'
    faq3q: 丢失 BIP39 助记词会怎样？助记词可以找回吗？
    faq3a: 丢失助记词意味着永久失去对钱包中所有资产的访问权，无法找回。助记词是唯一的备份方式，必须离线安全保存（纸质、金属刻板等），绝不能截图、存入云端或以电子方式传输。任何声称能找回助记词的服务都是诈骗。
    faq4q: 如何安全地存储 BIP39 助记词？
    faq4a: 助记词是恢复加密货币钱包的唯一凭证，务必离线存储：写在纸上并存放在防火防水的安全地方，避免截图或存入云盘。可考虑金属刻板备份以防火灾。永远不要将助记词输入来路不明的网站或分享给他人。建议将备份分存于多个物理地点。
    title: BIP39密码生成器
    description: 在线 BIP39 助记词生成器，支持从随机熵或现有助记词生成 12/24 位 BIP39 密码短语，可导出 HD 钱包根密钥（BIP32 Master Key），适合加密货币钱包备份和离线验证。
