    faq4q: 录制的视频格式是什么？支持哪些浏览器？
    faq4a: 视频格式取决于浏览器支持：Chrome/Edge 通常录制为 WebM（VP8/VP9 编码），Firefox 也支持 WebM，Safari 可能录制为 MP4（H.264）。WebM 是开放格式，体积小，但 iOS 设备兼容性较差。如需广泛兼容，录制后可使用 FFmpeg 转换为 MP4。
