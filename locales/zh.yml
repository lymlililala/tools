  encryption:
    step1: '步骤 1：选择「加密」或「解密」模式。'
    step2: '步骤 2：选择加密算法（AES、TripleDES、Rabbit、RC4）。'
    step3: '步骤 3：输入文本和您的密钥。'
    step4: '步骤 4：加密/解密结果立即显示。'
    faq1q: '应该使用哪种算法？'
    faq1a: 'AES（高级加密标准）是对称加密的行业标准，适用于大多数场景。'
    faq2q: '我的数据安全吗？'
    faq2a: '所有加密和解密均在浏览器本地执行，您的数据和密钥不会离开您的设备。'
    faq3q: AES、TripleDES、RC4 三种算法应该选哪个？
    faq3a: 推荐使用 AES，它是目前最安全的对称加密标准，被政府和金融机构采用。TripleDES 速度较慢已逐渐淘汰。RC4 存在严重安全漏洞，现代场景不应使用。生产环境建议使用 AES-256-GCM 模式并配合安全密钥管理。
    faq4q: AES-256 加密中密钥管理是最大的难题吗？
    faq4a: 是的，密钥管理是对称加密中最关键的安全挑战。AES-256 算法本身极其安全，但密钥泄露意味着所有数据暴露。最佳实践：不要把密钥硬编码在代码中；使用 KMS（密钥管理服务，如 AWS KMS、HashiCorp Vault）；定期轮换密钥；使用不同密钥加密不同数据；安全地销毁不再使用的密钥。
    title: 加密/解密文本
