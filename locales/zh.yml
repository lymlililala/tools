  password-strength-analyser:
    step1: '步骤 1：在输入框中输入或粘贴您的密码。'
    step2: '步骤 2：强度仪表随您的输入实时更新。'
    step3: '步骤 3：查看评分、破解时间估计和改进建议。'
    faq1q: '什么样的密码是强密码？'
    faq1a: '强密码长度 12 位以上，包含大写、小写、数字和符号的组合，避免常见词汇或规律。'
    faq2q: '我的密码会上传到服务器吗？'
    faq2a: '不会。所有分析均在浏览器本地完成，您的密码不会离开您的设备。'
    title: 密码强度分析仪
    description: 使用此密码强度分析器和破解时间估计工具来发现密码的强度。

  chronometer:
    step1: '步骤 1：点击「开始」启动计时器。'
    step2: '步骤 2：点击「分段」记录分段时间。'
    step3: '步骤 3：点击「停止」暂停，点击「重置」清零。'
    faq1q: '什么是计时器？'
    faq1a: '计时器是用于测量经过时间的精密计时设备，常用于体育计时、基准测试和事件计时。'
    faq2q: '关闭标签页会停止计时吗？'
    faq2a: '是的，关闭或刷新页面将重置计时器，因为它运行在浏览器的 JavaScript 上下文中。'
    title: 计时器
    description: 监控事物的持续时间。基本上是一种具有简单计时器功能的计时器。
  token-generator:
    step1: '步骤 1：选择字符类型——大写字母、小写字母、数字和/或符号。'
    step2: '步骤 2：拖动滑块设置 Token 长度（1–512 个字符）。'
    step3: '步骤 3：Token 将立即生成并显示在输出框中。'
    step4: '步骤 4：点击「复制」将 Token 复制到剪贴板。'
    step5: '步骤 5：点击「刷新」随时重新生成新的随机 Token。'
    faq1q: '随机 Token 有什么用途？'
    faq1a: '随机 Token 用于 API 密钥、Session 令牌、CSRF 令牌、密码重置链接等需要唯一不可预测字符串的场景。'
    faq2q: '生成的 Token 有多安全？'
    faq2a: 'Token 使用浏览器内置加密级随机数生成器生成，具有密码学安全性。'
    title: Token 生成器
    description: 使用您想要的字符、大写或小写字母、数字和/或符号生成随机字符串。

