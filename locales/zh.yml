    faq1q: 什么是数字格式化？
    faq1a: 数字格式化根据地区和样式调整数字的显示方式。例如 1234.56 在美国显示为 "1,234.56"，在法国显示为 "1 234,56"，在中国加货币符号则显示为 "￥1,234.56"。
    faq2q: 紧凑模式和科学计数法有什么区别？
    faq2a: 科学计数法总是显示系数和指数（如 1.23E3）。紧凑模式使用本地化缩写（如 "1.2K"、"1.2万"），对大数字更直观易读。
    faq3q: 为什么不同国家的数字格式不一样？
    faq3a: 不同国家对小数点和千位分隔符的约定不同：美国/英国用逗号分隔千位（1,000.00），德国/法国用点分隔千位（1.000,00），印度使用不同的分组方式（1,00,000.00）。国际化开发中必须根据用户地区选择正确的格式。
    faq4q: 不同国家的数字格式有哪些差异需要注意？
    faq4a: 数字格式存在显著的国际差异：千位分隔符——美国/中国用逗号（1,000），欧洲用点或空格；小数点——美国/中国用点（3.14），欧洲用逗号（3,14）。开发国际化应用时用 Intl.NumberFormat API 处理，避免硬编码格式。货币符号的位置和格式也因国家而异。
