  ipv4-range-expander:
    step1: '步骤 1：输入 IP 范围的起始和结束 IPv4 地址。'
    step2: '步骤 2：工具计算覆盖该范围的最小 CIDR 块集合。'
    step3: '步骤 3：复制 CIDR 列表用于防火墙规则或路由表。'
    faq1q: '什么是 CIDR 聚合？'
    faq1a: 'CIDR 聚合找到精确覆盖给定 IP 范围的最小网络前缀集，用于减少路由表条目数量。'
    faq2q: '为什么一个 IP 范围可能需要多个 CIDR 块？'
    faq2a: '不对齐 2 的幂次方边界的 IP 范围需要多个 CIDR 块来精确表示。'
    faq3q: 为什么用多个 CIDR 来表示一个 IP 范围，而不是一个？
    faq3a: CIDR 块的大小必须是 2 的幂次方（/24 = 256 个，/25 = 128 个等），且必须对齐到相应的边界。任意起止范围的 IP 段（如 10.0.0.5 到 10.0.0.20）通常无法用单个 CIDR 精确表示，需要分解为多个不重叠的 CIDR 块。本工具自动完成这个分解计算，适合防火墙规则配置。
    faq4q: IP 范围扩展在实际网络配置中有哪些用途？
    faq4a: IP 范围扩展的实际用途：防火墙规则（只允许特定 IP 段访问）；VPN 路由表配置（指定哪些流量走 VPN 隧道）；Nginx/Apache 的 allow/deny 指令；云服务安全组规则；CDN 白名单；数据库访问控制。CIDR 是最简洁的表达方式，单个 IP 范围可能对应多条 CIDR。
    title: IPv4范围扩展器
    description: 在线 IPv4 地址范围扩展工具，输入起始和结束 IP 地址，自动计算覆盖该范围所需的最少 CIDR 网段列表，适合精准配置防火墙规则、路由策略和网络访问控制。
