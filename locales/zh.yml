    step2: '步骤 2：点击 Emoji 将其复制到剪贴板。'
    step3: '步骤 3：同时显示 Unicode 码点和短代码供参考。'
    faq1q: '如何搜索特定 Emoji？'
    faq1a: '使用搜索框输入关键词，列表将实时过滤。'
    faq2q: '可以在代码或 URL 中使用 Emoji 吗？'
    faq2a: '可以。每个 Emoji 都有 Unicode 码点，可用于 HTML 实体或 JSON。URL 中需要进行百分比编码。'
    faq3q: Emoji 在所有设备上显示效果一样吗？
    faq3a: 不完全一样。Emoji 的视觉外观由操作系统和字体决定，同一个 Unicode 码点在 Apple、Google、Microsoft 和 Samsung 设备上可能有明显不同的外观。在跨平台通信中，要注意某些 Emoji 在不同平台上可能传达不同的情感含义。
    faq4q: Emoji 在不同设备和系统上为什么显示不同？
    faq4a: 每个操作系统（iOS、Android、Windows、macOS）都有自己的 Emoji 字体，同一 Unicode 码点的表情在各平台视觉设计不同。新 Emoji 也可能在旧系统上显示为方块（豆腐块）。跨平台内容应注意表情含义差异，避免因视觉差异引起误解。
