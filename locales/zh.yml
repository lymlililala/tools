    step1: '步骤 1：输入您的页面标题、描述、URL 和图片。'
    step2: '步骤 2：选择类型（网站、文章、产品等）。'
    step3: '步骤 3：复制生成的 Open Graph 和 Twitter Card meta 标签。'
    faq1q: '什么是 Open Graph meta 标签？'
    faq1a: 'Open Graph 标签是控制您的页面在社交媒体（Facebook、Twitter、LinkedIn 等）分享时显示效果的 HTML meta 标签。'
    faq2q: 'og:image 为什么重要？'
    faq2a: 'og:image 是页面在社交媒体分享时显示的缩略图。推荐尺寸为 1200×630px。'
    faq3q: 必须设置哪些基本的 Open Graph 标签？
    faq3a: 最基本的 OG 标签包括：og:title（页面标题）、og:type（内容类型，如 website 或 article）、og:image（缩略图 URL，建议 1200×630px）、og:url（页面规范 URL）。可选但重要的标签：og:description（简短描述）、og:site_name（网站名称）。缺少这些标签会导致社交媒体分享时显示异常。
    faq4q: Open Graph 标签如何影响社交媒体分享效果？
    faq4a: "完善的 OG 标签可以显著提升分享点击率：og:title（标题，建议 40-60 字符）；og:description（描述，建议 100-200 字符）；og:image（分享图片，推荐 1200x630px，大图更吸引眼球）；og:url（规范 URL）。Twitter 有独立的 Twitter Card 标签（twitter:card=summary_large_image 展示大图）。缺少这些标签，分享时只会显示 URL 或默认缩略图，大幅降低点击意愿。"
