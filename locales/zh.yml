    faq1q: 'ops/sec 是什么意思？'
    faq1a: 'ops/sec（每秒操作数）衡量一段代码在一秒内能执行多少次。数值越高越快。'
    faq2q: '这个基准测试准确吗？'
    faq2a: '基准测试在浏览器 JavaScript 引擎中运行，结果因浏览器和设备而异，适合相对比较。'
    faq3q: 进行基准测试时需要注意哪些影响因素？
    faq3a: 影响基准测试结果的因素包括：JIT 编译器优化（引擎可能优化掉未使用的代码）、垃圾回收暂停、浏览器后台任务、CPU 频率调节（电源模式）、缓存预热效应。建议：多次运行取平均值、关闭其他标签页、在一致的设备和浏览器条件下对比，并确保测试代码具有实际意义。
    faq4q: 如何避免基准测试结果不准确？
    faq4a: 常见误区包括：没有预热 JIT 编译器、测试循环次数太少、测试环境与生产不符、未排除垃圾回收干扰等。建议多次运行取平均值、分开测试热路径和冷路径、在隔离环境中进行，并使用专业工具（如 wrk、JMH、Benchmark.js）而非简单计时。
