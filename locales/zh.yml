    faq1q: 什么是哈希函数？
    faq1a: 哈希函数将任意输入转换为固定长度的输出（摘要）。它是单向的——无法从哈希值逆推出原始输入。广泛用于密码存储、文件完整性校验和数字签名。
    faq2q: 应该使用哪种哈希算法？
    faq2a: 安全敏感场景请使用 SHA-256 或 SHA-512。MD5 和 SHA-1 在密码学上已被认为不安全，仅适用于非安全用途如校验和。

