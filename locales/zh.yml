  ipv4-subnet-calculator:
    step1: '步骤 1：输入带 CIDR 表示法的 IPv4 地址（如 192.168.1.0/24）。'
    step2: '步骤 2：自动计算网络地址、广播地址、可用主机范围和子网掩码。'
    step3: '步骤 3：复制任意字段用于网络配置。'
    faq1q: '什么是 CIDR 表示法？'
    faq1a: 'CIDR 以 IP 地址加斜杠和前缀长度表示网络。例如 /24 表示 255.255.255.0 子网掩码，提供 254 个可用主机。'
    faq2q: '/24 支持多少台主机？'
    faq2a: '/24 子网有 256 个地址（2 的 8 次方）。减去网络地址和广播地址，剩余 254 个可用主机地址。'
    faq3q: CIDR 表示法（如 /24）是什么意思？
    faq3a: CIDR 中 /24 表示子网掩码前 24 位为 1，即 255.255.255.0，该子网可容纳 256 个 IP。/16 对应 65536 个地址，/32 表示单个主机地址。CIDR 比传统 A/B/C 类地址分配更灵活高效。
    faq4q: VLSM 可变长子网掩码和固定子网掩码有什么区别？
    faq4a: 传统固定子网掩码要求所有子网大小相同，浪费 IP 地址；VLSM 允许不同子网有不同大小，按需分配。例如总部 100 台主机用 /25（126 个可用地址），分支 20 台用 /27（30 个），WAN 链路 2 台用 /30（2 个），精确利用地址空间。现代网络设计普遍采用 VLSM。
