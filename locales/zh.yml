    faq1q: '支持哪些函数？'
    faq1a: '支持三角函数（sin、cos、tan）、对数（log、log2、log10）、幂函数（sqrt、pow、exp）和常数（pi、e）。'
    faq2q: '支持复杂表达式吗？'
    faq2a: '支持。支持嵌套函数、单位、矩阵和复数。'
    faq3q: 数学表达式计算器支持哪些常用函数？
    faq3a: 本工具支持的常用函数包括：三角函数（sin、cos、tan、asin、acos、atan）、对数（log、log2、log10、ln）、指数（exp、pow、sqrt、cbrt）、舍入（floor、ceil、round、abs）、统计（max、min、sum、mean）以及常数 pi（π）和 e。
    faq4q: 在线数学计算器如何安全地执行用户输入的表达式？
    faq4a: 安全的数学表达式求值不能直接使用 eval()（有代码注入风险）。应使用专用数学解析器：JavaScript 的 math.js 库（安全沙箱）；Python 的 asteval（基于 AST 白名单求值）；或自行实现词法分析和表达式树。本工具在客户端安全地解析表达式，只允许数学函数和运算符，不执行任意代码。
