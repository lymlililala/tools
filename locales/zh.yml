    step1: '步骤 1：输入文本转换为 Unicode 码点，或输入码点进行解码。'
    step2: '步骤 2：选择「编码」或「解码」模式。'
    step3: '步骤 3：复制结果。'
    faq1q: '什么是 Unicode？'
    faq1a: 'Unicode 是通用字符编码标准，为每种语言的每个字符分配唯一码点，涵盖 150 多种文字的 14 万多个字符。'
    faq2q: 'Unicode 和 UTF-8 有什么区别？'
    faq2a: 'Unicode 是分配码点的标准（如 U+0041 代表字母 A），UTF-8 是将这些码点在内存或文件中表示为 1–4 字节的编码方式。'
    faq3q: 为什么同一字符在不同系统上显示效果不同？
    faq3a: 不同的字体、操作系统和渲染引擎对相同 Unicode 字符的视觉呈现可能不同，特别是表情符号（Emoji）——同一 Unicode 码点在苹果、谷歌和微软平台上有完全不同的设计风格。字符集问题（如 GB2312 vs UTF-8）可能导致中文字符显示为乱码，统一使用 UTF-8 可解决大多数跨平台编码问题。
    faq4q: Unicode 和 UTF-8、UTF-16 有什么区别？
    faq4a: Unicode 是字符集标准，定义了 100 多万个字符的码点（U+0000 到 U+10FFFF）；UTF-8 和 UTF-16 是 Unicode 的不同编码实现。UTF-8：变长编码，英文 1 字节，中文 3 字节，向下兼容 ASCII，是 Web 标准；UTF-16：变长编码，基本平面 2 字节，JavaScript 和 Java 内部使用；UTF-32：定长 4 字节，处理简单但浪费空间。
    title: 文本转 Unicode
