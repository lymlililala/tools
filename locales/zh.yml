  otp-generator:
    step1: '步骤 1：输入您的 TOTP 密钥（来自您的身份验证器应用或服务）。'
    step2: '步骤 2：当前 OTP 代码及倒计时显示。'
    step3: '步骤 3：复制 6 位代码进行认证。'
    faq1q: '什么是 OTP / TOTP？'
    faq1a: 'OTP（一次性密码）仅对一次登录会话有效。TOTP 每 30 秒使用共享密钥和当前时间生成新代码。'
    faq2q: '使用什么标准算法？'
    faq2a: 'TOTP 由 RFC 6238 定义，使用 HMAC-SHA1。被 Google Authenticator 和 Authy 等应用使用。'
    faq3q: TOTP 和 HOTP 有什么区别？
    faq3a: TOTP（Time-based OTP）基于当前时间生成 OTP，每 30 秒刷新一次，Google Authenticator 使用此方式。HOTP（HMAC-based OTP）基于计数器生成 OTP，只在使用时递增，不依赖时钟同步，适合硬件令牌和离线场景。
    faq4q: TOTP 和 HOTP 有什么区别？应该选哪个？
    faq4a: TOTP（基于时间）是 HOTP（基于计数器）的扩展，使用当前时间戳代替计数器。TOTP 每 30 秒自动刷新，即使 OTP 被截获也会快速失效，是 Google Authenticator、Authy 等 App 的标准；HOTP 基于递增计数器，不依赖时间同步，适合无网络的硬件令牌。现代双因子认证（2FA）几乎都使用 TOTP（RFC 6238），推荐使用。
    title: OTP代码生成器
    description: 在线 TOTP/OTP 动态口令生成器，支持基于时间的一次性密码（RFC 6238），可生成和验证 Google Authenticator 等双因素认证 App 使用的 6 位验证码。

  url-encoder:
    title: 编码/解码url格式的字符串
    description: 在线 URL 编码 / 解码工具，将 URL 中的特殊字符转换为百分比编码（%xx）格式，或将编码后的 URL 还原为可读形式，支持完整 URL 和 URI 组件两种编码模式，适合 API 开发。
    step1: 第一步：选择"编码"或"解码"模式。
    step2: 第二步：将 URL 或文本粘贴到输入框中。
    step3: 第三步：编码/解码结果即时显示。
    faq1q: 什么是 URL 编码？
    faq1a: URL 编码（百分号编码）将 URL 中不允许的字符（如空格、中文字符或符号）转换为 %XX 格式。例如，空格变为 %20。
    faq2q: 什么时候需要对字符串进行 URL 编码？
    faq2a: 将用户输入作为查询参数传递时、以编程方式构建 URL 时，或处理表单数据提交时。
    faq3q: URL 编码和 Base64 编码有什么区别？
    faq3a: URL 编码将特殊字符转换为 %XX 格式，用于 URL 中安全传输。Base64 将二进制数据编码为 ASCII 字符串，用于在文本协议中传输二进制内容。URL 参数应使用 URL 编码，而非 Base64。
    faq4q: URL 编码（Percent-encoding）和 Base64 编码有什么区别？
    faq4a: URL 编码（%XX）专门用于 URL 中不安全字符的转义，将字节转为 %+十六进制，使 URL 保持合法格式（如空格转 %20，中文转 %E4%B8%AD）；Base64 将任意二进制数据转为 64 个安全字符，使数据可在文本协议中传输，但会增加约 33% 体积。URL 编码用于 URL 参数；Base64 用于 data URI、API 认证、邮件附件等。
