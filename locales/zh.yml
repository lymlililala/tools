  income-tax-calculator:
    step1: '步骤 1：输入您的税前月薪。'
    step2: '步骤 2：选择您的城市，以应用正确的社保费率。'
    step3: '步骤 3：可选添加专项附加扣除（子女教育、住房租金等）。'
    step4: '步骤 4：查看您的税级、总扣除额和税后工资。'
    faq1q: '中国个人所得税如何计算？'
    faq1a: '中国使用 7 档累进税率（3%–45%）。应纳税额 = (税前工资 - 社保 - 5000 元基本扣除 - 专项附加扣除) × 税率 - 速算扣除数。'
    faq2q: '社保（五险一金）包含哪些内容？'
    faq2a: '五险：养老保险、医疗保险、失业保险、工伤保险、生育保险。一金：住房公积金。费率因城市而异。'
    faq3q: 个人所得税专项附加扣除有哪些？
    faq3a: 2024 年个人所得税专项附加扣除包括：子女教育（每孩每月 2000 元）、继续教育（400~800 元/月）、大病医疗（上限 8 万元/年）、住房贷款利息（每月 1000 元）、住房租金（每月 800~1500 元，按城市）、赡养老人（每月最高 2000 元）、3 岁以下婴幼儿照护（每孩每月 2000 元）。
    faq4q: 边际税率和实际税率有什么区别？
    faq4a: 边际税率是最后一元收入适用的税率，而实际税率是总税额除以总收入的比例（通常远低于边际税率）。例如中国个税：月薪 2 万的实际税率约 8-12%，远低于边际档位的 20%。税收筹划时关注实际税率；理解边际税率有助于判断额外收入的税后价值。
