  percentage-calculator:
    step1: '步骤 1：选择所需的百分比计算类型。'
    step2: '步骤 2：在输入框中填入所需数值。'
    step3: '步骤 3：结果立即更新。'
    faq1q: '如何计算百分比变化？'
    faq1a: '百分比变化 = ((新值 - 旧值) / 旧值) × 100。正数表示增长，负数表示减少。'
    faq2q: '如何计算 Y 的 X%？'
    faq2a: 'Y 的 X% = Y × (X / 100)。例如，150 的 20% = 150 × 0.20 = 30。'
    title: 百分比计算器
    description: 轻松计算从一个值到另一个值的百分比，或从百分比到值的百分比。

  svg-placeholder-generator:
    step1: '步骤 1：设置占位图的宽度和高度。'
    step2: '步骤 2：选择背景色和文字颜色。'
    step3: '步骤 3：可选自定义标签文字。'
    step4: '步骤 4：复制 SVG 代码或 data URL 用于项目中。'
    faq1q: '什么是 SVG 占位图？'
    faq1a: 'SVG 占位图是一种轻量向量图像，用于开发阶段在实际图像加载前预留空间。'
    faq2q: '可以在生产环境使用吗？'
    faq2a: 'SVG 占位图主要用于开发，可在生产环境作为 fallback 或骨架屏使用。'
    title: SVG 占位符生成器
    description: 生成 svg 图像以用作应用程序中的占位符。

  json-to-csv:
    step1: '步骤 1：将 JSON 数组粘贴到输入框中。'
    step2: '步骤 2：工具自动从 JSON 键中检测列标题。'
    step3: '步骤 3：查看 CSV 输出，点击「复制」或「下载」。'
    faq1q: '支持什么 JSON 结构？'
    faq1a: '工具支持对象数组格式。'
    faq2q: '如果 JSON 对象的键不一致怎么办？'
    faq2a: '工具会将所有对象中的唯一键合并为列标题。缺失字段在 CSV 输出中留空。'
    title: JSON 转 CSV
    description: 使用自动标头检测将JSON转换为CSV。

  camera-recorder:
    step1: '步骤 1：浏览器请求摄像头/麦克风权限时点击「允许」。'
    step2: '步骤 2：使用相机预览画面构图。'
    step3: '步骤 3：点击「拍照」截图，或点击「录制」开始录视频。'
    step4: '步骤 4：停止录制后下载结果。'
    faq1q: '我的视频会上传到服务器吗？'
    faq1a: '不会。所有处理均在浏览器本地完成，不会上传任何数据。'
    faq2q: '支持什么格式？'
    faq2a: '照片保存为 PNG 格式，视频保存为大多数现代浏览器支持的 WebM 格式。'
    title: 摄像机记录器
    description: 从网络摄像头或照相机拍摄照片或录制视频。

  keycode-info:
    step1: '步骤 1：点击页面任意位置，使键盘监听器获得焦点。'
    step2: '步骤 2：按下键盘上的任意键。'
    step3: '步骤 3：键名、keyCode、code、位置和修饰键状态立即显示。'
    step4: '步骤 4：点击任意字段旁的复制图标可复制该值。'
    faq1q: '什么是 keyCode？'
    faq1a: 'keyCode 是表示所按键的旧式整数属性，由浏览器定义。现代代码应使用 event.key 或 event.code 替代。'
    faq2q: 'key、code 和 keyCode 有什么区别？'
    faq2a: 'key 表示打印字符，code 表示物理按键位置，keyCode 是旧式数值。现代 JavaScript 推荐使用 key 和 code。'
    title: Keycode 信息
    description: 查找任何按下的键的javascript键代码、代码、位置和修饰符。

  emoji-picker:
    step1: '步骤 1：按名称或关键词浏览或搜索 Emoji。'
    step2: '步骤 2：点击 Emoji 将其复制到剪贴板。'
    step3: '步骤 3：同时显示 Unicode 码点和短代码供参考。'
    faq1q: '如何搜索特定 Emoji？'
    faq1a: '使用搜索框输入关键词，列表将实时过滤。'
    faq2q: '可以在代码或 URL 中使用 Emoji 吗？'
    faq2a: '可以。每个 Emoji 都有 Unicode 码点，可用于 HTML 实体或 JSON。URL 中需要进行百分比编码。'
    title: Emoji 选择器
    description: 轻松复制和粘贴Emoji表情符号，并获得每个表情符号的unicode和code points值.

  color-converter:
    step1: '步骤 1：使用颜色选择器或直接输入任意格式的颜色值。'
    step2: '步骤 2：其他格式（HEX、RGB、HSL、CMYK 等）自动更新。'
    step3: '步骤 3：查看 WCAG 对比度评分，确保无障碍可访问性。'
    step4: '步骤 4：点击任意字段即可复制该值。'
    faq1q: 'HEX、RGB 和 HSL 有什么区别？'
    faq1a: 'HEX 是 6 位十六进制颜色码。RGB 通过红、绿、蓝三通道（0–255）定义颜色。HSL 通过色相（0–360°）、饱和度和亮度定义颜色。'
    faq2q: '什么是 WCAG 对比度？'
    faq2a: 'WCAG 对比度衡量文本在背景上的可读性。4.5:1 达到 AA 标准；7:1 达到 AAA 标准。'
    title: Color 选择器
    description: 在不同格式（十六进制、rgb、hsl和css名称）之间转换颜色
  bcrypt:
    step1: '步骤 1：在「待哈希文本」字段中输入要哈希的内容。'
    step2: '步骤 2：调整代价因子（轮数）——数值越高越安全但越慢。'
    step3: '步骤 3：生成的 bcrypt 哈希值显示在输出框中。'
    step4: '步骤 4：如需验证，在验证区粘贴哈希并输入原始文本。'
    faq1q: '什么是 bcrypt？'
    faq1a: 'bcrypt 是一种密码哈希算法，被设计为故意缓慢以抵御暴力破解攻击，并使用盐值防御彩虹表攻击。'
    faq2q: '什么是代价因子？'
    faq2a: '代价因子控制哈希轮数。每增加 1，计算时间翻倍，使暴力破解更加困难。'
    title: 加密
    description: 使用bcrypt对文本字符串进行哈希和比较。Bcrypt是一个基于Blowfish密码的密码哈希函数。

  crontab-generator:
    step1: '步骤 1：使用可视化编辑器设置分钟、小时、日、月和星期字段。'
    step2: '步骤 2：或直接在输入框中输入 cron 表达式。'
    step3: '步骤 3：自动显示人类可读的描述和下次执行时间。'
    faq1q: '什么是 cron 表达式？'
    faq1a: 'cron 表达式是由 5 个字段（分钟 小时 日 月 星期）组成的字符串，定义 Unix/Linux 定时任务的重复计划。'
    faq2q: '*/5 * * * * 是什么意思？'
    faq2a: '表示每 5 分钟执行一次。分钟字段中的 */5 表示在每小时的 0、5、10、15 分运行。'
    title: Crontab 表达式生成
    description: 验证并生成crontab，并获取cron调度的可读描述。

  http-status-codes:
    step1: '步骤 1：浏览按类别组织的 HTTP 状态码列表。'
    step2: '步骤 2：使用搜索框快速查找特定状态码或描述。'
    step3: '步骤 3：点击状态码即可复制。'
    faq1q: '什么是 HTTP 状态码？'
    faq1a: 'HTTP 状态码是服务器对客户端请求响应中返回的 3 位数字，指示请求是成功、重定向还是发生错误。'
    faq2q: '401 和 403 有什么区别？'
    faq2a: '401 未授权表示需要身份验证但未提供。403 禁止访问表示服务器拒绝授权，即使凭据有效也不行。'
    title: HTTP 状态码
    description: 所有HTTP状态的列表对其名称和含义解释。

  sql-prettify:
    step1: '步骤 1：将 SQL 查询语句粘贴到输入编辑器中。'
    step2: '步骤 2：从下拉菜单中选择 SQL 方言（MySQL、PostgreSQL 等）。'
    step3: '步骤 3：格式化后的查询语句立即出现在输出面板中。'
    step4: '步骤 4：点击「复制」复制格式化后的 SQL。'
    faq1q: '为什么要格式化 SQL 语句？'
    faq1a: '格式化的 SQL 更易于阅读、调试和维护。统一的缩进和大写规范帮助更快发现错误。'
    faq2q: '支持哪些 SQL 方言？'
    faq2a: '支持 MySQL、PostgreSQL、SQLite、MariaDB、BigQuery、Spark、TSQL 等。'
    title: SQL 美化和格式化
    description: 在线格式化和美化您的 SQL 查询（它支持各种 SQL 方言）。

  benchmark-builder:
    step1: '步骤 1：点击「添加用例」添加基准测试用例。'
    step2: '步骤 2：为每个用例输入 JavaScript 代码。'
    step3: '步骤 3：点击「运行」多次执行所有用例。'
    step4: '步骤 4：比较 ops/sec 结果，找出最快的实现。'
    faq1q: 'ops/sec 是什么意思？'
    faq1a: 'ops/sec（每秒操作数）衡量一段代码在一秒内能执行多少次。数值越高越快。'
    faq2q: '这个基准测试准确吗？'
    faq2a: '基准测试在浏览器 JavaScript 引擎中运行，结果因浏览器和设备而异，适合相对比较。'
    title: 基准生成器
    description: 简单的在线基准构建器可以轻松比较任务的执行时间。

  git-memo:
    step1: '步骤 1：浏览按类别组织的 Git 速查表。'
    step2: '步骤 2：使用搜索框查找特定命令。'
    step3: '步骤 3：点击任意命令即可复制到剪贴板。'
    faq1q: '什么是 Git？'
    faq1a: 'Git 是一个分布式版本控制系统，用于追踪源代码的变更，允许多名开发者协作、分支、合并并维护项目历史。'
    faq2q: 'git pull 和 git fetch 有什么区别？'
    faq2a: 'git fetch 下载远程变更但不合并。git pull = git fetch + git merge，将远程变更应用到当前分支。'
    title: Git 备忘录
    description: Git是一种去中心化的版本管理软件。使用此备忘单，您可以快速访问最常见的git命令.

  slugify-string:
    step1: '步骤 1：输入要转换为 slug 的文本。'
    step2: '步骤 2：slug 在您输入时实时更新。'
    step3: '步骤 3：点击「复制」复制结果。'
    faq1q: '什么是 slug？'
    faq1a: 'slug 是 URL 友好的字符串，通常为小写字母并用连字符替换空格，用于 URL 路径。'
    faq2q: '支持非英文字符吗？'
    faq2a: '支持。工具将重音符号和特殊字符转换为 ASCII 等效字符。'
    title: 打乱字符串
    description: 确保字符串 url、文件名和 id 安全。

  encryption:
    step1: '步骤 1：选择「加密」或「解密」模式。'
    step2: '步骤 2：选择加密算法（AES、TripleDES、Rabbit、RC4）。'
    step3: '步骤 3：输入文本和您的密钥。'
    step4: '步骤 4：加密/解密结果立即显示。'
    faq1q: '应该使用哪种算法？'
    faq1a: 'AES（高级加密标准）是对称加密的行业标准，适用于大多数场景。'
    faq2q: '我的数据安全吗？'
    faq2a: '所有加密和解密均在浏览器本地执行，您的数据和密钥不会离开您的设备。'
    title: 加密/解密文本
    description: 使用加密算法（如AES、TripleDES、Rabbit或RC4）加密和解密文本明文。

  random-port-generator:
    step1: '步骤 1：设置要生成的端口数量。'
    step2: '步骤 2：选择是否排除知名端口（0–1023）。'
    step3: '步骤 3：点击「生成」获取一组新的随机端口。'
    step4: '步骤 4：点击「复制」复制结果。'
    faq1q: '注册端口和动态端口有什么区别？'
    faq1a: '0–1023 是知名系统端口，1024–49151 是注册端口，49152–65535 是动态/临时端口。'
    faq2q: '为什么需要随机端口？'
    faq2a: '启动本地开发服务器、容器或服务时，随机端口可避免与已运行进程冲突。'
    title: 随机端口生成
    description: 生成“已知”端口范围（0-1023）之外的随机端口号。

  yaml-prettify:
    step1: '步骤 1：将 YAML 内容粘贴到左侧编辑器。'
    step2: '步骤 2：格式化且经过验证的 YAML 出现在右侧。'
    step3: '步骤 3：复制或下载格式化后的 YAML。'
    faq1q: 'YAML 格式化有什么作用？'
    faq1a: 'YAML 格式化以统一的缩进和间距重新排版 YAML，使其更易于阅读和比较。'
    faq2q: '格式化会改变 YAML 的值吗？'
    faq2a: '不会。格式化只改变空白和格式，数据值和结构保持完全不变。'
    title: YAML美化和格式化
    description: 将YAML字符串修饰为友好的可读格式。

  eta-calculator:
    step1: '步骤 1：输入要处理的项目总数。'
    step2: '步骤 2：输入已完成的数量。'
    step3: '步骤 3：输入已经过的时间。'
    step4: '步骤 4：自动计算预计完成时间和剩余时间。'
    faq1q: 'ETA 代表什么？'
    faq1a: 'ETA 代表预计到达（或完成）时间，根据当前进度速率预测任务何时完成。'
    faq2q: 'ETA 如何计算？'
    faq2a: 'ETA = (总数 - 已完成) / (已完成 / 已用时间)，假设处理速率恒定。'
    title: ETA 计算器
    description: ETA（估计到达时间）计算器，用于知道任务的近似结束时间，例如下载的结束时刻。

  roman-numeral-converter:
    step1: '步骤 1：在输入框中输入阿拉伯数字（1–3999）或罗马数字。'
    step2: '步骤 2：转换结果自动更新。'
    step3: '步骤 3：点击「复制」复制结果。'
    faq1q: '什么是罗马数字？'
    faq1a: '罗马数字是古罗马的数字系统，使用字母表示：I (1)、V (5)、X (10)、L (50)、C (100)、D (500)、M (1000)。'
    faq2q: '为什么 4 写作 IV 而不是 IIII？'
    faq2a: '罗马数字使用减法记法：较小的数字在较大的数字前表示相减。IV = 5 - 1 = 4。'
    title: 罗马数字转换器
    description: 将罗马数字转换为数字，并将数字转换为罗马数字。

  hmac-generator:
    step1: '步骤 1：输入要认证的消息。'
    step2: '步骤 2：输入您的密钥。'
    step3: '步骤 3：选择哈希算法（SHA-256、SHA-512 等）。'
    step4: '步骤 4：复制生成的 HMAC 值。'
    faq1q: '什么是 HMAC？'
    faq1a: 'HMAC（哈希消息认证码）将密码哈希函数与密钥结合，同时验证数据完整性和真实性。'
    faq2q: 'HMAC 和普通哈希有什么区别？'
    faq2a: '普通哈希只验证数据完整性。HMAC 还需要共享密钥，只有拥有密钥的一方才能验证真实性。'
    title: Hmac 生成器
    description: 使用密钥和您喜欢的哈希函数计算基于哈希的消息身份验证代码（HMAC）。

  bip39-generator:
    step1: '步骤 1：选择助记词的单词数量（12、15、18、21 或 24 个）。'
    step2: '步骤 2：点击「生成」创建随机 BIP39 助记词。'
    step3: '步骤 3：可选：输入现有助记词以推导种子。'
    step4: '步骤 4：复制助记词并安全保存——它控制您的钱包访问权限。'
    faq1q: '什么是 BIP39 助记词？'
    faq1a: 'BIP39 是比特币改进提案标准，定义了从随机熵生成人类可读助记短语的方法，用于备份加密货币钱包。'
    faq2q: '12 个单词的短语有多少种可能？'
    faq2a: '共有 2048 的 12 次方种可能，使暴力破解在计算上不可行。'
    title: BIP39密码生成器
    description: 从现有或随机助记符生成BIP39密码短语，或从密码短语获取助记符。

  base64-file-converter:
    step1: '步骤 1：拖放或选择文件。'
