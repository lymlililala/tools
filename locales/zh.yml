    faq1q: '选择有多随机？'
    faq1a: '工具使用浏览器 Math.random() 函数，这是伪随机的，对日常决策已足够。'
    faq2q: '可以给某些选项加权吗？'
    faq2a: '目前工具对所有选项给予相同权重。如要加权某个选项，可在列表中多次添加它。'
    faq3q: 如何为随机选择添加权重？
    faq3a: 本工具每个选项权重相同，如需加权（例如某个选项出现概率更高），可在列表中多次输入该选项。例如想让「选项A」有 2 倍概率，就在列表中输入两次「选项A」。这种方式简单直接，无需额外设置，适合大多数非专业权重需求。
    faq4q: 随机决策工具使用的是真随机还是伪随机？
    faq4a: 本工具使用 JavaScript 的 Math.random()，这是伪随机数生成器（PRNG），基于确定性算法，不是真随机。对于日常决策，伪随机完全足够，统计上是均匀分布的。需要真随机（如密码学安全随机数）时应使用 window.crypto.getRandomValues()。真随机数源于物理过程（如量子噪声、大气噪声），Random.org 提供真随机服务。
