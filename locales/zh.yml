  base-converter:
    step1: '步骤 1：在任意进制输入框中输入数字（二进制、八进制、十进制、十六进制或自定义）。'
    step2: '步骤 2：其他所有进制的等效值立即出现。'
    step3: '步骤 3：点击任意结果复制。'
    faq1q: '什么是进制转换？'
    faq1a: '进制转换将数字从一种数制翻译到另一种数制。二进制（2 进制）、八进制（8 进制）、十进制（10 进制）和十六进制（16 进制）是最常见的。'
    faq2q: '如何将十六进制转换为二进制？'
    faq2a: '每个十六进制数字对应恰好 4 位二进制数。例如 F(hex) = 1111(binary)，所以 0xFF = 11111111。'
    faq3q: 在程序开发中各种进制分别有什么用途？
    faq3a: 二进制（bin）：计算机底层运算和位操作；八进制（oct）：Unix 文件权限（chmod）；十进制（dec）：日常数字；十六进制（hex）：内存地址、颜色值（#RRGGBB）、字节数据表示；Base64：二进制数据的文本编码。了解进制转换是理解计算机底层原理的基础。
    faq4q: 进制转换在计算机中有哪些实际应用？
    faq4a: 进制转换在计算机科学中广泛应用：十六进制用于表示颜色值（#FF5733）、内存地址和字节数据；二进制用于位运算和权限掩码；八进制历史上用于 Unix 文件权限；Base64 用于 URL 安全的数据编码。理解进制转换是底层编程的基础技能。
    title: 进制转换器（2/8/10/16）
    description: 在线进制转换器，支持数字在二进制（bin）、八进制（oct）、十进制（dec）、十六进制（hex）、Base64 之间互相转换，适合前端开发、汇编学习和颜色值转换。

  yaml-to-json-converter:
    step1: '步骤 1：将 YAML 内容粘贴到左侧编辑器。'
    step2: '步骤 2：实时生成等效的 JSON。'
    step3: '步骤 3：复制或下载 JSON 输出。'
    faq1q: '为什么要将 YAML 转换为 JSON？'
    faq1a: 'JSON 作为 API 数据格式得到更广泛支持，将 YAML 配置转换为 JSON 使其更具可移植性。'
    faq2q: 'YAML 注释在 JSON 中保留吗？'
    faq2a: '不保留。JSON 不支持注释，因此所有 YAML 注释在转换时都会被丢弃。'
    faq3q: YAML 和 JSON 在格式上有哪些主要差异？
    faq3a: YAML 使用缩进表示层级，支持注释（#）、多行字符串和锚点引用，更适合人类编写的配置文件。JSON 使用花括号和方括号，语法严格，更适合机器解析和 API 数据交换。YAML 1.2 是 JSON 的超集。
    faq4q: YAML 中的锚点和引用在 JSON 中如何处理？
    faq4a: YAML 支持锚点（&anchor）和引用（*alias）用于复用配置片段，这是 JSON 不具备的特性。转换为 JSON 时，引用会被展开（内联替换），生成完整的重复数据。这意味着转换后的 JSON 比 YAML 更冗长，且失去了原有的维护优势。如果需要 JSON 也支持复用，可以在应用层处理（如 JSON Schema 的 $ref）。
    title: YAML到JSON转换器
    description: 将 YAML 数据在线转换为 JSON 格式，保留层级结构和数据类型，适用于配置迁移、API 测试和数据格式转换，支持多文档 YAML，转换结果自动格式化，可一键复制。
