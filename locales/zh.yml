    step1: '步骤 1：输入任意格式的电话号码。'
    step2: '步骤 2：如需要，选择国家代码。'
    step3: '步骤 3：解析结果显示国家、类型和格式化版本。'
    faq1q: '什么是 E.164 格式？'
    faq1a: 'E.164 是国际电话号码标准。号码以 + 开头，后跟国家代码和用户号码。'
    faq2q: '从电话号码可以获取哪些信息？'
    faq2a: '从电话号码可以确定国家、地区、运营商（有时）和类型（移动、座机、免费电话等）。'
    faq3q: E.164 格式是什么？为什么在系统中应该统一使用它？
    faq3a: E.164 是国际电话号码的标准格式：+ 号开头，后跟国家代码和号码，无空格和连字符，最多 15 位数字（如 +861381234xxxx）。在数据库和 API 中统一使用 E.164 格式可避免解析歧义，方便国际化，与 Twilio、AWS SNS 等通信服务直接兼容。
    faq4q: 如何在系统中正确存储和处理国际电话号码？
    faq4a: 最佳实践：始终以 E.164 格式（+1234567890）存储，包含国家代码，不含空格和破折号，便于全球统一处理；展示时用 libphonenumber 按用户所在国家格式化；验证时使用 libphonenumber（Google 开源，各语言均有实现）而非自己写正则；数据库用 VARCHAR(20) 存储，不用 INT（可能丢失前导零）。
