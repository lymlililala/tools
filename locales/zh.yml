  yaml-viewer:
    step1: '步骤 1：将 YAML 内容粘贴到左侧编辑器。'
    step2: '步骤 2：格式化且验证后的 YAML 出现在右侧。'
    step3: '步骤 3：复制或下载格式化后的 YAML。'
    faq1q: '什么是 YAML？'
    faq1a: 'YAML（YAML Ain''t Markup Language）是一种人类友好的数据序列化语言，常用于配置文件，如 Docker Compose、Kubernetes 等。'
    faq2q: 'YAML 缩进有何规则？'
    faq2a: 'YAML 使用空格缩进表示层级，不允许使用 Tab 键。缩进量不固定，但同级节点必须保持一致。'
    faq3q: YAML 的 --- 和 ... 分别是什么含义？
    faq3a: --- 是 YAML 文档开始标记，允许在一个文件中包含多个独立的 YAML 文档。... 是文档结束标记（可选）。对于单文档 YAML 文件，--- 通常可以省略，但在 Kubernetes 和 GitHub Actions 等场景中常用于分隔多份配置。
    faq4q: YAML 和 JSON 在哪些场景下各有优势？
    faq4a: YAML 的优势：支持注释（配置文件必备）；缩进语法更接近自然语言；支持多行字符串；支持锚点和引用减少重复；人类可读性更强。JSON 的优势：语法严格，解析器实现简单；浏览器原生支持（JSON.parse）；API 和数据交换的事实标准；不存在隐式类型转换陷阱。配置文件选 YAML，数据传输选 JSON。
    title: YAML 查看 / 格式化
