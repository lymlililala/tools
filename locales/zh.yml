  yaml-to-toml:
    step1: '步骤 1：将 YAML 内容粘贴到左侧编辑器。'
    step2: '步骤 2：实时生成等效的 TOML。'
    step3: '步骤 3：复制或下载 TOML 输出。'
    faq1q: '什么时候应该用 TOML 而非 YAML？'
    faq1a: 'TOML 适合需要高度清晰性的简单配置文件。它的语法比 YAML 更严格，减少了缩进错误的可能性。'
    faq2q: 'YAML 支持锚点和别名吗？'
    faq2a: '支持。YAML 支持锚点（&）和别名（*）用于复用内容。TOML 没有直接等效的功能。'
    faq3q: YAML 转换为 TOML 时需要注意什么？
    faq3a: YAML 转 TOML 时需注意：TOML 不支持 null 值（YAML 的 null 在 TOML 中无直接等价）；TOML 要求整数类型明确区分（不像 YAML 会自动推断）；YAML 的多文档格式（--- 分隔）在 TOML 中不支持；YAML 的复杂嵌套如果层级较深，TOML 的表格嵌套语法会比较繁琐。
    faq4q: YAML 中的哪些特性在 TOML 中不受支持？
    faq4a: YAML 到 TOML 转换的不兼容特性：YAML 的锚点和引用（&anchor、*alias）在 TOML 中不存在，转换时会展开；YAML 允许 null 值，TOML 不支持（会被忽略）；YAML 的特殊类型（二进制、时间戳带时区）处理方式不同；YAML 支持多文档流（---分隔），TOML 不支持。转换后请仔细审查输出以确保正确性。
    title: YAML 到 TOML
    description: 将 YAML 数据在线转换为 TOML 格式，适用于 Rust、Go 等语言的配置文件迁移，保留层级结构和注释，结果实时生成，可一键复制，帮助开发者快速完成配置格式迁移。
