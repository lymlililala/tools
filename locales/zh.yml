about:
  metaTitle: '关于 MyUtl — 免费、注重隐私的在线工具箱'
  metaDesc: '了解 MyUtl：一个汇集 90+ 在线开发者工具的免费工具箱，全部在浏览器本地运行。无需注册、无需上传，您的数据永不离开设备。'
  content: |
    # 关于 MyUtl

    **MyUtl** 是一个免费的在线工具箱，汇集了 90 多款实用工具，覆盖开发与日常需求 —— JSON 格式化、Base64 编解码、加密、URL 工具、二维码生成、哈希计算等等。

    所有工具都**完全在您的浏览器中运行**。无需注册、无需安装、无需上传 —— 您粘贴或生成的数据永远不会离开您的设备。

    ## 隐私优先

    MyUtl 的设计理念很简单：您的数据属于您自己。所有处理都在本地设备完成，因此您可以放心处理敏感内容，而它们绝不会经过任何服务器。详见我们的[隐私政策](/privacy)。

    ## 开源

    MyUtl 基于开源项目 [it-tools](https://github.com/CorentinTh/it-tools) 构建，该项目由 [Corentin Thomasset](https://corentin.tech) 创建，并采用 **GPL-3.0** 许可证。我们衷心感谢原作者以及让 MyUtl 成为可能的整个开源社区。

    ## 技术

    MyUtl 采用 Vue 3 和 Naive UI 组件库开发，并由 Vercel 托管和持续部署。部分工具还使用了一些第三方开源库。

    ## 联系我们

    发现了 Bug，或者需要一款这里还没有的工具？我们非常乐意听到您的声音 —— 请访问[联系我们](/contact)页面，或发送邮件至 [contact{'@'}myutl.com](mailto:contact{'@'}myutl.com)。

contact:
  metaTitle: '联系 MyUtl — 支持、反馈与需求'
  metaDesc: '联系 MyUtl 团队。报告 Bug、申请新工具或提出疑问，我们通常会在 1–2 个工作日内回复。'
  content: |
    # 联系我们

    我们很乐意听到您的声音。无论您是发现了 Bug、想申请新工具、有合作想法，还是只想打个招呼 —— 都欢迎与我们联系。

    **邮箱：** [contact{'@'}myutl.com](mailto:contact{'@'}myutl.com)

    我们通常会在 **1–2 个工作日**内回复。

    ## 我们能帮您什么

    - **Bug 报告** —— 请告诉我们工具名称、您期望的结果以及实际发生的情况。附上浏览器信息有助于我们复现问题。
    - **功能申请** —— 描述您需要的工具以及使用场景。我们的许多工具都源自用户的建议。
    - **意见反馈** —— 任何让 MyUtl 更快、更清晰、更好用的想法，我们都欢迎。
    - **商务与合作** —— 合作或其他事宜，同样可发送至上述邮箱。

    ## 写信之前

    许多问题在[关于我们](/about)页面已有解答。关于我们如何处理您的数据，请参阅[隐私政策](/privacy)。

privacy:
  metaTitle: '隐私政策 — MyUtl'
  metaDesc: 'MyUtl 如何处理您的数据：工具均在浏览器本地运行；我们如实披露所使用的 Cookie 与第三方广告（Google）。'
  content: |
    # 隐私政策

    _最后更新：2026 年 6 月 14 日_

    MyUtl（“我们”）尊重您的隐私。本政策说明我们的工具如何运作，以及当您访问 [myutl.com](https://myutl.com) 时可能会收集哪些信息。

    ## 本地优先的工具

    我们所有的工具都**完全在您的浏览器中运行**。您输入工具的文本、文件和数据均在您自己的设备上处理，**绝不会传输到或存储在我们的服务器上**。

    ## Cookie 及类似技术

    本网站会出于以下目的使用 Cookie 及类似技术：

    - **偏好设置** —— 主题选择、收藏的工具等会保存在您浏览器的本地存储中，保留在您的设备上，绝不会发送给我们。
    - **广告** —— 由下文所述的第三方服务设置。

    ## 广告

    我们使用包括 **Google** 在内的第三方广告公司，在您访问 MyUtl 时投放广告。

    - Google 及其合作伙伴可能会使用 Cookie（包括 **DoubleClick / DART Cookie**），根据您过去对本网站及其他网站的访问来投放广告。
    - Google 使用广告 Cookie，使其及其合作伙伴能够根据您对本网站和/或互联网上其他网站的访问，向您投放广告。
    - 您可以通过访问 [Google 广告设置](https://www.google.com/settings/ads) 或 [www.aboutads.info/choices](https://www.aboutads.info/choices) 退出个性化广告。
    - 有关 Google 如何使用来自本网站的数据，详见 [Google 合作伙伴网站政策](https://policies.google.com/technologies/partner-sites)。

    ## 您的选择

    根据您所在地区的不同，您可能对自己的数据享有相关权利，包括退出个性化广告。在法律要求的情况下，欧洲经济区、英国和瑞士的访客会看到关于广告与 Cookie 使用的同意提示。

    ## 儿童隐私

    MyUtl 并非面向 13 岁以下儿童，我们也不会有意收集他们的任何个人信息。

    ## 政策变更

    我们可能会不时更新本政策。任何变更都将连同更新日期发布在本页面上。

    ## 联系我们

    如对本隐私政策有任何疑问，请发送邮件至 [contact{'@'}myutl.com](mailto:contact{'@'}myutl.com)。

terms:
  metaTitle: '服务条款 — MyUtl'
  metaDesc: '管辖您使用 MyUtl 免费在线工具箱的条款。使用本服务即表示您同意这些条款。'
  content: |
    # 服务条款

    _最后更新：2026 年 6 月 14 日_

    访问或使用 [myutl.com](https://myutl.com) 上的 **MyUtl**（“本服务”）即表示您同意本服务条款。如果您不同意，请勿使用本服务。

    ## 服务的使用

    MyUtl 提供一系列免费的在线工具，可用于个人和商业用途。这些工具在您的浏览器中运行，且完全免费。

    ## 可接受的使用

    您同意不滥用本服务。具体而言，您不得：

    - 试图扰乱、超载或干扰本服务及其基础设施；
    - 使用自动化手段滥用本服务，或以会降低他人使用体验的规模进行抓取；
    - 将本服务用于任何非法目的或违反任何适用法律的行为。

    ## 不提供担保

    本服务按**“现状”**和**“可用”**基础提供，不附带任何明示或暗示的担保。尽管我们力求准确，但不保证工具完全无误，也不保证其输出适用于任何特定用途。请始终对关键结果进行独立核实。

    ## 责任限制

    在法律允许的最大范围内，MyUtl 及其贡献者对因您使用或无法使用本服务而产生的任何直接、间接、附带或后果性损害概不负责。

    ## 知识产权

    MyUtl 基于开源项目 [it-tools](https://github.com/CorentinTh/it-tools) 构建，采用 **GPL-3.0** 许可证。原始作品的权利仍归其各自作者所有。

    ## 条款变更

    我们可能会不时修订本条款。变更生效后继续使用本服务，即表示您接受修订后的条款。

    ## 联系我们

    对本条款有疑问？请发送邮件至 [contact{'@'}myutl.com](mailto:contact{'@'}myutl.com)。

