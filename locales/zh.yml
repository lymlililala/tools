    step1: '步骤 1：点击页面任意位置，使键盘监听器获得焦点。'
    step2: '步骤 2：按下键盘上的任意键。'
    step3: '步骤 3：键名、keyCode、code、位置和修饰键状态立即显示。'
    step4: '步骤 4：点击任意字段旁的复制图标可复制该值。'
    faq1q: '什么是 keyCode？'
    faq1a: 'keyCode 是表示所按键的旧式整数属性，由浏览器定义。现代代码应使用 event.key 或 event.code 替代。'
    faq2q: 'key、code 和 keyCode 有什么区别？'
    faq2a: 'key 表示打印字符，code 表示物理按键位置，keyCode 是旧式数值。现代 JavaScript 推荐使用 key 和 code。'
    faq3q: 如何在 JavaScript 中正确监听键盘事件？
    faq3a: 推荐使用 event.key 获取用户按键的逻辑值（如 'a'、'Enter'、'ArrowUp'），使用 event.code 获取物理按键位置（如 'KeyA'、'ShiftLeft'）。旧版的 keyCode 已被废弃，现代浏览器中应优先使用 key 和 code 属性。
    faq4q: KeyboardEvent 中 keyCode、which 和 key 有什么区别？
    faq4a: keyCode 和 which 是已废弃的属性，返回数字（如 Enter=13），不同键盘布局下非字母键数值不一致；key 是现代标准，返回有意义的字符串（如 Enter、ArrowUp、a），与键盘布局无关，推荐使用。code 属性返回物理键位（如 KeyA），与输入语言无关。新代码应使用 event.key 或 event.code。
    title: Keycode 信息
    description: 在线键盘键码查询工具，实时显示任意按键的 JavaScript keyCode、key、code、location 及修饰键（Ctrl/Shift/Alt/Meta）信息，帮助开发者快速调试键盘事件处理逻辑。

