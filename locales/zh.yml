    step2: '步骤 2：格式化且缩进整齐的 XML 出现在右侧。'
    step3: '步骤 3：复制或下载格式化后的 XML。'
    faq1q: '什么是 XML？'
    faq1a: 'XML（可扩展标记语言）是用于存储和传输结构化数据的灵活标记语言。与 HTML 不同，XML 标签由用户自定义。'
    faq2q: 'XML 和 JSON 有什么区别？'
    faq2a: 'XML 使用标签和属性，支持注释，较为冗长。JSON 使用键值对和数组，更轻量，在现代 API 中更常见。'
    title: XML 格式化
    description: 将XML字符串修饰为友好的可读格式。

  temperature-converter:
    title: 温度转换器
    description: 开尔文、摄氏度、华氏度、兰金、德莱尔、牛顿、雷奥穆尔和罗默温度度数转换。
    step1: 第一步：在任意单位输入框中输入温度值。
    step2: 第二步：其他所有单位的换算结果即时显示。
    faq1q: 如何将摄氏度转换为华氏度？
    faq1a: 公式：°F = °C × 9/5 + 32。例如，100°C = 212°F（水的沸点）。
    faq2q: 什么是绝对零度？
    faq2a: 绝对零度是最低可能温度：0 开尔文 = −273.15°C = −459.67°F。在此温度下，粒子的热运动降至最低。

  chmod-calculator:
    step1: '步骤 1：勾选所有者、组和其他用户的权限复选框。'
    step2: '步骤 2：chmod 数值（如 755）和符号表示（如 rwxr-xr-x）自动更新。'
    step3: '步骤 3：复制 chmod 命令用于终端。'
    faq1q: '什么是 chmod？'
    faq1a: 'chmod（更改模式）是 Unix/Linux 命令，用于修改文件和目录的权限，控制谁可以读取、写入或执行文件。'
    faq2q: 'chmod 755 是什么意思？'
    faq2a: '755 表示所有者有读+写+执行权限（7），组和其他用户有读+执行权限（5）。常用于 Web 服务器目录。'
    title: Chmod 计算器
    description: 使用此在线的chmod计算器计算chmod权限和命令。

  rsa-key-pair-generator:
    step1: '步骤 1：选择密钥大小（1024、2048 或 4096 位）。'
    step2: '步骤 2：点击「生成」创建新的 RSA 密钥对。'
    step3: '步骤 3：分别复制私钥和公钥（PEM 格式）。'
    faq1q: '什么是 RSA？'
    faq1a: 'RSA（Rivest-Shamir-Adleman）是广泛使用的非对称加密算法。公钥加密数据，只有对应的私钥才能解密。'
    faq2q: '应该使用多大的密钥？'
    faq2a: '2048 位是安全推荐的最低标准。4096 位提供更强的安全性。1024 位被认为不安全，不应使用。'
    title: RSA密钥对生成器
    description: 生成新的随机RSA私钥和公钥pem证书。

  html-wysiwyg-editor:
    step1: '步骤 1：在所见即所得编辑器中输入或粘贴内容。'
    step2: '步骤 2：使用工具栏应用格式（粗体、斜体、链接、列表等）。'
    step3: '步骤 3：切换到「源码」视图查看生成的 HTML 代码。'
    step4: '步骤 4：复制 HTML 源码用于您的项目。'
    faq1q: '所见即所得（WYSIWYG）是什么意思？'
    faq1a: 'WYSIWYG 代表所见即所得。编辑器以浏览器中将呈现的样式显示内容，无需了解 HTML。'
    faq2q: '生成的 HTML 是否干净？'
    faq2a: '编辑器生成语义化 HTML5，尽量避免内联样式。'
    title: HTML所见即所得编辑器
    description: 在线HTML编辑器具有功能丰富的所见即所得编辑器，立即获得内容的源代码。

  yaml-to-toml:
    step1: '步骤 1：将 YAML 内容粘贴到左侧编辑器。'
    step2: '步骤 2：实时生成等效的 TOML。'
    step3: '步骤 3：复制或下载 TOML 输出。'
    faq1q: '什么时候应该用 TOML 而非 YAML？'
    faq1a: 'TOML 适合需要高度清晰性的简单配置文件。它的语法比 YAML 更严格，减少了缩进错误的可能性。'
    faq2q: 'YAML 支持锚点和别名吗？'
    faq2a: '支持。YAML 支持锚点（&）和别名（*）用于复用内容。TOML 没有直接等效的功能。'
    title: YAML 到 TOML
    description: 解析YAML并将其转换为TOML。

  mac-address-generator:
    step1: '步骤 1：输入要生成的 MAC 地址数量。'
    step2: '步骤 2：可选：输入前缀（OUI）以生成特定厂商的地址。'
    step3: '步骤 3：选择分隔符（冒号、连字符或无）。'
    step4: '步骤 4：点击「生成」并复制结果。'
    faq1q: 'MAC 地址有什么用途？'
    faq1a: 'MAC 地址用于在局域网数据链路层（第 2 层）唯一标识设备。路由器和交换机使用 MAC 地址进行本地流量转发。'
    faq2q: '可以生成组播 MAC 地址吗？'
    faq2a: '生成器默认创建单播地址。如果第一字节的最低有效位为 1，则该地址为组播地址。'
    title: MAC 地址生成器
    description: 输入数量和前缀。MAC地址将以您选择的大小写（大写或小写）生成

  json-diff:
    step1: '步骤 1：将第一个 JSON 对象粘贴到左侧面板。'
    step2: '步骤 2：将第二个 JSON 对象粘贴到右侧面板。'
    step3: '步骤 3：新增字段用绿色高亮，删除字段用红色，变更值用黄色。'
    faq1q: 'JSON 对比有什么用途？'
    faq1a: 'JSON 对比用于比较 API 响应、配置文件版本或数据库快照，识别两个状态之间的变化。'
    faq2q: '支持嵌套 JSON 吗？'
    faq2a: '支持。对比查看器递归比较嵌套对象和数组，精确显示哪些深层嵌套键被添加、删除或修改。'
    title: JSON 差异比较
    description: 比较两个JSON对象并获得它们之间的差异。
  jwt-parser:
    step1: '步骤 1：将 JWT 令牌粘贴到输入框中。'
    step2: '步骤 2：Header、Payload 和 Signature 被解码并用颜色标记。'
    step3: '步骤 3：exp 和 iat 等标准声明显示人类可读的日期。'
    faq1q: '什么是 JWT？'
    faq1a: 'JWT（JSON Web Token）是安全传输 JSON 对象信息的开放标准（RFC 7519），常用于身份认证和信息交换。'
    faq2q: 'JWT 令牌是加密的吗？'
    faq2a: '标准 JWT（JWS）是签名的但未加密，任何人都可以解码 Payload。如需保密性，请使用 JWE。'
    title: JWT 解析器
    description: 解析和解码JSON Web Token（jwt）并显示其内容。

  date-converter:
    step1: '步骤 1：在输入框中输入日期和时间。'
    step2: '步骤 2：选择源时区。'
    step3: '步骤 3：日期以多种格式和时区显示。'
    faq1q: '支持哪些日期格式？'
    faq1a: '支持 ISO 8601、Unix 时间戳、RFC 2822 和常见本地化格式，可在 UTC、EST、PST、CET 等时区之间转换。'
    faq2q: '什么是 Unix 时间戳？'
    faq2a: 'Unix 时间戳（纪元时间）是自 1970 年 1 月 1 日 00:00:00 UTC 起经过的秒数，与时区无关，在编程中广泛使用。'
    title: 日期时间转换器
    description: 将日期和时间转换为各种不同的格式

  phone-parser-and-formatter:
    step1: '步骤 1：输入任意格式的电话号码。'
    step2: '步骤 2：如需要，选择国家代码。'
    step3: '步骤 3：解析结果显示国家、类型和格式化版本。'
    faq1q: '什么是 E.164 格式？'
    faq1a: 'E.164 是国际电话号码标准。号码以 + 开头，后跟国家代码和用户号码。'
    faq2q: '从电话号码可以获取哪些信息？'
    faq2a: '从电话号码可以确定国家、地区、运营商（有时）和类型（移动、座机、免费电话等）。'
    title: 电话分析器和格式化程序
    description: 解析、验证和格式化电话号码。获取有关电话号码的信息，如国家/地区代码、类型等。

  ipv4-subnet-calculator:
    step1: '步骤 1：输入带 CIDR 表示法的 IPv4 地址（如 192.168.1.0/24）。'
    step2: '步骤 2：自动计算网络地址、广播地址、可用主机范围和子网掩码。'
    step3: '步骤 3：复制任意字段用于网络配置。'
    faq1q: '什么是 CIDR 表示法？'
    faq1a: 'CIDR 以 IP 地址加斜杠和前缀长度表示网络。例如 /24 表示 255.255.255.0 子网掩码，提供 254 个可用主机。'
    faq2q: '/24 支持多少台主机？'
    faq2a: '/24 子网有 256 个地址（2 的 8 次方）。减去网络地址和广播地址，剩余 254 个可用主机地址。'
    title: IPv4子网计算器
    description: 解析IPv4 CIDR块，并获取有关子网络的所有所需信息。

  og-meta-generator:
    step1: '步骤 1：输入您的页面标题、描述、URL 和图片。'
    step2: '步骤 2：选择类型（网站、文章、产品等）。'
    step3: '步骤 3：复制生成的 Open Graph 和 Twitter Card meta 标签。'
    faq1q: '什么是 Open Graph meta 标签？'
    faq1a: 'Open Graph 标签是控制您的页面在社交媒体（Facebook、Twitter、LinkedIn 等）分享时显示效果的 HTML meta 标签。'
    faq2q: 'og:image 为什么重要？'
    faq2a: 'og:image 是页面在社交媒体分享时显示的缩略图。推荐尺寸为 1200×630px。'
    title: 开放式图形元生成器
    description: 为您的网站生成开放式图形和社交html元标记。

  ipv6-ula-generator:
    step1: '步骤 1：点击「生成」创建随机的 IPv6 ULA 前缀。'
    step2: '步骤 2：显示生成的前缀、全局 ID 和完整地址范围。'
    step3: '步骤 3：复制前缀用于您的局域网配置。'
    faq1q: '什么是 IPv6 ULA 地址？'
    faq1a: 'ULA（唯一本地地址）是 fc00::/7 范围内的 IPv6 地址，类似于私有 IPv4 地址段，不在公网路由。'
    faq2q: 'ULA 全局 ID 是如何生成的？'
    faq2a: '根据 RFC 4193，40 位全局 ID 应使用当前时间和 EUI-64 伪随机生成，以最小化不同组织间的碰撞概率。'
    title: IPv6 ULA生成器
    description: 根据RFC4193在网络上生成您自己的本地不可路由IP地址。

  hash-text:
    title: Hash 文本
    description: '使用所需的函数哈希文本字符串：MD5、SHA1、SHA256、SHA224、SHA512、SHA384、SHA3或RIPEMD160'
    step1: 第一步：在输入框中输入或粘贴文本。
    step2: 第二步：选择哈希算法（MD5、SHA-256 等）。
    step3: 第三步：哈希结果即时显示，点击即可复制。
    faq1q: 什么是哈希函数？
    faq1a: 哈希函数将任意输入转换为固定长度的输出（摘要）。它是单向的——无法从哈希值逆推出原始输入。广泛用于密码存储、文件完整性校验和数字签名。
    faq2q: 应该使用哪种哈希算法？
    faq2a: 安全敏感场景请使用 SHA-256 或 SHA-512。MD5 和 SHA-1 在密码学上已被认为不安全，仅适用于非安全用途如校验和。

  json-to-toml:
    step1: '步骤 1：将 JSON 内容粘贴到左侧编辑器。'
    step2: '步骤 2：实时生成等效的 TOML。'
    step3: '步骤 3：复制或下载 TOML 输出。'
    faq1q: '哪些 JSON 结构在 TOML 中不受支持？'
    faq1a: 'TOML 不支持 null 值或混合类型数组。含有这些特性的 JSON 可能无法干净地转换为 TOML。'
    faq2q: '为什么要将 JSON 转换为 TOML？'
    faq2a: 'TOML 对配置文件更具可读性。某些工具（如 Cargo、Hugo）只支持 TOML，需要从 JSON 转换。'
    title: JSON 转 TOML
    description: 解析JSON并将其转换为TOML。

  device-information:
