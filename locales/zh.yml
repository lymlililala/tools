    description: 在线文本哈希工具，支持 MD5、SHA1、SHA256、SHA224、SHA512、SHA384、SHA3 和 RIPEMD160 等多种哈希算法，输入文本即时输出哈希值，适合数据完整性校验和密码学学习。
    step1: 第一步：在输入框中输入或粘贴文本。
    step2: 第二步：选择哈希算法（MD5、SHA-256 等）。
    step3: 第三步：哈希结果即时显示，点击即可复制。
    faq1q: 什么是哈希函数？
    faq1a: 哈希函数将任意输入转换为固定长度的输出（摘要）。它是单向的——无法从哈希值逆推出原始输入。广泛用于密码存储、文件完整性校验和数字签名。
    faq2q: 应该使用哪种哈希算法？
    faq2a: 安全敏感场景请使用 SHA-256 或 SHA-512。MD5 和 SHA-1 在密码学上已被认为不安全，仅适用于非安全用途如校验和。
    faq3q: MD5 和 SHA256 有什么区别？哪个更安全？
    faq3a: MD5 已存在碰撞漏洞，不再适合安全场景，只适合文件完整性校验等非安全用途。SHA256 是目前安全的选择，适合数字签名和证书。密码存储请使用 bcrypt 或 Argon2，而非任何 SHA 系列算法。
    faq4q: 为什么不应该用 MD5/SHA 来存储密码？
    faq4a: MD5/SHA 系列算法设计用于快速哈希，对密码存储恰恰是缺点：GPU 每秒可计算数十亿次哈希，配合预计算的彩虹表，破解简单密码只需秒级。密码存储应使用专门设计的慢哈希算法：bcrypt（最广泛）、scrypt（内存密集）或 Argon2id（推荐，赢得密码哈希竞赛）。

