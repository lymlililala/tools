  password-strength-analyser:
    step1: '步骤 1：在输入框中输入或粘贴您的密码。'
    step2: '步骤 2：强度仪表随您的输入实时更新。'
    step3: '步骤 3：查看评分、破解时间估计和改进建议。'
    faq1q: '什么样的密码是强密码？'
    faq1a: '强密码长度 12 位以上，包含大写、小写、数字和符号的组合，避免常见词汇或规律。'
    faq2q: '我的密码会上传到服务器吗？'
    faq2a: '不会。所有分析均在浏览器本地完成，您的密码不会离开您的设备。'
    faq3q: 什么样的密码才算足够安全？
    faq3a: 一个安全的密码应至少 12 位，包含大小写字母、数字和特殊符号，且不含常见词语或个人信息。更安全的方式是使用密码管理器生成 20 位以上的随机密码，并为每个网站使用不同密码，配合双因素认证（2FA）。
    faq4q: 什么样的密码才算真正安全？
    faq4a: 真正安全的密码特征：至少 16 位（越长越好）；随机性高（不是单词或可预测模式）；包含大小写字母、数字和特殊字符的组合。最安全的方式是使用密码管理器（Bitwarden、1Password 等）生成和存储完全随机的高强度密码，不同网站使用不同密码。密码短语（4-5 个随机词）也是兼顾安全和记忆的好选择。
    title: 密码强度分析仪
    description: 在线密码强度检测工具，实时评估密码的安全强度，估算暴力破解所需时间，并给出改进建议，支持信息熵值计算和常见弱密码检测，帮助你设置更安全的密码，防止账户被爆破攻击。
