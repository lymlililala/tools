    faq1q: 'MAC 地址有什么用途？'
    faq1a: 'MAC 地址用于在局域网数据链路层（第 2 层）唯一标识设备。路由器和交换机使用 MAC 地址进行本地流量转发。'
    faq2q: '可以生成组播 MAC 地址吗？'
    faq2a: '生成器默认创建单播地址。如果第一字节的最低有效位为 1，则该地址为组播地址。'
    faq3q: 本地管理 MAC 地址（LA）和全局管理地址有什么区别？
    faq3a: 全局管理地址（UAA）是由 IEEE 分配给硬件制造商的唯一 OUI 生成的，保证全球唯一。本地管理地址（LAA）将第一字节的第二低位设为 1，表示该地址由网络管理员手动配置，不由 IEEE 保证全局唯一。LAA 常用于虚拟机、容器和网络测试环境中。
    faq4q: 随机 MAC 地址在网络测试中有哪些用途？
    faq4a: 随机 MAC 地址的用途：网络模拟测试（测试 DHCP 服务器分配大量地址的能力）；交换机 MAC 表压力测试；网络隔离和虚拟化环境（VM 需要唯一 MAC）；隐私保护（现代手机在扫描 WiFi 时使用随机 MAC）；绕过基于 MAC 地址的访问控制测试其安全性。生成时注意本地管理位避免与真实设备冲突。
