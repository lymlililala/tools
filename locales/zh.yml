    step2: '步骤 2：查看屏幕分辨率、像素比、操作系统、浏览器和连接详情。'
    step3: '步骤 3：点击任意值复制。'
    faq1q: '显示哪些信息？'
    faq1a: '工具显示屏幕分辨率、视口大小、像素比、色深、浏览器名称和版本、操作系统、语言以及在线/离线状态。'
    faq2q: '这些信息会发送到服务器吗？'
    faq2a: '不会。所有信息均从浏览器 JavaScript API 本地读取，不传输任何数据。'
    faq3q: 为什么不同网站检测到的设备信息有时不一样？
    faq3a: 不同网站使用不同的检测方法和库。有些信息（如屏幕分辨率、User-Agent）是准确的，而设备型号等信息通常是从 User-Agent 字符串推断的，准确性有限。现代浏览器为保护用户隐私，对某些 API 加入了随机噪声（如 canvas 指纹保护），导致不同站点可能获取到略有不同的值。
    faq4q: 网站如何根据设备信息提供适配体验？
    faq4a: 响应式设计根据屏幕宽度（viewport）调整布局；设备像素比（DPR）用于提供 1x/2x/3x 图片（srcset）；UA 检测可区分移动端和桌面端特性（如触摸支持）；连接速度信息可用于降低图片质量节省流量。现代建议用特性检测（feature detection）而非 UA 嗅探，更可靠且面向未来。
    title: 设备信息检测
    description: 检测当前浏览器和运行设备的详细信息，包括屏幕分辨率、像素比、浏览器版本、操作系统、用户代理字符串和网络连接类型等，帮助前端开发者进行设备适配调试和响应式布局测试。

  pdf-signature-checker:
    step1: '步骤 1：拖放或选择 PDF 文件。'
    step2: '步骤 2：工具扫描 PDF 中的数字签名。'
    step3: '步骤 3：有效签名显示签名者信息和证书详情。'
    faq1q: '什么是 PDF 数字签名？'
    faq1a: 'PDF 数字签名使用公钥密码学验证签名者身份，并确认文档自签名后未被篡改。'
    faq2q: '我的 PDF 会上传到服务器吗？'
    faq2a: '不会。PDF 完全在浏览器中使用 JavaScript 处理，您的文件不会离开您的设备。'
    faq3q: PDF 数字签名和电子签名有什么区别？
    faq3a: 数字签名（Digital Signature）使用公钥密码学（PKI）技术，通过证书颁发机构（CA）验证签署者身份，具有法律效力，可检测文档是否被篡改。电子签名（e-Signature）是更广泛的概念，包括扫描手写签名、在线签名平台等，技术要求较低。PDF 数字签名属于前者，本工具专门检测 PKI 数字签名。
    faq4q: PDF 数字签名和电子签名有什么区别？
    faq4a: 数字签名（Digital Signature）是使用 PKI 证书（如 X.509）对 PDF 进行加密签名，可验证签名者身份和文档完整性，法律效力强；电子签名（E-Signature）是广义概念，包括手写签名图片、点击确认等，未必有密码学保证。中国《电子签名法》认可符合条件的数字签名的法律效力。
    title: PDF签名检查器
    description: 在线 PDF 数字签名验证工具，检测 PDF 文件中的数字签名数量和有效性，判断文件签名后内容是否被篡改，支持拖拽上传，结果实时展示，适合合同核验和文档真实性验证。
