  user-agent-parser:
    step1: '步骤 1：您当前浏览器的 User-Agent 字符串已自动填入。'
    step2: '步骤 2：或粘贴任意 User-Agent 字符串进行分析。'
    step3: '步骤 3：提取浏览器、引擎、操作系统、设备和 CPU 架构信息。'
    faq1q: '什么是 User-Agent 字符串？'
    faq1a: 'User-Agent 字符串是浏览器随每个 HTTP 请求发送的标识符，告知服务器浏览器类型、操作系统和设备信息。'
    faq2q: '为什么 User-Agent 字符串看起来这么复杂？'
    faq2a: '出于历史兼容性原因，现代浏览器在 UA 中包含多个旧浏览器标识符，导致字符串越来越复杂。'
    faq3q: 如何在 JavaScript 中获取当前浏览器的 User-Agent？
    faq3a: 在浏览器端可用 navigator.userAgent 获取 UA 字符串。但建议避免依赖 UA 检测来判断浏览器能力，改用功能检测（如 if ('serviceWorker' in navigator)）。UA 可以被用户修改，且随着浏览器的「UA 精简」趋势，UA 包含的信息越来越少。
    faq4q: User-Agent 字符串解析在现代 Web 开发中还有用吗？
    faq4a: UA 字符串解析的局限：现代浏览器的 UA 字符串复杂且刻意模糊（历史兼容问题），新兴 User-Agent Client Hints API 更结构化可靠；Chrome 正在逐步冻结 UA 字符串。仍有用的场景：流量分析（区分真实用户和爬虫）；老旧系统兼容性检测；反爬虫；CDN 和 WAF 的 Bot 检测。新项目建议使用 Client Hints API。
