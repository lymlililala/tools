    faq1q: '什么是 Slug？'
    faq1a: 'Slug 是 URL 友好的字符串，通常为小写字母并用连字符替换空格，去除特殊符号，常用于 URL 路径、文件名和 ID。'
    faq2q: '支持非英文字符吗？'
    faq2a: '支持。工具会将重音符号和特殊字符转换为 ASCII 等效字符，例如 é → e，ü → u。'
    faq3q: URL slug 有哪些最佳实践？
    faq3a: 好的 URL slug 应：全小写、用连字符（-）分隔单词（不用下划线）、不含特殊字符和空格、简短且包含核心关键词（不超过 60 字符）、避免使用冠词（a/an/the）。例如 /blog/seo-best-practices 比 /blog/SEO_Best_Practices_2024 更好。
    faq4q: 生成 URL Slug 时应该遵循哪些最佳实践？
    faq4a: URL Slug 最佳实践：全小写字母；用连字符（-）连接单词，不用下划线（下划线在 Google 视为单词连接符，不如连字符友好）；移除特殊字符和标点；非 ASCII 字符（如中文）转为拼音或删除；保持简短（3-5 个关键词）且有意义；避免停用词（a, the, is）。CMS 系统（WordPress、Ghost）默认使用此规范。
