  json-minify:
    step1: '步骤 1：将 JSON 粘贴到左侧编辑器。'
    step2: '步骤 2：右侧实时显示压缩后的 JSON。'
    step3: '步骤 3：点击「复制」复制压缩后的 JSON。'
    faq1q: '为什么要压缩 JSON？'
    faq1a: '压缩 JSON 去除所有空白和换行，减小文件体积，适用于 API 载荷和生产环境配置文件。'
    faq2q: '压缩会改变 JSON 数据吗？'
    faq2a: '不会。压缩只删除无关紧要的空白，数据值和结构保持完全不变。'
    faq3q: JSON 压缩能节省多少空间？
    faq3a: 压缩效果取决于格式化 JSON 中的空白量。通常情况下，压缩后体积可减少 20%~50%。对于嵌套层级较深的 JSON，压缩效果更明显。压缩后的 JSON 适合 API 响应和网络传输，而格式化 JSON 适合开发调试。
    faq4q: JSON 压缩在生产环境中能带来多少性能提升？
    faq4a: 实际效果取决于 JSON 大小和服务器是否开启 Gzip/Brotli 压缩。未压缩时，去除空白可减少 20-30% 体积；但如果服务器已开启 Brotli 压缩，手动 JSON 压缩效果微乎其微。建议始终开启 HTTP 响应的 Brotli/Gzip，而不是手动压缩 JSON；JSON 压缩主要用于减少存储空间或特定不支持 HTTP 压缩的传输场景。
