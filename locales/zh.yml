  url-parser:
    step1: '步骤 1：将 URL 粘贴到输入框中。'
    step2: '步骤 2：URL 被解析为各个组成部分：协议、主机、路径、查询参数、哈希。'
    step3: '步骤 3：点击任意字段复制该组件。'
    faq1q: '显示哪些 URL 组件？'
    faq1a: '工具提取：协议、用户名、密码、主机名、端口、路径、查询字符串、各查询参数和哈希片段。'
    faq2q: '如果 URL 没有查询参数怎么办？'
    faq2a: '没有查询参数时，查询参数区域会自动隐藏。'
    faq3q: URL 的各个组成部分是什么？
    faq3a: "一个完整的 URL 由以下部分组成：scheme（协议，如 https）、userinfo（用户名:密码，可选）、host（域名或 IP）、port（端口，可选）、path（路径）、query（查询参数，?key=value&…）、fragment（页面锚点，# 开头）。例如 https://user:pass{'@'}example.com:8080/path?q=1#top。"
    faq4q: 解析 URL 时应该使用浏览器内置 API 还是正则表达式？
    faq4a: 强烈推荐使用内置 API：浏览器的 new URL(urlString) 和 Node.js 的 new URL(urlString) 能正确处理各种边界情况（IPv6 地址、Unicode 域名、相对路径）；而自己写的正则很难覆盖所有 RFC 3986 规定的合法 URL 格式。URL 解析看似简单，但边界情况非常多，使用标准库是最可靠的做法。
    title: URL 解析器
    description: 在线 URL 解析工具，解析 URL 字符串并拆分为协议（protocol）、主机（host）、路径（path）、查询参数（query string）、端口、用户名密码等各个组成部分。
