    analogous: 类比色
    triadic: 三角配色
    splitComplementary: 分裂互补
    tetradic: 四色（正方形）
    clickToCopy: 点击色块可复制其十六进制值。
    step1: 第一步：使用取色器选择基础颜色，或直接输入十六进制色值。
    step2: 第二步：工具自动生成明暗色阶和配色方案。
    step3: 第三步：点击任意色块即可复制其十六进制值到剪贴板。
    faq1q: 什么是配色方案？
    faq1a: 配色方案是基于色轮上颜色位置关系得出的视觉和谐的色彩组合。常见类型包括互补色（对侧）、类比色（相邻）和三角配色（等距分布）。
    faq2q: 色阶（Tints）和暗色阶（Shades）有什么区别？
    faq2a: 色阶是在基础色中加入白色（使颜色变浅），暗色阶是在基础色中加入黑色（使颜色变深）。本工具同时生成两者，提供完整的色彩范围。

