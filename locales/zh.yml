    step2: 第二步：根据需要设置根字体大小、父元素字体大小和视口尺寸。
    step3: 第三步：所有换算结果即时显示，点击任意结果可将其作为新的输入值。
    faq1q: rem 和 em 有什么区别？
    faq1a: rem 相对于根元素字体大小（大多数浏览器默认 16px）。em 相对于当前元素父元素的字体大小，可能发生级联累积。
    faq2q: 什么时候应该用 rem 而不是 px？
    faq2a: 字体大小和间距使用 rem，可随用户浏览器字体设置自动缩放（更好的无障碍访问性）。px 适用于边框、固定尺寸元素等需要精确控制的场景。
    faq3q: 什么时候应该用 px，什么时候用 rem 或 em？
    faq3a: px 适合固定尺寸的元素（如边框、阴影、图标尺寸）。rem 适合字体大小和间距，基于根元素字体大小，便于全局缩放，无障碍访问更好。em 适合相对于父元素的尺寸调整。vw/vh 适合全屏布局和响应式设计。
    faq4q: 什么时候应该用 rem 而不是 px？
    faq4a: rem 基于根元素字体大小，适合响应式排版——用户在浏览器设置中调整字体大小时，rem 单位的元素会同比例变化，提升无障碍性。px 适合固定尺寸（如边框 1px）。最佳实践：字体大小、间距、容器宽度用 rem；边框、阴影用 px；媒体查询使用 em。

