    faq2q: '生成的 HTML 是否干净？'
    faq2a: '编辑器生成语义化 HTML5，尽量避免内联样式。'
    faq3q: WYSIWYG 编辑器生成的 HTML 代码质量如何？
    faq3a: WYSIWYG 编辑器通常生成基本可用的 HTML，但可能包含冗余标签和行内样式。本工具尽量输出语义化 HTML5（h1-h6、strong、em 等），而非 <font>、<b> 等旧式标签。建议将生成的 HTML 结合自定义 CSS 使用，以获得更一致的样式效果，避免依赖编辑器内联样式。
    faq4q: 所见即所得编辑器生成的 HTML 有哪些常见问题？
    faq4a: 常见问题：生成冗余嵌套标签和内联样式（难以维护）；从 Word 粘贴带入大量垃圾样式；不同浏览器的编辑行为不一致；输出的 HTML 可能包含 XSS 风险（需服务端清洗）；语义化差（大量 span style 而非语义标签）。使用时建议配合 DOMPurify 等库做服务端 sanitize。
