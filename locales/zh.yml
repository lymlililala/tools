  basic-auth-generator:
    step1: '步骤 1：输入您的用户名和密码。'
    step2: '步骤 2：Base64 编码的 Basic Auth 头部值立即生成。'
    step3: '步骤 3：复制完整的 Authorization 头部值。'
    faq1q: '什么是 HTTP Basic 认证？'
    faq1a: 'HTTP Basic Auth 是 HTTP 协议内置的简单认证方案。客户端随每个请求发送 Authorization: Basic base64(user:password)。'
    faq2q: 'Basic Auth 安全吗？'
    faq2a: 'Basic Auth 本身不安全，因为凭据只是 Base64 编码而非加密。必须在 HTTPS 上使用。'
    faq3q: Basic Auth 和 Bearer Token 认证有什么区别？
    faq3a: Basic Auth 在每个请求的 Authorization 头中以 Base64 编码发送用户名和密码，简单但存在安全风险，必须配合 HTTPS。Bearer Token 在 Authorization 头中发送一个短期令牌（如 JWT），不直接暴露密码，可以设置过期时间和权限范围，更适合现代 API 设计和单点登录场景。
    faq4q: Basic Auth 安全吗？应该在什么情况下使用？
    faq4a: Basic Auth 将用户名和密码用 Base64 编码后放在请求头中，本身不提供加密。必须配合 HTTPS 使用才相对安全。适合内部 API、开发测试环境或不需要高安全性的场景。生产环境面向用户的服务建议使用 OAuth2、JWT 或 API Key 等更安全的认证方式。
