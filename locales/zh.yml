  temperature-converter:
    title: 温度单位换算器
    description: 在线温度单位转换器，支持摄氏度、华氏度、开尔文、兰金、德莱尔、牛顿、雷奥穆尔和罗默共 8 种温度单位互相转换，实时显示所有单位的换算结果，适合物理学习和工程计算。
    step1: 第一步：在任意单位输入框中输入温度值。
    step2: 第二步：其他所有单位的换算结果即时显示。
    faq1q: 如何将摄氏度转换为华氏度？
    faq1a: 公式：°F = °C × 9/5 + 32。例如，100°C = 212°F（水的沸点）。
    faq2q: 什么是绝对零度？
    faq2a: 绝对零度是最低可能温度：0 开尔文 = −273.15°C = −459.67°F。在此温度下，粒子的热运动降至最低。
    faq3q: 常用温度值有哪些？摄氏度和华氏度如何换算？
    faq3a: 常用参考温度：水的冰点 0°C/32°F，沸点 100°C/212°F，人体正常体温约 37°C/98.6°F，室温约 20~25°C/68~77°F。换算公式：°F = °C × 9/5 + 32；°C = (°F − 32) × 5/9。
    faq4q: 开尔文（K）和摄氏度（℃）在实际中有什么应用场景？
    faq4a: 摄氏度（℃）用于日常温度、烹饪、气象；华氏度（℉）主要在美国日常生活中使用；开尔文（K）是 SI 标准温度单位，用于科学计算（热力学、物理公式不允许负温度，开尔文从绝对零度开始）；色温（灯光摄影）用 K 表示（5500K 日光，3200K 钨丝灯）；医疗中美国用华氏度，其他国家用摄氏度。
    belowAbsoluteZero: '温度低于绝对零度（0 K / −273.15 °C），物理上不可能存在。'
    minus1: 减 1
    plus1: 加 1

  chmod-calculator:
    step1: '步骤 1：勾选所有者、组和其他用户的权限复选框。'
    step2: '步骤 2：chmod 数值（如 755）和符号表示（如 rwxr-xr-x）自动更新。'
    step3: '步骤 3：复制 chmod 命令用于终端。'
    faq1q: '什么是 chmod？'
    faq1a: 'chmod（更改模式）是 Unix/Linux 命令，用于修改文件和目录的权限，控制谁可以读取、写入或执行文件。'
    faq2q: 'chmod 755 是什么意思？'
    faq2a: '755 表示所有者有读+写+执行权限（7），组和其他用户有读+执行权限（5）。常用于 Web 服务器目录。'
    faq3q: chmod 数字权限和字符权限有什么区别？
    faq3a: 数字权限（如 chmod 755）将读（4）、写（2）、执行（1）相加，分别对应所有者、组、其他用户。字符权限（如 chmod u+x）更直观，可单独添加或删除某类权限，两者效果等价，数字权限在脚本中更常见。
    faq4q: 如何在不破坏系统的情况下安全地修改文件权限？
    faq4a: 修改权限时遵循最小权限原则，只给必要的权限。避免 chmod 777（任何人可读写执行），这是严重的安全隐患。Web 服务器文件建议 644（文件）和 755（目录）。修改前用 ls -la 确认当前权限。对系统文件格外谨慎，错误的权限可能导致服务无法启动或安全漏洞。
    title: Linux chmod 权限计算器
    description: 在线 Linux chmod 权限计算器，可视化勾选文件/目录的读（r）、写（w）、执行（x）权限，自动生成对应的 chmod 八进制数字命令和符号命令，适合 Linux 运维和服务器权限管理。
