    step3: '步骤 3：点击任意命令即可复制到剪贴板。'
    faq1q: '什么是 Git？'
    faq1a: 'Git 是一个分布式版本控制系统，用于追踪源代码的变更，允许多名开发者协作、分支、合并并维护项目历史。'
    faq2q: 'git pull 和 git fetch 有什么区别？'
    faq2a: 'git fetch 下载远程变更但不合并。git pull = git fetch + git merge，将远程变更应用到当前分支。'
    faq3q: git merge 和 git rebase 有什么区别？
    faq3a: git merge 将两个分支的历史合并，保留完整的提交记录，产生一个合并提交（merge commit）。git rebase 将当前分支的提交重新应用到目标分支上，历史线性整洁但改写了提交哈希。团队协作时推荐 merge，个人分支清理时可用 rebase，但不要对已推送的公共分支使用 rebase。
    faq4q: Git 工作流中最容易犯的错误是什么？
    faq4a: 常见错误：直接向 main/master 提交（应使用分支）、提交信息不清晰（如 fix 或 update）、将密码/API Key 提交到仓库、合并时未解决冲突就提交、force push 到共享分支破坏他人历史。建议遵循 Conventional Commits 规范，使用 .gitignore 和 pre-commit 钩子自动检查，启用分支保护规则。
