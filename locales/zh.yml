    step3: 步骤 3：点击复制或下载按钮保存 XML 内容。
    faq1q: 什么场景需要将 JSON 转换为 XML？
    faq1a: 与使用 XML 的旧系统（如 SOAP Web Service）集成、配置文件生成或数据交换时常需要此转换。
    faq2q: JSON 数组如何转换为 XML？
    faq2a: JSON 数组中的每个元素会生成同名的重复 XML 标签，保持顺序和层级。
    faq3q: JSON 转 XML 后根节点叫什么？
    faq3a: 由于 XML 必须有唯一的根节点，而 JSON 对象/数组没有根节点概念，转换时通常会自动添加 <root> 作为根标签，或使用 JSON 对象的第一个键作为根节点名称。本工具默认使用 <root> 作为根节点，可在输出中手动修改。
    faq4q: JSON 转 XML 后需要注意哪些验证问题？
    faq4a: JSON 转 XML 后建议验证：XML 标签名不能以数字开头、不能含空格；JSON 的 null 值在 XML 中表示方式不统一；属性 vs 元素的选择影响 XML 结构设计；如有 Schema 要求（XSD），转换后需按 Schema 调整结构。企业级系统间对接时，建议参考目标系统的 WSDL/XSD 规范手动调整。
