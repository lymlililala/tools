    step1: '步骤 1：输入要脱敏的字符串（如 API 密钥、IBAN、令牌）。'
    step2: '步骤 2：设置开头和结尾保留可见的字符数。'
    step3: '步骤 3：显示脱敏后的字符串——可安全用于截图或日志。'
    faq1q: '什么是字符串脱敏？'
    faq1a: '字符串脱敏用星号等符号替换中间字符，使机密部分可见但无法恢复。'
    faq2q: '脱敏和加密是一样的吗？'
    faq2a: '不一样。脱敏是用于显示目的的视觉技术，原始字符串无法从脱敏输出中恢复。加密则产生可逆的密文。'
    faq3q: 字符串脱敏的常见使用场景有哪些？
    faq3a: 字符串脱敏常用于：日志记录（隐藏 API 密钥和密码）、截图和演示（遮掩敏感 Token）、用户界面显示（显示部分银行卡号如 **** 1234）、错误报告（隐藏用户隐私信息），以及技术文档中展示示例配置时保护真实密钥。
    faq4q: 字符串混淆能真正保护源代码中的敏感信息吗？
    faq4a: 字符串混淆只是增加逆向难度，无法真正保护敏感信息。混淆代码仍可被反编译和静态分析，花费的时间更多但结果相同。真正的保护方案：敏感配置（API Key、数据库密码）放在环境变量或 KMS 中，不进入代码库；使用 .gitignore 和 secret scanning 工具防止意外提交；定期轮换密钥，泄露后能快速失效。
    title: 字符串混淆器
