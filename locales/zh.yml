  text-to-binary:
    step1: '步骤 1：输入文本转换为二进制，或输入二进制解码回文本。'
    step2: '步骤 2：选择「文本转二进制」或「二进制转文本」模式。'
    step3: '步骤 3：复制结果。'
    faq1q: '文本如何转换为二进制？'
    faq1a: '每个字符转换为其 ASCII/Unicode 码点，然后表示为 8 位二进制。例如 A = 65 = 01000001。'
    faq2q: '使用什么编码？'
    faq2a: '工具使用 UTF-8 编码，这是 Web 的标准编码。ASCII 字符使用单字节，非 ASCII 字符可能使用 2–4 字节。'
    faq3q: 二进制文本编码有什么实际用途？
    faq3a: 文本的二进制表示主要用于：理解计算机底层数据存储原理、调试网络协议和文件格式、学习编码系统（ASCII/UTF-8）、密码学和信息安全教学，以及部分隐写术应用（在文本中隐藏信息）。虽然日常开发中直接操作二进制文本较少，但理解其原理是计算机基础教育的重要组成部分。
    faq4q: 文本转二进制在计算机底层是如何工作的？
    faq4a: 计算机存储文字的底层过程：字符转字符编码（Unicode 码点，如 A = U+0041 = 65）→ 字节序列（UTF-8/UTF-16/ASCII 编码，如 ASCII 下 A = 01000001）→ 内存中的高低电平。英文字符在 ASCII 和 UTF-8 下都是 1 字节（8 位），中文在 UTF-8 下是 3 字节（24 位）。理解这一过程对处理编码问题（乱码）至关重要。
    title: 文本到 ASCII 二进制
    description: 在线文本与 ASCII 二进制互转工具，支持将任意文本转换为 0/1 二进制字符串，或将二进制串解码还原为原始文本，支持自定义分隔符，适合编程学习、数据处理和编码原理教学。
