  income-tax-calculator:
    step1: '步骤 1：输入您的税前月薪。'
    step2: '步骤 2：选择您的城市，以应用正确的社保费率。'
    step3: '步骤 3：可选添加专项附加扣除（子女教育、住房租金等）。'
    step4: '步骤 4：查看您的税级、总扣除额和税后工资。'
    faq1q: '中国个人所得税如何计算？'
    faq1a: '中国使用 7 档累进税率（3%–45%）。应纳税额 = (税前工资 - 社保 - 5000 元基本扣除 - 专项附加扣除) × 税率 - 速算扣除数。'
    faq2q: '社保（五险一金）包含哪些内容？'
    faq2a: '五险：养老保险、医疗保险、失业保险、工伤保险、生育保险。一金：住房公积金。费率因城市而异。'
    title: 个人所得税计算器
    description: 根据中国现行个税政策（起征点5000元，7档税率），快速计算月薪应缴个税、五险一金和实发工资，支持专项附加扣除。
