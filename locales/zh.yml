    faq1q: '显示哪些信息？'
    faq1a: '工具显示屏幕分辨率、视口大小、像素比、色深、浏览器名称和版本、操作系统、语言以及在线/离线状态。'
    faq2q: '这些信息会发送到服务器吗？'
    faq2a: '不会。所有信息均从浏览器 JavaScript API 本地读取，不传输任何数据。'
    title: 设备信息
    description: 获取有关当前设备的信息（屏幕大小、像素比率、用户代理…）

  pdf-signature-checker:
    step1: '步骤 1：拖放或选择 PDF 文件。'
    step2: '步骤 2：工具扫描 PDF 中的数字签名。'
    step3: '步骤 3：有效签名显示签名者信息和证书详情。'
    faq1q: '什么是 PDF 数字签名？'
    faq1a: 'PDF 数字签名使用公钥密码学验证签名者身份，并确认文档自签名后未被篡改。'
    faq2q: '我的 PDF 会上传到服务器吗？'
    faq2a: '不会。PDF 完全在浏览器中使用 JavaScript 处理，您的文件不会离开您的设备。'
    title: PDF签名检查器
    description: '验证PDF文件的签名。签名的PDF文件包含一个或多个签名，可用于确定文件的内容在签名后是否已被更改。'

  json-minify:
    step1: '步骤 1：将 JSON 粘贴到左侧编辑器。'
    step2: '步骤 2：右侧实时显示压缩后的 JSON。'
    step3: '步骤 3：点击「复制」复制压缩后的 JSON。'
    faq1q: '为什么要压缩 JSON？'
    faq1a: '压缩 JSON 去除所有空白和换行，减小文件体积，适用于 API 载荷和生产环境配置文件。'
    faq2q: '压缩会改变 JSON 数据吗？'
    faq2a: '不会。压缩只删除无关紧要的空白，数据值和结构保持完全不变。'
    title: JSON 压缩
    description: 通过删除不必要的空白来缩小和压缩JSON。

  ulid-generator:
    step1: '步骤 1：点击「生成」创建新的 ULID。'
    step2: '步骤 2：使用数量输入框批量生成 ULID。'
    step3: '步骤 3：点击「复制」复制 ULID。'
    faq1q: '什么是 ULID？'
    faq1a: 'ULID（通用唯一词典可排序标识符）是 128 位标识符，编码了时间戳和随机分量，既唯一又可按时间排序。'
    faq2q: 'ULID 相比 UUID 有什么优势？'
    faq2a: 'ULID 可按创建时间排序（不同于 UUID v4），URL 安全，且字符串表示更紧凑（26 字符 vs UUID 的 36 字符）。'
    title: ULID 生成器
    description: 生成随机的通用唯一词典可排序标识符（ULID）。

  string-obfuscator:
    step1: '步骤 1：输入要脱敏的字符串（如 API 密钥、IBAN、令牌）。'
    step2: '步骤 2：设置开头和结尾保留可见的字符数。'
    step3: '步骤 3：显示脱敏后的字符串——可安全用于截图或日志。'
    faq1q: '什么是字符串脱敏？'
    faq1a: '字符串脱敏用星号等符号替换中间字符，使机密部分可见但无法恢复。'
    faq2q: '脱敏和加密是一样的吗？'
    faq2a: '不一样。脱敏是用于显示目的的视觉技术，原始字符串无法从脱敏输出中恢复。加密则产生可逆的密文。'
    title: 字符串混淆器
    description: 混淆字符串（如秘密、IBAN 或令牌），使其可共享和可识别，而不泄露其内容。

  base-converter:
    step1: '步骤 1：在任意进制输入框中输入数字（二进制、八进制、十进制、十六进制或自定义）。'
    step2: '步骤 2：其他所有进制的等效值立即出现。'
    step3: '步骤 3：点击任意结果复制。'
    faq1q: '什么是进制转换？'
    faq1a: '进制转换将数字从一种数制翻译到另一种数制。二进制（2 进制）、八进制（8 进制）、十进制（10 进制）和十六进制（16 进制）是最常见的。'
    faq2q: '如何将十六进制转换为二进制？'
    faq2a: '每个十六进制数字对应恰好 4 位二进制数。例如 F(hex) = 1111(binary)，所以 0xFF = 11111111。'
    title: 整数基转换器
    description: 在不同的基数（十进制、十六进制、二进制、八进制、base64…）之间转换数字

  yaml-to-json-converter:
    step1: '步骤 1：将 YAML 内容粘贴到左侧编辑器。'
    step2: '步骤 2：实时生成等效的 JSON。'
    step3: '步骤 3：复制或下载 JSON 输出。'
    faq1q: '为什么要将 YAML 转换为 JSON？'
    faq1a: 'JSON 作为 API 数据格式得到更广泛支持，将 YAML 配置转换为 JSON 使其更具可移植性。'
    faq2q: 'YAML 注释在 JSON 中保留吗？'
    faq2a: '不保留。JSON 不支持注释，因此所有 YAML 注释在转换时都会被丢弃。'
