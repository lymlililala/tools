  css-unit-converter:
    title: CSS 单位转换器
    description: 在 px、rem、em、vw、vh、pt 和百分比之间互转 CSS 单位，可自定义根字体大小、父元素字体大小和视口尺寸。
    input: 输入值
    value: 数值
    unit: 单位
    baseSettings: 基准设置
