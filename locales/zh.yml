    description: 在线 Unix 时间戳转换工具，实时显示当前 Unix 时间戳（秒/毫秒），支持将时间戳转换为 ISO 8601、UTC、本地时间等可读格式，或将日期时间反向转换为时间戳。
    current: 当前时间
    tsToDate: 时间戳 → 日期
    dateToTs: 日期 → 时间戳
    timestamp: 时间戳
    inMs: 毫秒级时间戳
    useNow: 使用当前时间
    dateString: 日期字符串
    step1: 第一步：将 Unix 时间戳粘贴到输入框中，即可转换为日期。
    step2: 第二步：如果时间戳是毫秒（13 位数字）而非秒（10 位数字），请开启"毫秒"开关。
    step3: 第三步：在下方日期转时间戳区域，输入日期字符串即可转换。
    faq1q: 什么是 Unix 时间戳？
    faq1a: 'Unix 时间戳是自 1970 年 1 月 1 日 00:00:00 UTC（Unix 纪元）以来经过的秒数（或毫秒数）。它与时区无关，在编程中被广泛使用。'
    faq2q: 如何判断时间戳是秒还是毫秒？
    faq2a: 10 位数字为秒（如 1704067200），13 位数字为毫秒（如 1704067200000）。当前 Unix 时间约为 17 亿秒。
    faq3q: 如何在各编程语言中获取当前 Unix 时间戳？
    faq3a: '各语言获取时间戳：JavaScript: Date.now()（毫秒）或 Math.floor(Date.now()/1000)（秒）；Python: import time; int(time.time())；Java: System.currentTimeMillis()/1000；Go: time.Now().Unix()；Shell: date +%s。大多数语言默认返回秒级时间戳，JavaScript 例外返回毫秒。'
    faq4q: Unix 时间戳在 2038 年会出现什么问题？
    faq4a: "Y2K38 问题：32 位有符号整数最大值为 2147483647，对应 2038 年 1 月 19 日 03:14:07 UTC。超过这个时刻，32 位整数会溢出变成负数，导致系统将时间理解为 1901 年。解决方案：使用 64 位整数存储时间戳（Linux 内核 5.6+ 已在 32 位系统支持 64 位 time_t）；升级使用 32 位时间戳的老旧系统和嵌入式设备。"

