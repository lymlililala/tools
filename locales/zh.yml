    faq1a: '二维码以标准 WIFI: 格式编码了 SSID、密码和安全类型。扫描后，兼容设备可自动连接到该网络。'
    faq2q: '分享 WiFi 二维码安全吗？'
    faq2a: '只应与信任的人分享——二维码包含可恢复的 WiFi 密码，任何扫描它的人都可以加入您的网络。'
    faq3q: WiFi 二维码支持哪些安全类型？
    faq3a: 'WiFi 二维码（WIFI: 格式）支持 WPA/WPA2/WPA3 个人版（最常见）、WEP（已过时，不安全）和无密码开放网络。本工具支持所有主流安全类型的配置。注意：WEP 存在严重安全漏洞，强烈建议升级到 WPA2 或 WPA3。'
    faq4q: 手机扫描 WiFi 二维码时如何工作？
    faq4a: "WiFi 二维码使用标准格式：WIFI:T:WPA;S:网络名称;P:密码;; 。手机相机 App（iOS 11+、Android 9+）原生支持识别此格式并弹出连接确认。WPA2/WPA3 密码通过二维码传递时是明文的（只有扫描者能看到），所以不要在公开场合展示带有密码的 WiFi 二维码。企业网络可以使用无密码的 802.1X 配置，但二维码方式不支持。"
    title: WiFi 二维码生成器
    description: 在线生成 WiFi 二维码，手机扫码即可一键连接 WiFi，无需手动输入密码，支持 WPA/WPA2/WEP 和企业级 EAP 认证，可自定义样式并下载高质量 PNG 图片。

  xml-formatter:
    step1: '步骤 1：将 XML 内容粘贴到输入编辑器。'
    step2: '步骤 2：格式化且缩进整齐的 XML 出现在右侧。'
    step3: '步骤 3：复制或下载格式化后的 XML。'
    faq1q: '什么是 XML？'
    faq1a: 'XML（可扩展标记语言）是用于存储和传输结构化数据的灵活标记语言。与 HTML 不同，XML 标签由用户自定义。'
    faq2q: 'XML 和 JSON 有什么区别？'
    faq2a: 'XML 使用标签和属性，支持注释，较为冗长。JSON 使用键值对和数组，更轻量，在现代 API 中更常见。'
    faq3q: 格式化 XML 会改变其数据内容吗？
    faq3a: 不会。XML 格式化工具只调整空白字符（换行、缩进对齐），不会改变 XML 的标签、属性值或文本节点内容。格式化前后的 XML 在解析器中读取结果完全相同，可放心用于生产配置文件的整理。
    faq4q: 格式化 XML 时如何保留有意义的空白字符？
    faq4a: "XML 中的 xml:space='preserve' 属性告诉解析器保留该元素及子元素中的所有空白（包括换行和缩进）。格式化工具通常会忽略这个属性，直接重新缩进整个文档。处理包含此属性的 XML（如 XSLT、Word 文档格式）时需谨慎，错误的格式化可能改变数据语义。建议格式化前备份原始文件。"
