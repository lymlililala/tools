    faq2q: 生成的 ASCII 艺术字可以在哪里使用？
    faq2a: 可用于终端输出、README 文件、社交媒体个性化签名、CLI 工具标题横幅等场景。
    faq3q: ASCII 艺术字如何在代码中使用？
    faq3a: 在代码中可将 ASCII 艺术字用于 CLI 程序的欢迎 Banner（通常放在程序入口处）、README 文件的标题装饰（GitHub 上显示效果好）、注释分隔符，以及 Node.js/Python 等脚本的启动信息。使用时需确保字体等宽（monospace），否则对齐会错乱。
    faq4q: ASCII 艺术字支持中文吗？
    faq4a: 大多数 ASCII 艺术字体只支持英文字母、数字和基本符号，不支持中文字符。如需中文 ASCII 艺术，建议使用专门的中文字符画生成器，或将中文内容转换为拼音再生成艺术字。
