    step1: '步骤 1：输入包含特殊字符的 HTML 文本，或输入实体进行解码。'
    step2: '步骤 2：选择「编码」或「解码」模式。'
    step3: '步骤 3：结果实时更新，点击「复制」复制。'
    faq1q: '什么是 HTML 实体？'
    faq1a: 'HTML 实体是用于在 HTML 中显示保留字符或特殊字符的代码。例如 &lt; 显示为 <，&amp; 显示为 &。'
    faq2q: '为什么需要转义 HTML？'
    faq2a: '转义 HTML 可防止显示用户生成内容时的 XSS 攻击。'
    faq3q: 哪些字符必须在 HTML 中进行实体转义？
    faq3a: 在 HTML 内容中，< 和 > 必须转义为 &lt; 和 &gt; 以防止被解析为标签；& 必须转义为 &amp;。在 HTML 属性值中，双引号 " 必须转义为 &quot;，单引号 ' 转义为 &#39;。正确转义是防止 XSS 攻击的基础安全措施。
    faq4q: HTML 中什么时候必须使用实体编码？
    faq4a: 必须编码的字符：< 和 > 避免被解析为标签（&lt; &gt;）；& 避免被解析为实体开始（&amp;）；属性值中的引号（&quot;）。用户输入的内容在展示到页面前务必进行 HTML 实体转义，防止 XSS（跨站脚本）攻击。现代框架（React、Vue）会自动处理这一转义。
    title: HTML 实体编码 / 解码
