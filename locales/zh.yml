    faq1q: '注册端口和动态端口有什么区别？'
    faq1a: '0–1023 是知名系统端口，1024–49151 是注册端口，49152–65535 是动态/临时端口。'
    faq2q: '为什么需要随机端口？'
    faq2a: '启动本地开发服务器、容器或服务时，随机端口可避免与已运行进程冲突。'
    faq3q: 哪些端口号有特殊含义或应该避免使用？
    faq3a: 0-1023 是「知名端口」（Well-Known Ports），需要管理员权限，如 80（HTTP）、443（HTTPS）、22（SSH）、3306（MySQL）。1024-49151 是「注册端口」，许多应用有约定，如 8080（HTTP 备用）、5432（PostgreSQL）。49152-65535 是动态端口，可安全用于开发服务器和临时服务。
    faq4q: 端口号分为哪几类？开发时应该选哪个范围？
    faq4a: "端口分为三类：知名端口（0-1023），由 IANA 分配给系统服务（HTTP:80, HTTPS:443, SSH:22），需 root/管理员权限绑定；注册端口（1024-49151），已注册但可在用户级别使用；动态/私有端口（49152-65535），完全自由使用，最适合开发和测试服务。推荐开发时使用 3000-9999 范围，便于记忆且冲突少。"
