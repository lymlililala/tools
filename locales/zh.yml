    step3: '步骤 3：参考右侧目录快速定位章节。'
    faq1q: '什么是正则表达式？'
    faq1a: '正则表达式（Regex）是用于匹配字符串中字符组合的模式，被广泛用于搜索、替换、验证等文本处理场景。'
    faq2q: '如何测试正则表达式？'
    faq2a: '可以使用本站的 Regex Tester 工具实时测试和调试正则表达式。'
    faq3q: 正则表达式贪婪匹配和懒惰匹配有什么区别？
    faq3a: 贪婪匹配（默认）尽可能多地匹配字符：.* 会匹配到字符串末尾。懒惰匹配在量词后加 ?（如 .*?）尽可能少地匹配：遇到第一个满足条件的位置就停止。例如匹配 HTML 标签内容时，/<.*>/ 会匹配整行（贪婪），而 /<.*?>/ 只匹配第一个完整标签（懒惰）。
    faq4q: 正则表达式中的贪婪匹配和非贪婪匹配有什么区别？
    faq4a: 贪婪匹配（* + ?）尽可能多地匹配字符；非贪婪/懒惰匹配（*? +? ??）尽可能少地匹配。示例：对于 <a>foo</a><b>bar</b>，<.*> 贪婪匹配整个字符串，<.*?> 只匹配第一个标签。常见场景：提取 HTML 标签内容时必须用非贪婪，否则会从第一个开标签匹配到最后一个闭标签。
