    faq2q: 容错率设置有什么影响？
    faq2a: 容错率越高，二维码损坏后越容易被正确识别，但码图也会更复杂。一般场景选"中"即可，印刷或贴纸建议选"高"或"最高"。
    faq3q: 生成的二维码可以永久使用吗？有什么限制？
    faq3a: 本工具生成的二维码直接将内容（URL、文字等）编码进码图，不依赖服务器，可以永久使用，无扫描次数限制。但如果你的 URL 网址失效，二维码仍然有效只是目标无法访问。图片质量建议选高分辨率再打印。
    faq4q: 二维码的纠错级别应该如何选择？
    faq4a: QR 码有 4 个纠错级别：L（7%）、M（15%）、Q（25%）、H（30%），数值表示可修复的损坏比例。选择建议：普通 URL/文本用 L 或 M，体积最小；印刷品（可能磨损）用 M 或 Q；LOGO 叠加在二维码上必须用 H（LOGO 遮挡了部分码，需高纠错率）；纠错级别越高，二维码越密集，扫描距离需更近。
