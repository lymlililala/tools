    faq1q: '什么是数字缩略词（numeronym）？'
    faq1a: '数字缩略词用数字表示省略的字母数量。i18n 代表 internationalization。常见例子：a11y（accessibility）、k8s（Kubernetes）。'
    faq2q: '谁发明了数字缩略词？'
    faq2a: 'i18n 这个术语归功于 20 世纪 70 年代的 DEC，后来在软件开发中广泛流行。'
    faq3q: 数字名称（numeronym）在哪些场景中使用？
    faq3a: 数字名称常见于软件开发：i18n（internationalization，国际化）、l10n（localization，本地化）、a11y（accessibility，无障碍）、k8s（Kubernetes）、g11n（globalization）。它们将长单词缩短为首字母 + 中间字符数 + 尾字母的形式，方便快速输入和讨论。
    faq4q: 数字缩略词 Numeronyms 在技术领域有哪些知名例子？
    faq4a: 技术领域著名数字缩略词：i18n（internationalization，i 到 n 之间 18 个字母）；l10n（localization）；a11y（accessibility，无障碍）；k8s（Kubernetes，k 到 s 之间 8 个字母）；o11y（observability，可观测性）。这类缩略词在 GitHub、技术文档和 Twitter 上极为常见，节省字符同时保持可识别性。
