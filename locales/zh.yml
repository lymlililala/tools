    faq1a: '阅读时间按每分钟 200–250 个单词（成人平均阅读速度）估算，会因内容复杂度而变化。'
    faq2q: '什么算作一个单词？'
    faq2a: '单词定义为由空白字符分隔的字符序列。附在单词上的标点符号算作单词的一部分。'
    faq3q: 阅读时间是如何估算的？
    faq3a: 阅读时间通常按成人平均阅读速度估算：英文约 200~250 词/分钟，中文约 400~500 字/分钟。本工具使用约 200 词/分钟的标准，适合一般内容。技术文档和学术论文的阅读速度通常更慢。
    faq4q: 字数统计在 SEO 内容优化中有多重要？
    faq4a: 内容长度对 SEO 的影响：研究显示 Google 排名靠前的页面平均字数在 1500-2500 词；长内容通常获得更多反向链接；但质量比数量更重要，填充低质量文字反而有害。建议根据竞争对手的平均字数确定目标，保持每段 50-100 词，使用标题和列表提升可读性，工具型内容（教程、对比）适合长篇，新闻资讯则不然。
