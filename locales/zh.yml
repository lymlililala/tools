  color-converter:
    step1: '步骤 1：使用颜色选择器或直接输入任意格式的颜色值。'
    step2: '步骤 2：其他格式（HEX、RGB、HSL、CMYK 等）自动更新。'
    step3: '步骤 3：查看 WCAG 对比度评分，确保无障碍可访问性。'
    step4: '步骤 4：点击任意字段即可复制该值。'
    faq1q: 'HEX、RGB 和 HSL 有什么区别？'
    faq1a: 'HEX 是 6 位十六进制颜色码。RGB 通过红、绿、蓝三通道（0–255）定义颜色。HSL 通过色相（0–360°）、饱和度和亮度定义颜色。'
    faq2q: '什么是 WCAG 对比度？'
    faq2a: 'WCAG 对比度衡量文本在背景上的可读性。4.5:1 达到 AA 标准；7:1 达到 AAA 标准。'
    faq3q: HEX、RGB、HSL 颜色格式各有什么用途？
    faq3a: HEX（如 #FF5733）是网页中最常用的颜色格式，简洁易读。RGB 适合动态计算颜色值。HSL 按色相/饱和度/亮度描述颜色，更直观，适合做颜色变亮变暗的动态调整和生成配色方案。
    faq4q: HSL 颜色模型相比 RGB 有什么优势？
    faq4a: HSL（色相、饱和度、亮度）对人类更直观。改变亮度只需调整 L 值，不会影响色相；生成颜色主题更简单（如同色相不同亮度的变体）。在 CSS 中，hsl() 让调色更容易理解和维护，特别适合动态生成颜色渐变、主题切换和响应式配色方案设计。
