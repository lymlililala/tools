    step3: '步骤 3：输入已经过的时间。'
    step4: '步骤 4：自动计算预计完成时间和剩余时间。'
    faq1q: 'ETA 代表什么？'
    faq1a: 'ETA 代表预计到达（或完成）时间，根据当前进度速率预测任务何时完成。'
    faq2q: 'ETA 如何计算？'
    faq2a: 'ETA = (总数 - 已完成) / (已完成 / 已用时间)，假设处理速率恒定。'
    faq3q: ETA 估算不准确时怎么办？
    faq3a: ETA 计算假设处理速率恒定，但实际任务速率往往会变化（如下载速度随网络波动、任务前期快后期慢）。提高 ETA 准确性的方法：使用滑动窗口计算近期速率而非全程平均速率、增加采样频率，以及根据历史数据对特定类型任务进行校正。
    faq4q: 如何更准确地估算任务完成时间？
    faq4a: 提高 ETA 准确性的方法：基于历史速率而非乐观估算；将大任务分解为小里程碑，逐步修正估算；记录实际完成时间与预测的偏差，校正系统性偏差；使用三点估算（最乐观、最可能、最悲观）取加权平均；考虑任务依赖关系和资源竞争。软件开发常用集体估算方法提高准确性。
    title: ETA 到达时间计算器
    description: 在线 ETA 预计完成时间计算器，根据任务总量、已完成量和当前处理速率，精确计算剩余时间和预计完成时刻，适用于下载进度估算、工程进度跟踪、跑步配速预测等各类时间预估场景。

  roman-numeral-converter:
    step1: '步骤 1：在输入框中输入阿拉伯数字（1–3999）或罗马数字。'
    step2: '步骤 2：转换结果自动更新。'
    step3: '步骤 3：点击「复制」复制结果。'
    faq1q: '什么是罗马数字？'
    faq1a: '罗马数字是古罗马的数字系统，使用字母表示：I (1)、V (5)、X (10)、L (50)、C (100)、D (500)、M (1000)。'
    faq2q: '为什么 4 写作 IV 而不是 IIII？'
    faq2a: '罗马数字使用减法记法：较小的数字在较大的数字前表示相减。IV = 5 - 1 = 4。'
    faq3q: 罗马数字能表示 0 和负数吗？
    faq3a: 罗马数字系统没有 0 和负数的表示方法，这是古罗马数字系统的主要局限。0 的概念由阿拉伯数字系统引入，对数学和科学的发展至关重要。罗马数字目前主要用于钟表、章节编号、电影年份等装饰性场景。
    faq4q: 罗马数字在现代有哪些实际应用？
    faq4a: 罗马数字在现代的使用场景：钟表表盘（经典设计）；电影版权年份；超级碗等体育赛事的届数（Super Bowl LVIII）；君主和教皇的序号（伊丽莎白二世 Elizabeth II）；书籍前言页码（i, ii, iii）；建筑铭文和纪念碑；大纲和法律文件的章节编号。
    title: 罗马数字转换器
    description: 在线罗马数字转换工具，支持阿拉伯数字与罗马数字双向转换，支持 I～MMMCMXCIX（即 1～3999）范围，结果即时显示，适合历史文档阅读、表盘设计和教育学习场景。

  hmac-generator:
    step1: '步骤 1：输入要认证的消息。'
    step2: '步骤 2：输入您的密钥。'
    step3: '步骤 3：选择哈希算法（SHA-256、SHA-512 等）。'
    step4: '步骤 4：复制生成的 HMAC 值。'
    faq1q: '什么是 HMAC？'
    faq1a: 'HMAC（哈希消息认证码）将密码哈希函数与密钥结合，同时验证数据完整性和真实性。'
    faq2q: 'HMAC 和普通哈希有什么区别？'
    faq2a: '普通哈希只验证数据完整性。HMAC 还需要共享密钥，只有拥有密钥的一方才能验证真实性。'
    faq3q: HMAC 在 API 开发中如何使用？
    faq3a: HMAC 常用于 API 请求签名：客户端将请求参数 + 时间戳用密钥生成 HMAC，附加在请求头中，服务端用相同密钥重新计算 HMAC 进行验证。这确保了请求未被篡改，且只有持有密钥的客户端才能发送合法请求。
    faq4q: HMAC 在 API 请求签名中如何工作？
    faq4a: API 签名流程：服务端和客户端共享一个密钥（secret）；客户端用 HMAC 对请求内容（URL+时间戳+body）签名，将签名放入请求头；服务端用同样密钥重新计算 HMAC，与请求头中的签名对比，相同则认证通过。时间戳防止重放攻击，通常允许 5 分钟窗口。AWS、Stripe、GitHub Webhooks 都使用此方案。
    title: HMAC 签名生成器
    description: 在线 HMAC 生成器，使用自定义密钥和 MD5、SHA1、SHA256、SHA512 等哈希函数生成消息认证码（HMAC），适合 API 签名验证和数据完整性校验。
