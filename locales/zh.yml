    faq1q: '什么是 MIME 类型？'
    faq1a: 'MIME 类型是文件或数据格式的标准标识符，由类型和子类型组成（如 text/html、application/json、image/png）。'
    faq2q: 'MIME 类型对 Web 开发为什么重要？'
    faq2a: '服务器用 MIME 类型告知浏览器如何处理文件。错误的 MIME 类型会导致文件被下载而非显示。'
    faq3q: 常见的 MIME 类型有哪些？
    faq3a: 常见 MIME 类型：text/html（HTML 文档）、application/json（JSON 数据）、application/javascript（JS 脚本）、image/png 和 image/jpeg（图片）、video/mp4（视频）、application/pdf（PDF）、multipart/form-data（表单上传）。在 HTTP API 开发中，Content-Type 和 Accept 请求头使用 MIME 类型协商数据格式。
    faq4q: MIME 类型在 Web 开发中有哪些关键作用？
    faq4a: MIME 类型的关键作用：浏览器根据 Content-Type 决定如何处理响应（显示/下载/渲染）；错误的 MIME 类型可能导致文件下载而非展示（如 PDF）；API 响应必须设置 application/json；文件上传时验证 MIME 类型可防止恶意文件（但需与文件内容魔数校验结合）。
