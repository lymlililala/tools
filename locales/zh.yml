    faq1q: '为什么要格式化 SQL 语句？'
    faq1a: '格式化的 SQL 更易于阅读、调试和维护。统一的缩进和大写规范帮助更快发现错误。'
    faq2q: '支持哪些 SQL 方言？'
    faq2a: '支持 MySQL、PostgreSQL、SQLite、MariaDB、BigQuery、Spark、TSQL 等。'
    faq3q: SQL 格式化会改变 SQL 的语义或执行结果吗？
    faq3a: SQL 格式化工具只调整空白字符（换行、缩进），不会改变 SQL 的语义和执行结果。格式化后的 SQL 与原始 SQL 在数据库中执行效果完全相同，有助于代码审查和发现潜在的 SQL 逻辑问题。
    faq4q: 格式化 SQL 对团队协作有哪些好处？
    faq4a: 统一格式化的 SQL 好处：代码审查时更容易发现逻辑问题，而非关注格式；版本控制（Git diff）只显示真正的逻辑变更，而不是空白变化；新成员更容易理解复杂查询；减少因格式不一致引发的低级错误。建议团队在 CI/CD 中集成 sqlfluff 等工具自动检查和格式化 SQL，保持代码库一致性。
