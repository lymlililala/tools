    faq1q: '什么是 IBAN？'
    faq1a: 'IBAN（国际银行账号）是国际通用的银行账户标识标准，包含国家代码、校验位和账号。'
    faq2q: 'IBAN 有多长？'
    faq2a: 'IBAN 长度因国而异，从 15 位（挪威）到 34 位不等。始终以 2 字母国家代码和 2 位校验位开头。'
