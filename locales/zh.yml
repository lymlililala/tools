    step2: '步骤 2：地址被转换为十进制、二进制、十六进制和 IPv6 映射格式。'
    step3: '步骤 3：点击任意结果字段复制。'
    faq1q: '什么是 IPv4 地址？'
    faq1a: 'IPv4 地址是 32 位数字，通常写成四个十进制八位组（如 192.168.1.1），在网络上唯一标识一台设备。'
    faq2q: '什么是 IPv4 映射的 IPv6 地址？'
    faq2a: 'IPv4 映射的 IPv6 地址以 ::ffff:x.x.x.x 格式表示 IPv4 地址，用于同时支持 IPv4 和 IPv6 的双栈系统。'
    faq3q: 为什么 IPv4 要转换为不同格式？
    faq3a: IPv4 地址格式转换有多种用途：二进制格式用于理解子网掩码和路由计算；十六进制格式在网络协议头部（如 TCP/IP 报文）和内存中使用；整数格式在数据库中高效存储 IP 地址（相比字符串节省空间，便于范围查询）；点分十进制是人类可读的标准格式。
    faq4q: IPv4 地址的各种表示格式在哪些场景下使用？
    faq4a: 点分十进制（192.168.1.1）是人类日常使用的格式；十六进制常见于汇编、C 代码和网络协议分析；32位整数用于数据库存储（INT 类型比 VARCHAR 更节省空间和索引效率高）；二进制表示用于理解子网掩码和 CIDR 的位运算逻辑。
    title: Ipv4地址转换器
    description: IPv4 地址格式转换工具，将 IP 地址在点分十进制、二进制、十六进制、整数之间互相转换，适合网络工程师分析 IP 结构、安全研究人员处理数据包和教育场景的直观演示。
