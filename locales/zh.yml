    faq1a: 'TOML 不支持 null 值或混合类型数组。含有这些特性的 JSON 可能无法干净地转换为 TOML。'
    faq2q: '为什么要将 JSON 转换为 TOML？'
    faq2a: 'TOML 对配置文件更具可读性。某些工具（如 Cargo、Hugo）只支持 TOML，需要从 JSON 转换。'
    faq3q: JSON 转换为 TOML 后有什么需要注意的？
    faq3a: TOML 不支持 JSON 的 null 值，转换时会被忽略或处理为空字符串。JSON 中混合类型的数组（如同时包含数字和字符串）在 TOML 中不合法。此外，TOML 对日期时间有专门的格式，数字键名需要特殊处理。
    faq4q: 在 Rust 项目中如何利用 JSON 转 TOML 迁移配置？
    faq4a: Rust 生态（Cargo.toml、Tauri、Bevy）广泛使用 TOML 格式。迁移步骤：用本工具将现有 JSON 配置转换为 TOML；审查输出，注意 TOML 特有的日期时间格式（RFC 3339）和多行字符串（三引号）；在 Rust 中使用 serde + toml crate 反序列化。TOML 比 JSON 更适合手写配置，注释支持更友好。
    title: JSON 转 TOML 转换器
    description: 将 JSON 数据在线转换为 TOML 格式，适用于应用配置迁移，保留层级结构，尤其适合 Rust、Go 项目从 JSON 迁移到 TOML 配置，结果实时生成，可一键复制使用。
