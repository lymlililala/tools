    faq2q: 'Base64 的体积开销是多少？'
    faq2a: 'Base64 将文件大小增加约 33%。'
    faq3q: Base64 文件转换有什么常见用途？
    faq3a: Base64 文件编码常用于：在 HTML/CSS 中内联小图片（避免额外的 HTTP 请求）、在 JSON API 中传输文件内容、在电子邮件（MIME）中传输附件，以及在代码中嵌入证书、字体等静态资源文件。
    faq4q: Base64 编码会增加多少文件大小？
    faq4a: Base64 编码会使原始数据体积增加约 33%（每 3 字节编码为 4 个字符）。例如 1MB 的图片经 Base64 编码后约为 1.37MB。这在嵌入 CSS/HTML 时需要权衡：减少了 HTTP 请求，但增加了页面体积，建议只对小文件（小于 10KB）使用。
