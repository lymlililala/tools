    step1: 第一步：将 Unix 时间戳粘贴到输入框中，即可转换为日期。
    step2: 第二步：如果时间戳是毫秒（13 位数字）而非秒（10 位数字），请开启"毫秒"开关。
    step3: 第三步：在下方日期转时间戳区域，输入日期字符串即可转换。
    faq1q: 什么是 Unix 时间戳？
    faq1a: 'Unix 时间戳是自 1970 年 1 月 1 日 00:00:00 UTC（Unix 纪元）以来经过的秒数（或毫秒数）。它与时区无关，在编程中被广泛使用。'
    faq2q: 如何判断时间戳是秒还是毫秒？
    faq2a: 10 位数字为秒（如 1704067200），13 位数字为毫秒（如 1704067200000）。当前 Unix 时间约为 17 亿秒。

