  safelink-decoder:
    title: Outlook 安全链接解码器
    description: 解码 Microsoft Outlook SafeLink 保护链接，还原为原始 URL，方便查看真实目标地址，避免无法点击受保护链接的困扰，支持批量解码，适合企业邮件用户日常使用。
    step1: 步骤 1：复制 Outlook 邮件中以 "safelinks.protection.outlook.com" 开头的链接。
    step2: 步骤 2：将链接粘贴到输入框中。
    step3: 步骤 3：解码后的原始 URL 立即显示，点击即可访问或复制。
    faq1q: 什么是 Outlook SafeLink？
    faq1a: SafeLink 是 Microsoft Defender for Office 365 的功能，会将邮件中的链接替换为经过安全检查的代理 URL，以防范恶意网站。
    faq2q: 解码后的链接安全吗？
    faq2a: 本工具仅做 URL 解码，不做安全验证。访问解码后的链接前，请自行判断目标网站是否可信。
    faq3q: Outlook 安全链接是什么？为什么要解码它？
    faq3a: Microsoft Defender for Office 365 会将电子邮件中的 URL 替换为经过封装的「安全链接」（Safe Links），形如 https://urldefense.com/... 或 https://nam.safelinks.protection.outlook.com/...，用于扫描链接是否指向恶意网站。当你需要获取原始 URL 时（如分享或调试），可以用本工具将其解码还原。
    faq4q: 为什么邮件系统要对链接进行 SafeLink 封装？
    faq4a: SafeLink（安全链接）封装是邮件安全网关（如 Microsoft Defender for Office 365、Proofpoint）的功能，将所有邮件中的 URL 替换为安全代理 URL。点击时安全网关先检查目标 URL 是否是已知恶意网站、钓鱼链接或刚注册的可疑域名，确认安全后才重定向。本工具用于还原被封装的原始地址。
