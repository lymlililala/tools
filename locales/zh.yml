  markdown-to-html:
    title: Markdown 转 HTML
    description: 在线 Markdown 转 HTML 工具，实时将 Markdown 语法转换并预览渲染结果，支持 GFM（GitHub 风格 Markdown）、代码高亮、表格，可导出为 HTML 或 PDF，适合博客内容创作。
    step1: 步骤 1：在左侧编辑器中输入或粘贴 Markdown 内容。
    step2: 步骤 2：右侧实时渲染为 HTML 预览效果。
    step3: 步骤 3：复制生成的 HTML 代码，或使用打印功能导出为 PDF。
    faq1q: 支持哪些 Markdown 语法？
    faq1a: 支持标准 Markdown 语法，包括标题、粗体、斜体、链接、图片、代码块、引用块、有序/无序列表等。
    faq2q: 如何导出为 PDF？
    faq2a: 点击"打印"按钮，在浏览器打印对话框中选择"另存为 PDF"即可导出高质量 PDF 文档。
    faq3q: Markdown 转换的 HTML 嵌入网页后样式不对怎么办？
    faq3a: 转换生成的 HTML 使用标准标签（h1-h6、p、ul、code 等），样式由 CSS 决定。将生成的 HTML 嵌入网页时，需要引入对应的 CSS（如 GitHub Markdown 样式表）才能正确显示格式和代码高亮。
    faq4q: Markdown 转 HTML 时如何防止 XSS 攻击？
    faq4a: Markdown 支持嵌入原生 HTML，恶意用户可能插入 script 标签或 on* 事件属性。防护措施：服务端用 DOMPurify、bleach（Python）等库对转换后的 HTML 进行 sanitize，只允许白名单标签；或禁用 Markdown 引擎的原生 HTML 支持；CSP（内容安全策略）可作为最后一道防线。
