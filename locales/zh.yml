    faq2q: 色阶（Tints）和暗色阶（Shades）有什么区别？
    faq2a: 色阶是在基础色中加入白色（使颜色变浅），暗色阶是在基础色中加入黑色（使颜色变深）。本工具同时生成两者，提供完整的色彩范围。
    faq3q: UI 设计中如何使用调色板生成器？
    faq3a: 工作流程：1）确定品牌主色（可用色轮或参考竞品）；2）使用本工具生成完整色阶（50~900），用于背景、边框、文字等不同层级；3）生成互补色或类比色作为辅助色；4）生成灰色系用于文字和中性元素；5）在设计系统中定义语义化颜色（primary、success、warning、error）并映射到色阶值。
    faq4q: 如何为项目选择一套协调的配色方案？
    faq4a: "常用配色理论：互补色（色轮对面，高对比）、类比色（相邻色，和谐自然）、三等分色（等距三色，活泼平衡）。设计建议：选一个主色（品牌色），一个辅助色，加上中性色（灰色系）和点缀色。确保颜色对比度满足 WCAG AA 标准（4.5:1），兼顾色盲用户。"
