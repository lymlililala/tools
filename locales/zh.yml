    description: 使用此在线转换器将YAML转换为JSON。

  uuid-generator:
    title: UUIDs 生成器
    description: 通用唯一标识符（UUID）是一个128位数字，用于标识计算机系统中的信息。可能的UUID数量为16^32，即2^128或约3.4x10^38（这是一个很大的数字！）。
    step1: 第一步：选择 UUID 版本（v1、v4 等）。
    step2: 第二步：输入要生成的 UUID 数量。
    step3: 第三步：点击"生成"并复制结果。
    faq1q: 什么是 UUID？
    faq1a: UUID（通用唯一标识符）是一种 128 位标识符，用于在分布式系统中唯一标识信息。UUID v4 版本约有 5.3 × 10²² 种可能。
    faq2q: UUID v1 和 v4 有什么区别？
    faq2a: UUID v1 基于时间生成，包含机器 MAC 地址，可预测但有序。UUID v4 随机生成，是通用场景的最佳选择。

  ipv4-address-converter:
    step1: '步骤 1：以点分十进制格式输入 IPv4 地址（如 192.168.1.1）。'
    step2: '步骤 2：地址被转换为十进制、二进制、十六进制和 IPv6 映射格式。'
    step3: '步骤 3：点击任意结果字段复制。'
    faq1q: '什么是 IPv4 地址？'
    faq1a: 'IPv4 地址是 32 位数字，通常写成四个十进制八位组（如 192.168.1.1），在网络上唯一标识一台设备。'
    faq2q: '什么是 IPv4 映射的 IPv6 地址？'
    faq2a: 'IPv4 映射的 IPv6 地址以 ::ffff:x.x.x.x 格式表示 IPv4 地址，用于同时支持 IPv4 和 IPv6 的双栈系统。'
    title: Ipv4地址转换器
    description: 在ipv6中，将ip地址转换为十进制、二进制、十六进制或事件

  text-statistics:
    step1: '步骤 1：在输入框中输入或粘贴文本。'
    step2: '步骤 2：统计数据实时更新。'
    step3: '步骤 3：查看字数、字符数、句子数、阅读时间等。'
    faq1q: '阅读时间如何计算？'
    faq1a: '阅读时间按每分钟 200–250 个单词（成人平均阅读速度）估算，会因内容复杂度而变化。'
    faq2q: '什么算作一个单词？'
    faq2a: '单词定义为由空白字符分隔的字符序列。附在单词上的标点符号算作单词的一部分。'
    title: 文本统计
    description: 获取有关文本、字符数、字数、大小等的信息

  text-to-nato-alphabet:
    step1: '步骤 1：输入要拼读的文本。'
    step2: '步骤 2：每个字母替换为对应的北约音标字母。'
    step3: '步骤 3：复制结果用于语音沟通。'
    faq1q: '什么是北约音标字母？'
    faq1a: '北约音标字母为每个字母指定一个单词（Alpha、Bravo、Charlie……），以避免语音通信中的混淆。'
    faq2q: '为什么不直接说字母？'
    faq2a: '许多字母在电话或无线电中听起来相似。使用音标单词可减少口头拼写时的错误。'
    title: 文本转北约字母表
    description: 将文本转换为北约拼音字母以进行口头传播。

  basic-auth-generator:
    step1: '步骤 1：输入您的用户名和密码。'
    step2: '步骤 2：Base64 编码的 Basic Auth 头部值立即生成。'
    step3: '步骤 3：复制完整的 Authorization 头部值。'
    faq1q: '什么是 HTTP Basic 认证？'
    faq1a: 'HTTP Basic Auth 是 HTTP 协议内置的简单认证方案。客户端随每个请求发送 Authorization: Basic base64(user:password)。'
    faq2q: 'Basic Auth 安全吗？'
    faq2a: 'Basic Auth 本身不安全，因为凭据只是 Base64 编码而非加密。必须在 HTTPS 上使用。'
    title: 基本身份验证生成器
    description: 从用户名和密码生成 base64 基本身份验证标头。

  text-to-unicode:
    step1: '步骤 1：输入文本转换为 Unicode 码点，或输入码点进行解码。'
    step2: '步骤 2：选择「编码」或「解码」模式。'
    step3: '步骤 3：复制结果。'
    faq1q: '什么是 Unicode？'
    faq1a: 'Unicode 是通用字符编码标准，为每种语言的每个字符分配唯一码点，涵盖 150 多种文字的 14 万多个字符。'
    faq2q: 'Unicode 和 UTF-8 有什么区别？'
    faq2a: 'Unicode 是分配码点的标准（如 U+0041 代表字母 A），UTF-8 是将这些码点在内存或文件中表示为 1–4 字节的编码方式。'
    title: 文本转 Unicode
    description: 解析文本并将其转换为 unicode，反之亦然

  ipv4-range-expander:
    step1: '步骤 1：输入 IP 范围的起始和结束 IPv4 地址。'
    step2: '步骤 2：工具计算覆盖该范围的最小 CIDR 块集合。'
    step3: '步骤 3：复制 CIDR 列表用于防火墙规则或路由表。'
    faq1q: '什么是 CIDR 聚合？'
    faq1a: 'CIDR 聚合找到精确覆盖给定 IP 范围的最小网络前缀集，用于减少路由表条目数量。'
    faq2q: '为什么一个 IP 范围可能需要多个 CIDR 块？'
    faq2a: '不对齐 2 的幂次方边界的 IP 范围需要多个 CIDR 块来精确表示。'
    title: IPv4范围扩展器
    description: 给定起始和结束IPv4地址，此工具使用其CIDR表示法计算有效的IPv4网络。

  text-diff:
    step1: '步骤 1：将原始文本粘贴到左侧面板。'
    step2: '步骤 2：将修改后的文本粘贴到右侧面板。'
    step3: '步骤 3：新增文本用绿色高亮，删除文本用红色。'
    faq1q: '使用什么 diff 算法？'
    faq1a: '工具使用标准 diff 算法，逐行和逐字符比较文本，找出最小变更集。'
    faq2q: '可以对比代码文件吗？'
    faq2a: '可以。工具适用于任何文本内容，包括代码、散文、JSON 和 YAML。'
    title: 文本比较
    description: 比较两个文本并查看它们之间的差异。

  otp-generator:
    step1: '步骤 1：输入您的 TOTP 密钥（来自您的身份验证器应用或服务）。'
    step2: '步骤 2：当前 OTP 代码及倒计时显示。'
    step3: '步骤 3：复制 6 位代码进行认证。'
    faq1q: '什么是 OTP / TOTP？'
    faq1a: 'OTP（一次性密码）仅对一次登录会话有效。TOTP 每 30 秒使用共享密钥和当前时间生成新代码。'
    faq2q: '使用什么标准算法？'
    faq2a: 'TOTP 由 RFC 6238 定义，使用 HMAC-SHA1。被 Google Authenticator 和 Authy 等应用使用。'
    title: OTP代码生成器
    description: 为多因素身份验证生成和验证基于时间的OTP（一次性密码）。

  url-encoder:
    title: 编码/解码url格式的字符串
    description: 编码为url编码格式（也称为“百分比编码”）或从中解码。
    step1: 第一步：选择"编码"或"解码"模式。
    step2: 第二步：将 URL 或文本粘贴到输入框中。
    step3: 第三步：编码/解码结果即时显示。
    faq1q: 什么是 URL 编码？
    faq1a: URL 编码（百分号编码）将 URL 中不允许的字符（如空格、中文字符或符号）转换为 %XX 格式。例如，空格变为 %20。
    faq2q: 什么时候需要对字符串进行 URL 编码？
    faq2a: 将用户输入作为查询参数传递时、以编程方式构建 URL 时，或处理表单数据提交时。

  text-to-binary:
    step1: '步骤 1：输入文本转换为二进制，或输入二进制解码回文本。'
    step2: '步骤 2：选择「文本转二进制」或「二进制转文本」模式。'
    step3: '步骤 3：复制结果。'
    faq1q: '文本如何转换为二进制？'
    faq1a: '每个字符转换为其 ASCII/Unicode 码点，然后表示为 8 位二进制。例如 A = 65 = 01000001。'
    faq2q: '使用什么编码？'
    faq2a: '工具使用 UTF-8 编码，这是 Web 的标准编码。ASCII 字符使用单字节，非 ASCII 字符可能使用 2–4 字节。'
    title: 文本到 ASCII 二进制
    description: 将文本转换为其 ASCII 二进制表示形式，反之亦然。

  mortgage-calculator:
    title: 房贷计算器
    description: 在线计算房贷月供、总利息和还款计划，支持等额还款和等额本金两种方式，以及商业贷款与公积金组合贷款。
    params: 贷款参数
    summary: 还款摘要
    totalPrice: 总房价
    downPaymentRate: 首付比例
    loanYears: 贷款年限
    annualRate: 年利率
    loanType: 还款方式
    equalPayment: 等额还款（月供不变）
    equalPrincipal: 等额本金（递减还款）
    useCombinedLoan: 公积金组合贷
    providentFundAmount: 公积金金额
    providentRate: 公积金利率
    yuan: 元
    years: 年
    downPayment: 首付金额
    totalLoan: 贷款总额
    monthlyPayment: 每月还款额
    firstMonthPayment: 首月还款额
    lastMonthPayment: 末月还款额
    totalPayment: 还款总额
    totalInterest: 支付总利息
    combinedDetail: 组合贷款明细
    providentPart: 公积金贷款
    commercialPart: 商业贷款
    tips: 温馨提示
    tip1: 以上数据仅供参考，实际贷款以银行审批为准。
    tip2: 等额还款每月还款金额相同，前期利息占比高，后期本金占比高。
    tip3: 等额本金每月还款额递减，前期压力较大，总利息少于等额还款。
    step1: 第一步：输入房产总价。
    step2: 第二步：设置首付比例（最低 20%）。
    step3: 第三步：选择贷款年限和年利率。
    step4: 第四步：选择还款方式：等额还款或等额本金。
    step5: 第五步：可选择开启公积金组合贷款进行分拆融资。
    faq1q: 等额还款和等额本金有什么区别？
    faq1a: 等额还款每月还款金额固定。等额本金每月偿还相同的本金，还款额逐月递减——总利息更少，但初期月供较高。
    faq2q: 中国最低首付比例是多少？
    faq2a: 大多数城市首套房最低首付为 20%，部分城市和贷款类型可能要求 30% 或更高。
    faq3q: 月供如何计算？
    faq3a: 等额还款公式：M = P × r × (1+r)^n / ((1+r)^n - 1)，其中 P 为贷款本金，r 为月利率（年利率 ÷ 12），n 为总还款月数。

  bmi-calculator:
    title: BMI 体重指数计算器
    description: 根据身高体重计算 BMI（体质指数），并提供中国标准的体重分类评估和理想体重范围建议。
    metric: 公制 (cm/kg)
    imperial: 英制 (in/lbs)
    height: 身高
    weight: 体重
    yourBmi: 您的 BMI
    underweight: 偏瘦
    normal: 正常
    overweight: 偏重
    obese1: 轻度肥胖
    obese2: 重度肥胖
    idealWeight: 理想体重范围
    idealWeightDesc: 基于 BMI 18.5–24 的理想体重
    chineseStandard: '参考中国卫生部标准：BMI < 18.5 偏瘦，18.5-24 正常，24-28 超重，≥ 28 肥胖。'
    step1: 第一步：选择单位制（公制：cm/kg，或英制：英寸/磅）。
    step2: 第二步：输入您的身高和体重。
    step3: 第三步：BMI 值和体重分类即时计算显示。
    faq1q: BMI 是什么？准确吗？
    faq1a: BMI（体质指数）是体重与身高平方的比值，是常用的筛查工具，但不能直接测量体脂率，对肌肉发达或老年人群可能存在误判。
    faq2q: 哪个 BMI 范围属于健康体重？
    faq2a: WHO 标准：18.5–24.9 为正常。中国卫健委标准：18.5–23.9 为正常体重；24–27.9 为超重；≥28 为肥胖。
    faq3q: 这个计算器会上传我的数据吗？
    faq3a: 不会。所有计算完全在您的浏览器中运行，不会收集或传输任何健康数据。

  random-decision-picker:
    step1: '步骤 1：输入您的选项，每行一个。'
