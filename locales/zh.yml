  percentage-calculator:
    step1: '步骤 1：选择所需的百分比计算类型。'
    step2: '步骤 2：在输入框中填入所需数值。'
    step3: '步骤 3：结果立即更新。'
    faq1q: '如何计算百分比变化？'
    faq1a: '百分比变化 = ((新值 - 旧值) / 旧值) × 100。正数表示增长，负数表示减少。'
    faq2q: '如何计算 Y 的 X%？'
    faq2a: 'Y 的 X% = Y × (X / 100)。例如，150 的 20% = 150 × 0.20 = 30。'
    faq3q: 如何快速心算百分比？
    faq3a: 常用技巧：求 10% 直接将小数点左移一位（200 的 10% = 20）；求 5% 就是 10% 的一半；求 20% 就是 10% × 2；求 25% 就是除以 4；求 50% 就是除以 2。组合这些技巧可以快速心算大多数百分比，例如求 15% = 10% + 5%。
    faq4q: 百分比计算在数据分析中有哪些常见误用？
    faq4a: 常见误用：百分点（percentage point）和百分比的混淆——利率从 2% 升到 3% 是增加了 1 个百分点，也是增加了 50%（两者都对但含义不同）；基数不同时直接对比百分比（如小样本的 100% 增长）；多重百分比叠加（先涨 20% 再降 20% 不等于 0）；忽略分母变化时的同比环比误读。
    title: 百分比计算器
