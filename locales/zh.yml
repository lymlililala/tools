  uuid-generator:
    title: UUIDs 生成器
    description: 通用唯一标识符（UUID）是一个 128 位数字，用于标识计算机系统中的信息。可能的 UUID 数量约为 3.4 × 10³⁸（即 2¹²⁸ 种，这是一个天文数字）。
    step1: 第一步：选择 UUID 版本（v1、v4 等）。
    step2: 第二步：输入要生成的 UUID 数量。
    step3: 第三步：点击"生成"并复制结果。
    faq1q: 什么是 UUID？
    faq1a: UUID（通用唯一标识符）是一种 128 位标识符，用于在分布式系统中唯一标识信息。UUID v4 版本约有 5.3 × 10²² 种可能。
    faq2q: UUID v1 和 v4 有什么区别？
    faq2a: UUID v1 基于时间生成，包含机器 MAC 地址，可预测但有序。UUID v4 随机生成，是通用场景的最佳选择。
    faq3q: ULID 和 UUID 有什么区别？ULID 有什么优势？
    faq3a: ULID（通用唯一词典排序标识符）是有时序的 UUID 替代方案：26 个字符、Base32 编码、毫秒级时间戳前缀，天然可排序，适合数据库主键。UUID v4 完全随机，无排序性。ULID 在需要排序的场景比 UUID v4 更高效。
    faq4q: UUID v4 和 v7 有什么区别？应该选哪个？
    faq4a: UUID v4 完全随机，广泛支持，适合需要全局唯一 ID 的大多数场景；UUID v7（2023 年标准化）包含时间戳前缀，按时间天然有序，对数据库 B-tree 索引更友好（减少页分裂，提升插入性能），同时保留足够的随机性防碰撞。新项目数据库主键建议优先考虑 UUID v7 或 ULID；现有使用 v4 的系统无需迁移。
