    description: 在线 Base64 编码 / 解码工具，支持将任意字符串编码为 Base64 格式，或将 Base64 解码为原始文本，常用于 API 认证、数据传输和邮件编码。
    step1: 第一步：选择"编码"或"解码"模式。
    step2: 第二步：将输入文本粘贴到输入框中。
    step3: 第三步：结果即时显示，点击即可复制。
    faq1q: 什么是 Base64？
    faq1a: Base64 是一种将二进制数据转换为 ASCII 字符串的编码方案，常用于在 HTML/CSS 中嵌入图片、编码邮件附件以及在 URL 或 JSON 中传递二进制数据。
    faq2q: Base64 等同于加密吗？
    faq2a: 不是。Base64 是编码，不是加密。它可以轻易被逆向解码，不提供任何安全保护。
    faq3q: Base64 的应用场景有哪些？
    faq3a: 'Base64 常用于：在 HTML/CSS 中内联图片（data URI）、在 HTTP Header 中传输二进制内容、JWT Token 中的 Base64url 编码、以及将证书文件（PEM 格式）转换为可在文本协议中传输的格式。'
    faq4q: Base64 编码和加密是一回事吗？
    faq4a: 不，Base64 是编码而非加密。它只是将二进制数据转换为可打印的 ASCII 字符串，任何人都可以轻松解码，没有密钥保护。不要用 Base64 来保护敏感数据，它仅用于数据传输和存储的格式兼容性。需要安全保护请使用 AES、RSA 等加密算法。
    encodeUrlSafe: URL 安全编码
    encodeUrlSafeTip: 将 + 替换为 -、/ 替换为 _，便于在 URL 中安全使用
