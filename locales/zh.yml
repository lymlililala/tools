    faq2q: JSON 格式化和 JSON 压缩有什么区别？
    faq2a: JSON 格式化添加空白和缩进，使 JSON 对人类可读。JSON 压缩删除所有不必要的空白以减小文件体积，适用于 API 传输和存储。
    faq3q: 支持 JSON5（注释、尾随逗号）吗？
    faq3a: 支持。本工具使用 JSON5 进行解析，除标准 JSON 外，还支持注释和尾随逗号。
    faq4q: 大型 JSON 文件应该如何高效查看和处理？
    faq4a: "超过 1MB 的 JSON 文件不建议用在线工具处理。推荐：命令行用 jq（cat data.json | jq '.'）效率最高；VS Code 内置 JSON 格式化（Alt+Shift+F）；Python（python3 -m json.tool data.json）内置无需安装；专业工具如 fx（交互式 JSON 查看器）。处理超大 JSON 建议用流式解析避免内存溢出。"

