  yaml-prettify:
    step1: '步骤 1：将 YAML 内容粘贴到左侧编辑器。'
    step2: '步骤 2：格式化且经过验证的 YAML 出现在右侧。'
    step3: '步骤 3：复制或下载格式化后的 YAML。'
    faq1q: 'YAML 格式化有什么作用？'
    faq1a: 'YAML 格式化以统一的缩进和间距重新排版 YAML，使其更易于阅读和比较。'
    faq2q: '格式化会改变 YAML 的值吗？'
    faq2a: '不会。格式化只改变空白和格式，数据值和结构保持完全不变。'
    faq3q: YAML 格式化后缩进不对怎么办？
    faq3a: YAML 强制要求使用空格（不能用 Tab）进行缩进，同级元素的缩进量必须完全一致。本工具格式化时统一使用 2 空格缩进。如果格式化后出现错误，通常是原始 YAML 存在语法问题，可查看错误提示定位问题行。
    faq4q: YAML 格式化时需要注意哪些常见陷阱？
    faq4a: YAML 的常见陷阱：缩进必须一致（混用 Tab 和空格会报错）；特殊值 yes/no/true/false/null 会被自动类型转换（如挪威语 NO 缩写会被解析为 false，需加引号）；冒号后必须有空格；多行字符串用 | 保留换行或 > 折叠换行；日期格式（2023-01-01）会被自动解析为日期对象。格式化前务必验证 YAML 语法。
    title: YAML 格式化 / 美化
    description: 在线 YAML 格式化工具，将压缩或格式混乱的 YAML 文本重新排版为整洁易读的标准缩进格式，同时进行语法校验，适合整理 Kubernetes 配置和 CI/CD 流水线文件。

