    faq1q: '什么是 Base64 文件编码？'
    faq1a: 'Base64 编码使用 64 个可打印 ASCII 字符将二进制文件数据转换为文本字符串，用于将文件嵌入 HTML、CSS、JSON 或 API 中。'
    faq2q: 'Base64 的体积开销是多少？'
