    step2: '步骤 2：将第二个 JSON 对象粘贴到右侧面板。'
    step3: '步骤 3：新增字段用绿色高亮，删除字段用红色，变更值用黄色。'
    faq1q: 'JSON 对比有什么用途？'
    faq1a: 'JSON 对比用于比较 API 响应、配置文件版本或数据库快照，识别两个状态之间的变化。'
    faq2q: '支持嵌套 JSON 吗？'
    faq2a: '支持。对比查看器递归比较嵌套对象和数组，精确显示哪些深层嵌套键被添加、删除或修改。'
    faq3q: JSON 对比工具如何处理数组中元素顺序的变化？
    faq3a: 本工具将数组视为有序序列，按索引位置逐一比较。如果元素顺序改变，工具会将其显示为删除旧位置并在新位置添加。如果你的数据中数组元素顺序无关紧要，建议在对比前先对数组进行排序处理。
    faq4q: 在 CI/CD 流水线中如何使用 JSON 对比工具？
    faq4a: CI/CD 中 JSON 对比的用途：API 版本兼容性测试（对比新旧 API 响应结构变化）；配置文件审查（PR 中高亮配置变更）；快照测试（存储期望输出，自动检测非预期变化）；数据库 schema 变更审查。命令行工具推荐 jq 或 jsondiff（Python）用于自动化流水线中的 JSON 比较。
