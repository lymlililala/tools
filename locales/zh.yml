    faq1q: '什么是北约音标字母？'
    faq1a: '北约音标字母为每个字母指定一个单词（Alpha、Bravo、Charlie……），以避免语音通信中的混淆。'
    faq2q: '为什么不直接说字母？'
    faq2a: '许多字母在电话或无线电中听起来相似。使用音标单词可减少口头拼写时的错误。'
    faq3q: NATO 音标字母表中各字母代表什么单词？
    faq3a: NATO 音标字母表（ITU/ICAO 标准）：Alpha、Bravo、Charlie、Delta、Echo、Foxtrot、Golf、Hotel、India、Juliet、Kilo、Lima、Mike、November、Oscar、Papa、Quebec、Romeo、Sierra、Tango、Uniform、Victor、Whiskey、X-ray、Yankee、Zulu。数字：Zero 到 Niner。
    faq4q: NATO 字母表在哪些专业领域广泛使用？
    faq4a: NATO 音标字母表（Alpha Bravo Charlie...）的使用场景：航空通信（飞行员与塔台通讯）；军事和警察无线电通话；客服电话中核实客户信息；医疗急救沟通（药品名称、患者 ID）；气象报告；业余无线电（HAM Radio）。它被 ICAO（国际民航组织）标准化，全球 26 个字母统一发音，消除因口音和背景噪音引起的误解。
