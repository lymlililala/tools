  toml-to-yaml:
    step1: '步骤 1：将 TOML 内容粘贴到左侧编辑器。'
    step2: '步骤 2：实时生成等效的 YAML。'
    step3: '步骤 3：复制或下载 YAML 输出。'
    faq1q: '什么是 TOML？'
    faq1a: 'TOML 是一种配置文件格式，常用于 Rust 项目（Cargo.toml）和 Hugo。'
    faq2q: '什么是 YAML？'
    faq2a: 'YAML 是一种人类可读的数据序列化格式，广泛用于配置文件（Docker Compose、Kubernetes 等）。'
    faq3q: 什么时候需要将 TOML 转换为 YAML？
    faq3a: 当工具或平台只接受 YAML 格式时需要转换，例如 Kubernetes 配置、GitHub Actions workflow 和 Ansible Playbook 都使用 YAML 格式。TOML 和 YAML 都是人类可读的配置格式，主要区别在于语法风格和生态支持。
    faq4q: 什么情况下应该选 TOML 而不是 YAML 作为配置格式？
    faq4a: 选 TOML 的场景：配置相对简单扁平（如 Cargo.toml、pyproject.toml）；团队不熟悉 YAML 的缩进陷阱；需要原生日期时间支持；偏好语法严格（TOML 无歧义）。选 YAML 的场景：Kubernetes/Helm/Ansible 生态（事实标准）；配置嵌套层次深；需要引用和锚点减少重复；工具链支持更广泛。总体上 YAML 更通用，TOML 更适合包管理配置。
    title: TOML 到 YAML
    description: 在线 TOML 转 YAML 工具，支持标准 TOML 语法解析并转换为标准 YAML 格式，结果可直接复制使用，适合将 Rust/Go 项目配置迁移到 YAML 格式的 CI/CD 和 Kubernetes 配置。
