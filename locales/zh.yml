    viewportWidth: 视口宽度
    viewportHeight: 视口高度
    results: 转换结果
    clickHint: 点击任意结果可将其设置为新的输入值。

  unix-timestamp:
    title: Unix 时间戳转换器
    description: Unix 时间戳与可读日期互转。显示当前时间戳、ISO 8601、UTC 和本地时间格式。
    current: 当前时间
    tsToDate: 时间戳 → 日期
    dateToTs: 日期 → 时间戳
    timestamp: 时间戳
    inMs: 毫秒级时间戳
    useNow: 使用当前时间
    dateString: 日期字符串

  number-formatter:
    title: 数字格式化工具
    description: 按不同地区语言和格式（十进制、货币、百分比、科学计数）格式化数字。
    input: 输入
    number: 数字
    locale: 语言地区
    style: 格式样式
    currency: 货币类型
    decimals: 小数位数
    grouping: 千位分隔符
    result: 格式化结果
    comparison: 多语言对比
    styleDecimal: 十进制
    styleCurrency: 货币
    stylePercent: 百分比
    styleScientific: 科学计数
    styleEngineering: 工程计数
    styleCompact: 紧凑模式
    step1: 第一步：在输入框中输入数字。
    step2: 第二步：选择语言地区（如 en-US、zh-CN）和格式样式（十进制、货币、百分比等）。
    step3: 第三步：格式化结果即时显示，使用对比表格可查看同一数字在不同地区的显示差异。
    faq1q: 什么是数字格式化？
    faq1a: 数字格式化根据地区和样式调整数字的显示方式。例如 1234.56 在美国显示为 "1,234.56"，在法国显示为 "1 234,56"，在中国加货币符号则显示为 "￥1,234.56"。
    faq2q: 紧凑模式和科学计数法有什么区别？
    faq2a: 科学计数法总是显示系数和指数（如 1.23E3）。紧凑模式使用本地化缩写（如 "1.2K"、"1.2万"），对大数字更直观易读。

  color-palette-generator:
    title: 调色板生成器
    description: 从一个基础颜色生成色阶、配色方案（互补色、类比色、三角配色等）和灰色系，适合 UI 设计。
    baseColor: 基础颜色
    shades: 明暗色阶
    harmonies: 配色方案
    grays: 中性/灰色系
    complementary: 互补色
    analogous: 类比色
    triadic: 三角配色
    splitComplementary: 分裂互补
    tetradic: 四色（正方形）
    clickToCopy: 点击色块可复制其十六进制值。
    step1: 第一步：使用取色器选择基础颜色，或直接输入十六进制色值。
    step2: 第二步：工具自动生成明暗色阶和配色方案。
    step3: 第三步：点击任意色块即可复制其十六进制值到剪贴板。
    faq1q: 什么是配色方案？
    faq1a: 配色方案是基于色轮上颜色位置关系得出的视觉和谐的色彩组合。常见类型包括互补色（对侧）、类比色（相邻）和三角配色（等距分布）。
    faq2q: 色阶（Tints）和暗色阶（Shades）有什么区别？
    faq2a: 色阶是在基础色中加入白色（使颜色变浅），暗色阶是在基础色中加入黑色（使颜色变深）。本工具同时生成两者，提供完整的色彩范围。

  common:
    faqSafe: 这个工具安全吗？我的数据会被上传吗？
    faqSafeA: 完全安全。所有处理均在您的浏览器本地进行，数据不会发送到任何服务器。
    faqFree: 这个工具是免费的吗？
    faqFreeA: 完全免费。无需注册，无需登录，永久免费使用。
    faqMobile: 支持手机使用吗？
    faqMobileA: 支持。MyUtl 已针对移动端优化，在手机和平板上均可正常使用。

  json-prettify:
    step1: 第一步：将原始 JSON 文本粘贴到左侧输入框。
    step2: 第二步：根据需要调整缩进大小和键排序选项。
    step3: 第三步：格式化结果显示在右侧，点击复制按钮即可复制。
    faq1q: 什么是 JSON 格式化？
    faq1a: JSON 格式化（也称为 JSON Prettify 或 JSON Beautifier）将压缩或未格式化的 JSON 重新排版，添加合适的缩进和换行，使其更易于阅读和调试。
    faq2q: JSON 格式化和 JSON 压缩有什么区别？
    faq2a: JSON 格式化添加空白和缩进，使 JSON 对人类可读。JSON 压缩删除所有不必要的空白以减小文件体积，适用于 API 传输和存储。
    faq3q: 支持 JSON5（注释、尾随逗号）吗？
    faq3a: 支持。本工具使用 JSON5 进行解析，除标准 JSON 外，还支持注释和尾随逗号。

  mortgage-calculator:
    step1: 第一步：输入房产总价。
    step2: 第二步：设置首付比例（最低 20%）。
    step3: 第三步：选择贷款年限和年利率。
    step4: 第四步：选择还款方式：等额还款或等额本金。
    step5: 第五步：可选择开启公积金组合贷款进行分拆融资。
    faq1q: 等额还款和等额本金有什么区别？
    faq1a: 等额还款每月还款金额固定。等额本金每月偿还相同的本金，还款额逐月递减——总利息更少，但初期月供较高。
    faq2q: 中国最低首付比例是多少？
    faq2a: 大多数城市首套房最低首付为 20%，部分城市和贷款类型可能要求 30% 或更高。
    faq3q: 月供如何计算？
    faq3a: 等额还款公式：M = P × r × (1+r)^n / ((1+r)^n - 1)，其中 P 为贷款本金，r 为月利率（年利率 ÷ 12），n 为总还款月数。

  bmi-calculator:
    step1: 第一步：选择单位制（公制：cm/kg，或英制：英寸/磅）。
    step2: 第二步：输入您的身高和体重。
    step3: 第三步：BMI 值和体重分类即时计算显示。
    faq1q: BMI 是什么？准确吗？
    faq1a: BMI（体质指数）是体重与身高平方的比值，是常用的筛查工具，但不能直接测量体脂率，对肌肉发达或老年人群可能存在误判。
    faq2q: 哪个 BMI 范围属于健康体重？
    faq2a: WHO 标准：18.5–24.9 为正常。中国卫健委标准：18.5–23.9 为正常体重；24–27.9 为超重；≥28 为肥胖。
    faq3q: 这个计算器会上传我的数据吗？
    faq3a: 不会。所有计算完全在您的浏览器中运行，不会收集或传输任何健康数据。

  uuid-generator:
    step1: 第一步：选择 UUID 版本（v1、v4 等）。
    step2: 第二步：输入要生成的 UUID 数量。
    step3: 第三步：点击"生成"并复制结果。
    faq1q: 什么是 UUID？
    faq1a: UUID（通用唯一标识符）是一种 128 位标识符，用于在分布式系统中唯一标识信息。UUID v4 版本约有 5.3 × 10²² 种可能。
    faq2q: UUID v1 和 v4 有什么区别？
    faq2a: UUID v1 基于时间生成，包含机器 MAC 地址，可预测但有序。UUID v4 随机生成，是通用场景的最佳选择。

  base64-string-converter:
    step1: 第一步：选择"编码"或"解码"模式。
    step2: 第二步：将输入文本粘贴到输入框中。
    step3: 第三步：结果即时显示，点击即可复制。
    faq1q: 什么是 Base64？
    faq1a: Base64 是一种将二进制数据转换为 ASCII 字符串的编码方案，常用于在 HTML/CSS 中嵌入图片、编码邮件附件以及在 URL 或 JSON 中传递二进制数据。
    faq2q: Base64 等同于加密吗？
    faq2a: 不是。Base64 是编码，不是加密。它可以轻易被逆向解码，不提供任何安全保护。

  qrcode-generator:
    step1: 第一步：输入要编码到二维码中的网址或文本。
    step2: 第二步：可根据需要自定义前景色和背景色。
    step3: 第三步：下载二维码图片（PNG 格式）。
    faq1q: 二维码可以包含什么内容？
    faq1a: 二维码可包含网址、纯文本、联系人名片（vCard）、WiFi 凭据、电话号码、电子邮件地址等。
    faq2q: 二维码最多能存储多少数据？
    faq2a: 标准二维码最多可存储约 4,296 个字母数字字符或约 7,089 个数字字符。内容越短，二维码越简单，扫描成功率越高。

  temperature-converter:
    step1: 第一步：在任意单位输入框中输入温度值。
    step2: 第二步：其他所有单位的换算结果即时显示。
    faq1q: 如何将摄氏度转换为华氏度？
    faq1a: 公式：°F = °C × 9/5 + 32。例如，100°C = 212°F（水的沸点）。
    faq2q: 什么是绝对零度？
    faq2a: 绝对零度是最低可能温度：0 开尔文 = −273.15°C = −459.67°F。在此温度下，粒子的热运动降至最低。

  hash-text:
    step1: 第一步：在输入框中输入或粘贴文本。
    step2: 第二步：选择哈希算法（MD5、SHA-256 等）。
    step3: 第三步：哈希结果即时显示，点击即可复制。
    faq1q: 什么是哈希函数？
    faq1a: 哈希函数将任意输入转换为固定长度的输出（摘要）。它是单向的——无法从哈希值逆推出原始输入。广泛用于密码存储、文件完整性校验和数字签名。
    faq2q: 应该使用哪种哈希算法？
    faq2a: 安全敏感场景请使用 SHA-256 或 SHA-512。MD5 和 SHA-1 在密码学上已被认为不安全，仅适用于非安全用途如校验和。

  url-encoder:
    step1: 第一步：选择"编码"或"解码"模式。
    step2: 第二步：将 URL 或文本粘贴到输入框中。
    step3: 第三步：编码/解码结果即时显示。
    faq1q: 什么是 URL 编码？
    faq1a: URL 编码（百分号编码）将 URL 中不允许的字符（如空格、中文字符或符号）转换为 %XX 格式。例如，空格变为 %20。
    faq2q: 什么时候需要对字符串进行 URL 编码？
    faq2a: 将用户输入作为查询参数传递时、以编程方式构建 URL 时，或处理表单数据提交时。

  css-unit-converter:
    step1: 第一步：输入数值并选择单位（如 16px）。
    step2: 第二步：根据需要设置根字体大小、父元素字体大小和视口尺寸。
    step3: 第三步：所有换算结果即时显示，点击任意结果可将其作为新的输入值。
    faq1q: rem 和 em 有什么区别？
    faq1a: rem 相对于根元素字体大小（大多数浏览器默认 16px）。em 相对于当前元素父元素的字体大小，可能发生级联累积。
    faq2q: 什么时候应该用 rem 而不是 px？
    faq2a: 字体大小和间距使用 rem，可随用户浏览器字体设置自动缩放（更好的无障碍访问性）。px 适用于边框、固定尺寸元素等需要精确控制的场景。

  unix-timestamp:
    step1: 第一步：将 Unix 时间戳粘贴到输入框中，即可转换为日期。
    step2: 第二步：如果时间戳是毫秒（13 位数字）而非秒（10 位数字），请开启"毫秒"开关。
    step3: 第三步：在下方日期转时间戳区域，输入日期字符串即可转换。
    faq1q: 什么是 Unix 时间戳？
    faq1a: Unix 时间戳是自 1970 年 1 月 1 日 00:00:00 UTC（Unix 纪元）以来经过的秒数（或毫秒数）。它与时区无关，在编程中被广泛使用。
    faq2q: 如何判断时间戳是秒还是毫秒？
    faq2a: 10 位数字为秒（如 1704067200），13 位数字为毫秒（如 1704067200000）。当前 Unix 时间约为 17 亿秒。
