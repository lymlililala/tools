    faq1q: '使用什么 diff 算法？'
    faq1a: '工具使用标准 diff 算法，逐行和逐字符比较文本，找出最小变更集。'
    faq2q: '可以对比代码文件吗？'
    faq2a: '可以。工具适用于任何文本内容，包括代码、散文、JSON 和 YAML。'
    faq3q: 文本对比工具能处理大文件吗？有字数限制吗？
    faq3a: 本工具完全在浏览器中运行，处理速度受设备性能影响。对于数千行的文件通常没有问题，但超大文件（数十 MB）可能导致浏览器卡顿。所有数据均在本地处理，适合对比含敏感信息的配置文件。
    faq4q: 文本对比工具使用哪种算法？Git diff 和在线工具一样吗？
    faq4a: 大多数文本对比工具使用 Myers 差分算法（O(ND) 算法），这也是 Git 默认的 diff 算法，寻找最短编辑路径（最小变更数）。Git 还支持 patience（更适合代码重构）和 histogram 算法（patience 的改进版）。在线对比工具通常使用 diff_match_patch（Google）或 jsdiff 库，基于相同 Myers 算法，结果与 git diff 基本一致。
    title: 文本差异对比工具
    description: 在线文本差异对比工具，并排高亮显示两段文本的新增（绿色）和删除（红色）行，支持忽略空白符和行尾差异，适合代码审查、文档版本比较、配置文件对比和 Git diff 预览。
