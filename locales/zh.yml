  json-to-yaml-converter:
    step1: '步骤 1：将 JSON 粘贴到左侧编辑器。'
    step2: '步骤 2：实时显示 YAML 转换结果。'
    step3: '步骤 3：复制或下载 YAML 结果。'
    faq1q: '为什么要将 JSON 转换为 YAML？'
    faq1a: 'YAML 比 JSON 更具可读性且支持注释，在 Kubernetes、Docker Compose 和 Ansible 的配置文件中更受欢迎。'
    faq2q: 'JSON 是 YAML 的子集吗？'
    faq2a: '是的。YAML 1.2 是 JSON 的超集，所有有效的 JSON 也是有效的 YAML。'
    faq3q: 什么情况下应该选择 YAML 而不是 JSON？
    faq3a: YAML 更适合需要人工维护的配置文件（如 Docker Compose、Kubernetes YAML、GitHub Actions），因为支持注释和多行字符串。JSON 更适合 API 数据传输，因为解析更快，大多数语言原生支持，且格式更严格不易出错。
    faq4q: JSON 转 YAML 后有哪些人类可读性改进？
    faq4a: YAML 相比 JSON 的可读性优势：支持注释（# 注释）；不需要引号（大多数字符串不加引号）；不需要逗号分隔符；使用缩进代替括号，视觉层次更清晰；支持多行字符串；布尔值更自然（true/false 或 yes/no）。特别适合 Kubernetes manifests、Ansible playbooks、CI/CD 配置文件。
    title: JSON到YAML转换器
    description: 在线 JSON 转 YAML 工具，将 JSON 数据一键转换为 YAML 格式，保留对象层级结构和数组关系，适用于 Kubernetes、Docker Compose 等配置文件迁移和格式转换。
