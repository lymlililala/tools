  crontab-generator:
    step1: '步骤 1：使用可视化编辑器设置分钟、小时、日、月和星期字段。'
    step2: '步骤 2：或直接在输入框中输入 cron 表达式。'
    step3: '步骤 3：自动显示人类可读的描述和下次执行时间。'
    faq1q: '什么是 cron 表达式？'
    faq1a: 'cron 表达式是由 5 个字段（分钟 小时 日 月 星期）组成的字符串，定义 Unix/Linux 定时任务的重复计划。'
    faq2q: '*/5 * * * * 是什么意思？'
    faq2a: '表示每 5 分钟执行一次。分钟字段中的 */5 表示在每小时的 0、5、10、15 分运行。'
    faq3q: Crontab 的 5 个字段分别代表什么？
    faq3a: 标准 Crontab 格式：分钟（0-59）、小时（0-23）、日（1-31）、月（1-12）、星期（0-7，0 和 7 都是周日）。例如 0 9 * * 1-5 表示工作日每天 9:00 执行。* 表示任意值，/ 表示步进间隔。
    faq4q: 如何调试 cron 任务不执行的问题？
    faq4a: 常见原因：路径问题（cron 环境变量少，需用绝对路径）、权限不足、脚本有语法错误、未输出错误日志。调试步骤：在命令末尾加 >> /tmp/cron.log 2>&1 捕获输出；使用 crontab -l 确认规则已注册；查看 /var/log/syslog 或 journalctl -u cron；确保 cron 服务正在运行。
    title: Crontab 表达式生成
    description: 在线 Crontab 表达式生成器，可视化配置定时任务的分钟、小时、日期、月份、星期字段，自动生成 cron 表达式并提供中文可读描述，支持快速验证和常见模板，适合运维和后端开发。
