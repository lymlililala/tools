  chronometer:
    step1: '步骤 1：点击「开始」启动计时器。'
    step2: '步骤 2：计时过程中点击「分段」记录每段时间，主计时器不会中断。'
    step3: '步骤 3：点击「暂停」暂停计时，点击「继续」恢复，点击「重置」清零所有记录。'
    faq1q: '什么是计时器？'
    faq1a: '计时器是用于精确测量经过时间的工具，支持毫秒级精度与分段记录，常用于运动计时、性能测试和事件计时等场景。'
    faq2q: '关闭标签页会停止计时吗？'
    faq2a: '是的，关闭或刷新页面将重置计时器，因为它运行在浏览器的 JavaScript 上下文中。计时器使用 Date.now() 计算差值，即使标签页切换到后台也能保持准确。'
    faq3q: 计时器和秒表有什么区别？
    faq3a: 秒表（stopwatch）从零开始正向计时，用于记录事件持续时长；计时器（countdown timer）从设定时间倒数到零，常用于提醒和限时任务。本工具是秒表功能，支持分段（Lap）记录，可以记录每一轮或每一段的时间，适合运动训练和会议计时。
    faq4q: 计时器在 JavaScript 中如何精确计时？
    faq4a: JavaScript 可使用 performance.now() 获取亚毫秒级精度的时间戳，比 Date.now() 更精确且不受系统时间调整影响。计时器通常用 setInterval 或 requestAnimationFrame 定期更新显示。长时间运行时，requestAnimationFrame 更节能且与屏幕刷新率同步，避免后台标签页中的过度计算。
    title: 在线计时器 / 秒表
    description: 在线秒表计时器，支持毫秒级精度计时、分段（Lap）圈速记录和最快/最慢圈统计，操作简单直观，适合运动训练计时、演讲排练、会议控时等各类精确计时和时间测量场景使用。
