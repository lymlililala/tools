  bcrypt:
    step1: '步骤 1：在「待哈希文本」字段中输入要哈希的内容。'
    step2: '步骤 2：调整代价因子（轮数）——数值越高越安全但越慢。'
    step3: '步骤 3：生成的 bcrypt 哈希值显示在输出框中。'
    step4: '步骤 4：如需验证，在验证区粘贴哈希并输入原始文本。'
    faq1q: '什么是 bcrypt？'
    faq1a: 'bcrypt 是一种密码哈希算法，被设计为故意缓慢以抵御暴力破解攻击，并使用盐值防御彩虹表攻击。'
    faq2q: '什么是代价因子？'
    faq2a: '代价因子控制哈希轮数。每增加 1，计算时间翻倍，使暴力破解更加困难。'
    faq3q: Bcrypt 的 cost factor 应该设置为多少？
    faq3a: 推荐将 cost factor（轮数）设置为 10~12。值越高安全性越高但耗时越长。2024 年建议生产环境至少 10，高安全场景建议 12，本工具默认使用 10。
    faq4q: bcrypt 哈希能被破解吗？
    faq4a: bcrypt 的设计使其极难被暴力破解。高 cost factor 会使每次尝试耗时很长，即使使用 GPU 集群也需要数百年。只要 cost factor 足够高（≥10），且用户密码足够复杂，bcrypt 在实践中几乎不可破解。
    title: Bcrypt 哈希与校验
