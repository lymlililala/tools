    faq2q: 'camelCase 和 PascalCase 有什么区别？'
    faq2a: 'camelCase 以小写字母开头（如 myVariable），PascalCase 以大写字母开头（如 MyClass）。'
    faq3q: 不同编程语言各偏好哪种命名规范？
    faq3a: JavaScript/Java 变量和方法用 camelCase，类名用 PascalCase；Python 变量和函数用 snake_case，类名用 PascalCase；数据库字段通常用 snake_case；CSS 类名用 kebab-case；常量用 SCREAMING_SNAKE_CASE。
    faq4q: 各种命名规范分别用于什么场景？
    faq4a: camelCase（小驼峰）用于 JavaScript 变量和函数；PascalCase（大驼峰）用于类名和 React 组件；snake_case 用于 Python 变量、数据库列名和 URL；kebab-case 用于 CSS 类名、HTML 属性和 URL 路径；SCREAMING_SNAKE_CASE 用于常量和环境变量；Title Case 用于标题和书名。
