    step1: '步骤 1：输入 MAC 地址（如 AA:BB:CC:DD:EE:FF）。'
    step2: '步骤 2：工具查询 OUI 以识别制造商。'
    step3: '步骤 3：显示厂商名称和国家。'
    faq1q: '什么是 MAC 地址？'
    faq1a: 'MAC（媒体访问控制）地址是分配给网卡的唯一硬件标识符，长 48 位（6 字节），通常写成六对十六进制数字。'
    faq2q: 'MAC 地址的前 3 字节是什么？'
    faq2a: '前 3 字节（OUI——组织唯一标识符）由 IEEE 分配给制造商，后 3 字节由制造商分配以唯一标识每台设备。'
    faq3q: MAC 地址可以修改吗？如何修改？
    faq3a: MAC 地址可以通过软件方式修改（MAC 欺骗/spoofing）。在 Linux 上可用 ip link set dev eth0 address XX:XX:XX:XX:XX:XX；在 macOS 上用 ifconfig en0 ether；在 Windows 上通过设备管理器的网络适配器属性设置。修改重启后通常恢复为硬件烧录的原始地址，主要用于网络测试和隐私保护。
    faq4q: MAC 地址的前三个字节（OUI）如何分配？
    faq4a: "OUI（组织唯一标识符）由 IEEE 分配给硬件制造商，标识设备品牌。例如 DC:A6:32 属于树莓派基金会。企业购买 OUI 后可自由分配后三字节（设备唯一部分）。通过 OUI 可以识别网络中设备的制造商，常用于网络资产管理和安全审计（识别非授权设备品牌）。"
