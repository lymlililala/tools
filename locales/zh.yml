  xml-to-json:
    title: XML 转 JSON 转换器
    description: 在线 XML 转 JSON 工具，将 XML 数据一键转换为 JSON 格式，保留标签层级结构和属性，转换结果可格式化显示，便于前端处理、REST API 调用和数据分析。
    step1: 步骤 1：将 XML 文本粘贴到左侧输入框。
    step2: 步骤 2：右侧实时显示转换后的 JSON 结果。
    step3: 步骤 3：点击复制按钮即可复制 JSON 内容。
    faq1q: XML 与 JSON 有什么区别？
    faq1a: XML 使用标签结构，适合文档和配置；JSON 使用键值对，更轻量，是现代 Web API 的主流数据格式。
    faq2q: 转换是否支持 XML 属性？
    faq2a: "支持。XML 元素的属性会作为特殊键（如 {'@'}attributes）保留在 JSON 结果中。"
    faq3q: XML 命名空间（namespace）转换为 JSON 后怎么处理？
    faq3a: XML 命名空间前缀（如 <ns:tag>）在转换为 JSON 时通常作为键名的一部分保留（如 ns:tag），或者将命名空间 URI 单独记录。本工具会尽量保留原始 XML 的结构信息，但复杂的命名空间场景建议手动校验转换结果。
    faq4q: XML 转 JSON 后如何处理属性和元素的对应关系？
    faq4a: "XML 有属性（attribute）和元素（element）两种数据承载方式，JSON 只有键值对。常见转换策略：属性转为 JSON 对象的特殊键（如 {'@'}attr 或 _attributes 嵌套对象）；元素文本内容转为 #text 键；数组处理需要特别注意（单个子元素和多个子元素需统一为数组）。不同库（xml2js、fast-xml-parser）策略不同，需根据使用场景选择合适的转换选项。"
