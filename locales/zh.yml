    faq1a: 'User-Agent 字符串是浏览器随每个 HTTP 请求发送的标识符，告知服务器浏览器类型、操作系统和设备信息。'
    faq2q: '为什么 User-Agent 字符串看起来这么复杂？'
    faq2a: '出于历史兼容性原因，现代浏览器在 UA 中包含多个旧浏览器标识符，导致字符串越来越复杂。'
    title: 用户代理分析器
    description: 从用户代理字符串中检测和分析浏览器、引擎、操作系统、CPU和设备类型/型号。

  numeronym-generator:
