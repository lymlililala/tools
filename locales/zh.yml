    faq1q: 二维码可以包含什么内容？
    faq1a: 二维码可包含网址、纯文本、联系人名片（vCard）、WiFi 凭据、电话号码、电子邮件地址等。
    faq2q: 二维码最多能存储多少数据？
    faq2a: 标准二维码最多可存储约 4,296 个字母数字字符或约 7,089 个数字字符。内容越短，二维码越简单，扫描成功率越高。
    faq3q: 生成的二维码可以添加 Logo 吗？
    faq3a: 可以，但需要在图片编辑工具中将 Logo 叠加到二维码中心。为确保 Logo 覆盖后仍可扫描，需将二维码的容错率设置为 H（最高，30% 损坏容忍）。Logo 建议不超过二维码面积的 30%，且使用高对比度颜色。本工具生成的 PNG 图片可在 Photoshop 或 Figma 中进行后期处理。
    faq4q: 二维码能存储哪些类型的数据？
    faq4a: 二维码可编码多种格式：URL（最常见，跳转网页）；vCard（联系人信息）；WiFi 配置（SSID+密码，手机可直接连接）；纯文本；电话号码；邮件地址；地理坐标；日历事件；支付信息（支付宝/微信支付的特定格式）。最大容量约 4296 个字母数字字符，中文字符会显著减少容量。

