    faq1q: '什么是 MAC 地址？'
    faq1a: 'MAC（媒体访问控制）地址是分配给网卡的唯一硬件标识符，长 48 位（6 字节），通常写成六对十六进制数字。'
    faq2q: 'MAC 地址的前 3 字节是什么？'
    faq2a: '前 3 字节（OUI——组织唯一标识符）由 IEEE 分配给制造商，后 3 字节由制造商分配以唯一标识每台设备。'
