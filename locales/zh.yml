  iban-validator-and-parser:
    step1: '步骤 1：输入或粘贴 IBAN 号码。'
    step2: '步骤 2：工具立即验证格式和校验和。'
    step3: '步骤 3：有效的 IBAN 会解析并显示国家、银行代码和账号。'
    faq1q: '什么是 IBAN？'
    faq1a: 'IBAN（国际银行账号）是国际通用的银行账户标识标准，包含国家代码、校验位和账号。'
    faq2q: 'IBAN 有多长？'
    faq2a: 'IBAN 长度因国而异，从 15 位（挪威）到 34 位不等。始终以 2 字母国家代码和 2 位校验位开头。'
    faq3q: IBAN 是如何验证的？
    faq3a: IBAN 验证使用 MOD-97 算法：将字母转换为数字（A=10, B=11…），重新排列字符串（末4位移到头部），计算对大数除以 97 的余数，余数为 1 则有效。本工具还会解析出国家代码、银行代码和账户号码，并与已知的国家 IBAN 格式进行匹配验证。
    faq4q: IBAN 验证和 SWIFT/BIC 代码有什么区别？
    faq4a: IBAN（国际银行账号）标识具体的银行账户，用于国际转账中指定收款账户；SWIFT/BIC 代码（8-11位）标识具体的银行机构，用于路由国际汇款到正确的银行。国际电汇通常同时需要 IBAN（账户）和 BIC（银行），欧元区内 SEPA 转账只需 IBAN 即可。
    title: IBAN验证器和解析器
