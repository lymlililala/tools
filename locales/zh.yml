    step1: '步骤 1：点击「生成」创建随机的 IPv6 ULA 前缀。'
    step2: '步骤 2：显示生成的前缀、全局 ID 和完整地址范围。'
    step3: '步骤 3：复制前缀用于您的局域网配置。'
    faq1q: '什么是 IPv6 ULA 地址？'
    faq1a: 'ULA（唯一本地地址）是 fc00::/7 范围内的 IPv6 地址，类似于私有 IPv4 地址段，不在公网路由。'
    faq2q: 'ULA 全局 ID 是如何生成的？'
    faq2a: '根据 RFC 4193，40 位全局 ID 应使用当前时间和 EUI-64 伪随机生成，以最小化不同组织间的碰撞概率。'
    faq3q: IPv6 ULA 和公网 IPv6 地址有什么区别？
    faq3a: ULA（Unique Local Address，fc00::/7 前缀）类似于 IPv4 的私有地址（192.168.x.x），只在本地网络内路由，不在公网上传播。公网 IPv6（GUA，Global Unicast Address）全球唯一可路由。ULA 适合内部网络通信，不依赖 ISP 分配，即使没有互联网连接也能使用。
    faq4q: IPv6 ULA 和全球单播地址（GUA）有什么区别？
    faq4a: "ULA（唯一本地地址，fc00::/7）类似 IPv4 的私有地址，仅在本地网络路由，不在互联网上公告；GUA（全球单播地址，2000::/3）是互联网可路由的真实地址。IPv6 的优势是地址充裕，内网也可使用 GUA，但 ULA 用于纯内网设备（无需互联网可达）更安全，也适合实验和开发环境。"
    title: IPv6 ULA生成器
    description: 按照 RFC 4193 规范在线生成 IPv6 ULA（唯一本地地址）前缀，用于局域网内部使用，无需申请公网地址即可构建私有 IPv6 网络，适合家庭实验室和企业内网规划。
