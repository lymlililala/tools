  date-converter:
    step1: '步骤 1：在输入框中输入日期和时间。'
    step2: '步骤 2：选择源时区。'
    step3: '步骤 3：日期以多种格式和时区显示。'
    faq1q: '支持哪些日期格式？'
    faq1a: '支持 ISO 8601、Unix 时间戳、RFC 2822 和常见本地化格式，可在 UTC、EST、PST、CET 等时区之间转换。'
    faq2q: '什么是 Unix 时间戳？'
    faq2a: 'Unix 时间戳（纪元时间）是自 1970 年 1 月 1 日 00:00:00 UTC 起经过的秒数，与时区无关，在编程中广泛使用。'
    faq3q: 为什么 2038 年对 Unix 时间戳是个问题？
    faq3a: 32 位有符号整数最大值（2147483647）对应 2038-01-19 03:14:07 UTC，称为「2038 年问题」。超过该时间 32 位系统会溢出。现代系统使用 64 位整数存储时间戳，可覆盖数十亿年，不受此限制。
    faq4q: 如何处理不同时区的日期时间转换？
    faq4a: 时区处理的关键：始终以 UTC 存储时间，只在展示时转换为本地时区。JavaScript 中推荐使用 Intl.DateTimeFormat 或 date-fns-tz 库处理时区。夏令时（DST）会使同一时区在不同时段偏移不同，需特别注意。数据库建议使用带时区的时间戳类型确保数据准确性。
    title: 日期时间转换器
    description: 在线日期时间转换工具，支持多种日期格式和时区转换，包括 Unix 时间戳、ISO 8601、UTC 互转，实时显示转换结果，适合后端开发、日志分析和跨时区协作场景。

