name: UI audit

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ui-audit:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3df4ab11eba7bda6032a0b82a6bb43b11571feac # v4

      - run: corepack enable

      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Get Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(jq -r .dependencies.playwright package.json)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install

      - name: Build app
        run: pnpm build

      - name: Restore Playwright browsers from cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}-${{ hashFiles('**/playwright.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}-
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run UI audit
        run: pnpm run test:ui-audit

      # On failure, upload the flagged screenshots + report so reviewers can see
      # exactly which page overflowed / errored without reproducing locally.
      - name: Upload audit artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-audit-report
          path: |
            shots/audit/
            playwright-report/
          retention-days: 14
