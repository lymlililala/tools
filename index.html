    <link rel="alternate" hreflang="x-default" href="https://myutl.com/" />

    <!-- JSON-LD: WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "MyUtl",
      "url": "https://myutl.com",
      "description": "免费在线工具箱，提供90+实用工具：JSON格式化、Base64编解码、二维码生成、房贷计算器、个人所得税计算器等",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://myutl.com/?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      },
      "publisher": {
        "@type": "Organization",
        "name": "MyUtl",
        "url": "https://myutl.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://myutl.com/android-chrome-192x192.png"
        }
      }
    }
    </script>
  </head>
  <body>
    <!--
      Loading skeleton：Vue 挂载前显示，挂载后自动被替换。
      绝不使用 display:none / visibility:hidden，避免 Google 视为 Cloaking。
    -->
    <style>
      /* ── Loading skeleton ───────────────────────────────────── */
      #app-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        gap: 20px;
      }
      #app-loading .logo {
        font-size: 28px;
        font-weight: 800;
        color: #18a058;
        letter-spacing: -0.5px;
      }
      #app-loading .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #e2e8f0;
        border-top-color: #18a058;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #app-loading .loading-text {
        font-size: 14px;
        color: #94a3b8;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── JS 加载失败兜底 ──────────────────────────────────────── */
      #app-error {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        gap: 16px;
        text-align: center;
        padding: 24px;
      }
      #app-error .err-icon { font-size: 48px; }
      #app-error h2 { font-size: 20px; font-weight: 700; color: #1e293b; margin: 0; }
      #app-error p { font-size: 14px; color: #64748b; margin: 0; max-width: 360px; line-height: 1.6; }
      #app-error a {
        margin-top: 8px;
        padding: 10px 24px;
        background: #18a058;
        color: #fff;
        border-radius: 8px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
      }
      #app-error a:hover { background: #15803d; }

      /* ── prerender SEO（爬虫可见）──────────────────────────────── */
      .prerender-seo {
        max-width: 800px;
        margin: 40px auto;
        padding: 0 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #1a1a2e;
        line-height: 1.7;
      }
      .prerender-seo h1 { font-size: 28px; font-weight: 700; margin: 0 0 20px; line-height: 1.3; }
      .prerender-seo h2 { font-size: 20px; font-weight: 600; margin: 28px 0 12px; }
      .prerender-seo h3 { font-size: 17px; font-weight: 600; margin: 20px 0 8px; }
      .prerender-seo p { margin: 8px 0; opacity: 0.8; }
      .prerender-seo ul, .prerender-seo ol { padding-left: 24px; margin: 8px 0; }
      .prerender-seo li { margin-bottom: 4px; }
      .prerender-seo a { color: #6366f1; text-decoration: none; }
      .prerender-seo a:hover { text-decoration: underline; }
      .prerender-seo section { margin-top: 16px; }
      .prerender-seo nav { margin-top: 16px; }
    </style>

    <!-- Loading 占位（Vue 挂载后此节点被 #app 替换，自动消失） -->
    <div id="app-loading" aria-label="Loading MyUtl">
      <div class="logo">MyUtl</div>
      <div class="spinner"></div>
      <div class="loading-text">正在加载，请稍候…</div>
    </div>

    <!-- JS 完全失败时的兜底（由下方 onerror 脚本控制显示） -->
    <div id="app-error" role="alert">
      <div class="err-icon">⚠️</div>
      <h2>页面加载失败</h2>
      <p>网络异常或资源加载超时，请检查网络连接后重试。</p>
      <a href="javascript:location.reload()">🔄 刷新重试</a>
    </div>

    <!-- Vue 挂载目标 -->
    <div id="app"></div>

    <!--
      加载超时检测：15 秒内若 Vue 未挂载成功，显示兜底错误页。
      Vue 挂载成功后会清除此定时器（通过 window.__appMounted 标志）。
    -->
    <script>
      (function () {
        var timer = setTimeout(function () {
          if (!window.__appMounted) {
            document.getElementById('app-loading').style.display = 'none';
            document.getElementById('app-error').style.display = 'flex';
          }
        }, 15000);
        window.__clearLoadingTimer = function () { clearTimeout(timer); };
      })();
    </script>

    <script type="module" src="/src/main.ts"></script>
  </body>
