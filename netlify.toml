# 首页：使用预渲染版本（含唯一 SEO meta）
[[redirects]]
  from = "/"
  to = "/prerender-home/index.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/blog/*"
  to = "/index.html"
  status = 200

# 信息页：使用预渲染版本（含唯一 SEO meta）
[[redirects]]
  from = "/about"
  to = "/about/index.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact/index.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy/index.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms/index.html"
  status = 200

# 工具页：优先尝试预渲染文件，不存在则 SPA fallback（200）
# Prerender 脚本会在 dist/tools/{slug}/index.html 生成静态文件
[[redirects]]
  from = "/:slug"
  to = "/tools/:slug/index.html"
  status = 200
  force = false

[[redirects]]
  from = "/:slug"
  to = "/index.html"
  status = 200

# ── 中文 /zh 前缀（与 vercel.json 同步）──────────────────────────────────────
[[redirects]]
  from = "/zh"
  to = "/zh/prerender-home/index.html"
  status = 200

[[redirects]]
  from = "/zh/about"
  to = "/zh/about/index.html"
  status = 200

[[redirects]]
  from = "/zh/contact"
  to = "/zh/contact/index.html"
  status = 200

[[redirects]]
  from = "/zh/privacy"
  to = "/zh/privacy/index.html"
  status = 200

[[redirects]]
  from = "/zh/terms"
  to = "/zh/terms/index.html"
  status = 200

[[redirects]]
  from = "/zh/blog"
  to = "/zh/blog/index.html"
  status = 200

[[redirects]]
  from = "/zh/blog/*"
  to = "/zh/blog/:splat/index.html"
  status = 200

[[redirects]]
  from = "/zh/c/:slug"
  to = "/zh/c/:slug/index.html"
  status = 200

[[redirects]]
  from = "/zh/:slug"
  to = "/zh/tools/:slug/index.html"
  status = 200
  force = false

[[redirects]]
  from = "/zh/*"
  to = "/zh/index.html"
  status = 200

# 未匹配的路径返回真实 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
